<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'Helvetica Neue', 'Noto Sans KR', sans-serif">
  <defs>
    <marker id="arrow-lift" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f77b4"/>
    </marker>
  </defs>

  <rect width="900" height="520" fill="#ffffff"/>

  <text x="450" y="52" font-size="16" font-weight="bold" fill="#1f1f1f" text-anchor="middle">NaturalTransformation — 값은 그대로, 컨테이너만 F → G</text>

  <!-- 왼쪽 MyList<a> -->
  <rect x="90" y="120" width="250" height="240" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2.4" rx="10"/>
  <text x="215" y="150" font-size="17" fill="#0c3a5e" text-anchor="middle" font-weight="bold" font-family="'Consolas', monospace">MyList&lt;a&gt;</text>
  <rect x="130" y="170" width="170" height="44" fill="#fff2cc" stroke="#bf9000" stroke-width="1.8" rx="6"/>
  <text x="215" y="199" font-size="16" fill="#5a4400" text-anchor="middle" font-family="'Consolas', monospace">1</text>
  <rect x="130" y="224" width="170" height="44" fill="#fff2cc" stroke="#bf9000" stroke-width="1.8" rx="6"/>
  <text x="215" y="253" font-size="16" fill="#5a4400" text-anchor="middle" font-family="'Consolas', monospace">2</text>
  <rect x="130" y="278" width="170" height="44" fill="#fff2cc" stroke="#bf9000" stroke-width="1.8" rx="6"/>
  <text x="215" y="307" font-size="16" fill="#5a4400" text-anchor="middle" font-family="'Consolas', monospace">3</text>

  <!-- Transform 화살표 -->
  <line x1="348" y1="240" x2="566" y2="240" stroke="#1f77b4" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-lift)"/>
  <text x="454" y="224" font-size="17" fill="#1f77b4" text-anchor="middle" font-weight="bold" font-family="'Consolas', monospace">Transform</text>
  <text x="454" y="266" font-size="12" fill="#1f77b4" text-anchor="middle" font-style="italic">컨테이너 교체 (List → Maybe)</text>

  <!-- 오른쪽 MyMaybe<a> -->
  <rect x="570" y="120" width="250" height="240" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2.6" rx="10"/>
  <text x="695" y="150" font-size="17" fill="#0c3a5e" text-anchor="middle" font-weight="bold" font-family="'Consolas', monospace">MyMaybe&lt;a&gt;</text>
  <rect x="610" y="210" width="170" height="60" fill="#fff2cc" stroke="#bf9000" stroke-width="1.8" rx="6"/>
  <text x="695" y="247" font-size="16" fill="#5a4400" text-anchor="middle" font-family="'Consolas', monospace">Just(1)</text>

  <text x="450" y="420" font-size="13" fill="#1f1f1f" text-anchor="middle" font-style="italic">값 타입 a (여기서는 int) 는 입력과 출력에서 같습니다. 바뀌는 것은 컨테이너뿐입니다.</text>
</svg>
