<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-family="'Helvetica Neue', 'Noto Sans KR', sans-serif">
  <defs>
    <marker id="arrow-lift" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f77b4"/>
    </marker>
  </defs>

  <rect width="900" height="460" fill="#ffffff"/>

  <text x="450" y="48" font-size="16" font-weight="bold" fill="#1f1f1f" text-anchor="middle">sequence вҖ” л‘җ мёөмқҳ м•ҲнҢҺмқ„ л’Өм§‘лҠ” NaturalTransformation</text>

  <!-- мҷјмӘҪ: F = MyListвҲҳMyMaybe -->
  <rect x="70" y="110" width="290" height="250" fill="#f4f9ff" stroke="#1f77b4" stroke-width="2.4" rx="10"/>
  <text x="215" y="138" font-size="16" fill="#0c3a5e" text-anchor="middle" font-weight="bold" font-family="'Consolas', monospace">MyList&lt;MyMaybe&lt;int&gt;&gt;</text>
  <text x="215" y="158" font-size="12" fill="#1f77b4" text-anchor="middle" font-style="italic">F = ListвҲҳMaybe (л°”к№Ҙ List)</text>
  <rect x="110" y="178" width="210" height="58" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2" rx="6"/>
  <text x="215" y="213" font-size="17" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace">Just(1)</text>
  <rect x="110" y="250" width="210" height="58" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2" rx="6"/>
  <text x="215" y="285" font-size="17" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace">Just(2)</text>

  <!-- sequence нҷ”мӮҙн‘ң (м„ёкі„ мқҙлҸҷ м–‘мӢқ) -->
  <line x1="368" y1="235" x2="530" y2="235" stroke="#1f77b4" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-lift)"/>
  <text x="449" y="219" font-size="17" fill="#1f77b4" text-anchor="middle" font-weight="bold" font-family="'Consolas', monospace">sequence</text>
  <text x="449" y="261" font-size="12" fill="#1f77b4" text-anchor="middle" font-style="italic">Transform : K&lt;F,a&gt; вҶ’ K&lt;G,a&gt;</text>

  <!-- мҳӨлҘёмӘҪ: G = MyMaybeвҲҳMyList -->
  <rect x="540" y="110" width="290" height="250" fill="#f4f9ff" stroke="#1f77b4" stroke-width="2.4" rx="10"/>
  <text x="685" y="138" font-size="16" fill="#0c3a5e" text-anchor="middle" font-weight="bold" font-family="'Consolas', monospace">MyMaybe&lt;MyList&lt;int&gt;&gt;</text>
  <text x="685" y="158" font-size="12" fill="#1f77b4" text-anchor="middle" font-style="italic">G = MaybeвҲҳList (л°”к№Ҙ Maybe)</text>
  <rect x="565" y="212" width="240" height="62" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2" rx="6"/>
  <text x="685" y="249" font-size="17" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace">Just([1, 2])</text>

  <text x="450" y="410" font-size="13" fill="#1f1f1f" text-anchor="middle" font-style="italic">к°’ 1, 2 лҠ” к·ёлҢҖлЎңмһ…лӢҲлӢӨ. л°”к№Ҙ List В· м•Ҳ Maybe (F) к°Җ л°”к№Ҙ Maybe В· м•Ҳ List (G) лЎң м•ҲнҢҺл§Ң л’Өм§‘нһҷлӢҲлӢӨ.</text>
</svg>
