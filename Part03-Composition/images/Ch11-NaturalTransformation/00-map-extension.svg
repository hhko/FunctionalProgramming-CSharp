<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Helvetica Neue', 'Noto Sans KR', sans-serif">
  <defs>
    <marker id="arrow-lift" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f77b4"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9aa5b1"/>
    </marker>
  </defs>

  <!-- 두 세계 띠 — 1장 그림 1-2 와 같은 좌표 -->
  <rect x="40" y="60" width="720" height="230" fill="#f4f9ff" stroke="none" rx="12"/>
  <text x="60" y="88" font-size="13" fill="#1f77b4" font-style="italic" font-weight="bold" letter-spacing="0.5">Elevated World</text>
  <rect x="40" y="330" width="720" height="130" fill="#fffdf3" stroke="none" rx="12"/>
  <text x="60" y="358" font-size="13" fill="#bf9000" font-style="italic" font-weight="bold" letter-spacing="0.5">Normal World</text>

  <!-- 기본 네 이동 (1장) — 좌측, 흐림 -->
  <g opacity="0.5">
    <rect x="70" y="195" width="100" height="60" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2.2" rx="6"/>
    <text x="120" y="233" font-size="20" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">E&lt;a&gt;</text>
    <rect x="70" y="375" width="100" height="60" fill="#fff2cc" stroke="#bf9000" stroke-width="2.2" rx="6"/>
    <text x="120" y="413" font-size="20" fill="#5a4400" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">a</text>
    <line x1="120" y1="368" x2="120" y2="262" stroke="#9aa5b1" stroke-width="2.4" stroke-dasharray="6 5" marker-end="url(#arrow-gray)" marker-start="url(#arrow-gray)"/>
    <text x="134" y="310" font-size="12" fill="#6b7280">기본 네 이동</text>
    <text x="134" y="326" font-size="12" fill="#6b7280">(그림 1-2)</text>
  </g>

  <!-- 여섯 번째 이동 — 컨테이너 교체 (가로) -->
  <text x="494" y="96" font-size="13" fill="#1f77b4" text-anchor="middle" font-weight="bold">여섯 번째 이동 — 값을 고정한 채 컨테이너만 교체 (가로 이동)</text>
  <text x="494" y="121" font-size="20" fill="#1f77b4" text-anchor="middle" font-weight="bold" font-family="'Consolas', monospace">Transform</text>

  <rect x="260" y="130" width="170" height="80" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2.2" rx="6"/>
  <text x="345" y="180" font-size="22" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">F&lt;a&gt;</text>

  <rect x="560" y="130" width="170" height="80" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2.2" rx="6"/>
  <text x="645" y="180" font-size="22" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">G&lt;a&gt;</text>

  <line x1="437" y1="170" x2="552" y2="170" stroke="#1f77b4" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-lift)"/>

  <!-- 같은 값 a — 양쪽 컨테이너에 그대로 -->
  <line x1="470" y1="366" x2="350" y2="214" stroke="#9aa5b1" stroke-width="1.8" stroke-dasharray="3 5"/>
  <line x1="518" y1="366" x2="640" y2="214" stroke="#9aa5b1" stroke-width="1.8" stroke-dasharray="3 5"/>
  <rect x="449" y="370" width="90" height="60" fill="#fff2cc" stroke="#bf9000" stroke-width="2.2" rx="6"/>
  <text x="494" y="408" font-size="22" fill="#5a4400" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">a</text>
  <text x="494" y="450" font-size="12" fill="#8a7a33" text-anchor="middle">값 a 는 양쪽 컨테이너에 그대로</text>
</svg>
