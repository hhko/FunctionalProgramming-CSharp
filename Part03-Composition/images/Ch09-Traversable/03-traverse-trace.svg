<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 470" font-family="'Helvetica Neue', 'Noto Sans KR', sans-serif">
  <defs>
    <marker id="arrow-fn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f1f1f"/>
    </marker>
  </defs>

  <rect width="1000" height="470" fill="#ffffff"/>

  <text x="500" y="32" font-size="15" fill="#1f1f1f" text-anchor="middle" font-weight="bold">Traverse(pure, [2, 4]) — 뒤에서 앞으로 Apply 사슬로 Just([2, 4]) 조립</text>
  <text x="500" y="52" font-size="12" fill="#666" text-anchor="middle" font-style="italic">Reverse 로 마지막 원소(4)부터 처리, prepend 가 앞에 붙여 원래 순서 보존</text>

  <rect x="40" y="80" width="920" height="200" fill="#f4f9ff" stroke="none" rx="12"/>
  <text x="60" y="106" font-size="13" fill="#1f77b4" font-style="italic" font-weight="bold" letter-spacing="0.5">Elevated World (F = MyMaybe)</text>

  <!-- acc0 = Pure([]) -->
  <rect x="70" y="150" width="150" height="64" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2.2" rx="6"/>
  <text x="145" y="180" font-size="15" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">Just([])</text>
  <text x="145" y="200" font-size="11" fill="#0c3a5e" text-anchor="middle">Pure(빈 리스트)</text>
  <text x="145" y="244" font-size="11" fill="#1f77b4" text-anchor="middle" font-style="italic">시작 acc</text>

  <!-- step: prepend 4 -->
  <line x1="222" y1="182" x2="378" y2="182" stroke="#1f1f1f" stroke-width="2.4" marker-end="url(#arrow-fn)"/>
  <text x="300" y="170" font-size="13" fill="#1f1f1f" text-anchor="middle" font-family="'Consolas', monospace">prepend 4</text>
  <text x="300" y="206" font-size="11" fill="#1f1f1f" text-anchor="middle">Apply(Apply(Pure(prepend), Just(4)), acc)</text>

  <!-- acc1 = Just([4]) -->
  <rect x="380" y="150" width="170" height="64" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2.2" rx="6"/>
  <text x="465" y="180" font-size="15" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">Just([4])</text>
  <text x="465" y="200" font-size="11" fill="#0c3a5e" text-anchor="middle">4 를 앞에 붙임</text>

  <!-- step: prepend 2 -->
  <line x1="552" y1="182" x2="708" y2="182" stroke="#1f1f1f" stroke-width="2.4" marker-end="url(#arrow-fn)"/>
  <text x="630" y="170" font-size="13" fill="#1f1f1f" text-anchor="middle" font-family="'Consolas', monospace">prepend 2</text>
  <text x="630" y="206" font-size="11" fill="#1f1f1f" text-anchor="middle">Apply(Apply(Pure(prepend), Just(2)), acc)</text>

  <!-- acc2 = Just([2,4]) (final) -->
  <rect x="710" y="150" width="190" height="64" fill="#e8f4fd" stroke="#1f77b4" stroke-width="3.2" rx="6"/>
  <text x="805" y="180" font-size="15" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">Just([2, 4])</text>
  <text x="805" y="200" font-size="11" fill="#0c3a5e" text-anchor="middle">2 를 앞에 붙임</text>
  <text x="805" y="244" font-size="11" fill="#1f77b4" text-anchor="middle" font-style="italic">최종 결과</text>

  <rect x="40" y="300" width="920" height="130" fill="#fffdf3" stroke="none" rx="12"/>
  <text x="60" y="326" font-size="13" fill="#bf9000" font-style="italic" font-weight="bold" letter-spacing="0.5">한 단계의 정체</text>
  <text x="60" y="356" font-size="13" fill="#5a4400" font-family="'Consolas', monospace">F.Apply(F.Apply(F.Pure(prepend), f(a)), acc)</text>
  <text x="60" y="384" font-size="12" fill="#5a4400">① Pure(prepend) — 2인자 prepend 를 Elevated 로 올림 (5장 Pure)</text>
  <text x="60" y="404" font-size="12" fill="#5a4400">② 첫 Apply — head 자리에 f(a) 결합 / ③ 둘째 Apply — tail 자리에 acc 결합 (5장 다인자 lift)</text>
  <text x="60" y="422" font-size="12" fill="#5a4400">f(a) 나 acc 가 Nothing 이면 Apply 규칙으로 전체가 Nothing — 단락이 공짜로 따라옴</text>
</svg>
