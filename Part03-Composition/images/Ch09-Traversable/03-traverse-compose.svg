<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'Helvetica Neue', 'Noto Sans KR', sans-serif">
  <defs>
    <marker id="arrow-fn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f1f1f"/>
    </marker>
  </defs>

  <rect width="900" height="520" fill="#ffffff"/>

  <text x="450" y="56" font-size="16" font-weight="bold" fill="#1f1f1f" text-anchor="middle">Traversable = Functor + Foldable + Applicative 의 합성</text>

  <!-- 세 재료 박스 -->
  <rect x="80" y="110" width="220" height="90" fill="#fff2cc" stroke="#bf9000" stroke-width="2.2" rx="8"/>
  <text x="190" y="142" font-size="15" fill="#5a4400" text-anchor="middle" font-weight="bold">Functor — Map</text>
  <text x="190" y="168" font-size="12" fill="#5a4400" text-anchor="middle">원소 변환 (4장)</text>

  <rect x="80" y="220" width="220" height="90" fill="#fff2cc" stroke="#bf9000" stroke-width="2.2" rx="8"/>
  <text x="190" y="252" font-size="15" fill="#5a4400" text-anchor="middle" font-weight="bold">Foldable — Fold</text>
  <text x="190" y="278" font-size="12" fill="#5a4400" text-anchor="middle">순회 골격 (6장)</text>

  <rect x="80" y="330" width="220" height="90" fill="#fff2cc" stroke="#bf9000" stroke-width="2.2" rx="8"/>
  <text x="190" y="362" font-size="15" fill="#5a4400" text-anchor="middle" font-weight="bold">Applicative — Pure + Apply</text>
  <text x="190" y="388" font-size="12" fill="#5a4400" text-anchor="middle">시작점 + 원소 결합 (5장)</text>

  <!-- 합성 화살표 -->
  <line x1="300" y1="155" x2="560" y2="245" stroke="#1f1f1f" stroke-width="2.4" marker-end="url(#arrow-fn)"/>
  <line x1="300" y1="265" x2="560" y2="265" stroke="#1f1f1f" stroke-width="2.4" marker-end="url(#arrow-fn)"/>
  <line x1="300" y1="375" x2="560" y2="285" stroke="#1f1f1f" stroke-width="2.4" marker-end="url(#arrow-fn)"/>

  <!-- 결과 박스 -->
  <rect x="570" y="215" width="250" height="100" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2.8" rx="8"/>
  <text x="695" y="252" font-size="18" fill="#0c3a5e" text-anchor="middle" font-weight="bold" font-family="'Consolas', monospace">Traverse</text>
  <text x="695" y="280" font-size="12" fill="#0c3a5e" text-anchor="middle">세 능력을 한자리에</text>
  <text x="695" y="300" font-size="11" fill="#0c3a5e" text-anchor="middle" font-style="italic">1부 최정상 추상</text>

  <text x="450" y="470" font-size="13" fill="#1f1f1f" text-anchor="middle" font-style="italic">trait 선언이 Functor·Foldable 를 상속하고, Traverse 의 F 가 Applicative 를 요구합니다.</text>
</svg>
