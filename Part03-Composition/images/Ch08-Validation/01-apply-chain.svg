<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" font-family="'Helvetica Neue', 'Noto Sans KR', sans-serif">
  <defs>
    <marker id="arrow-fn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f1f1f"/>
    </marker>
  </defs>

  <rect width="1200" height="340" fill="#ffffff"/>

  <text x="600" y="32" font-size="15" fill="#1f1f1f" text-anchor="middle" font-weight="bold">다인자 Apply 사슬 — Pure 로 올린 함수를 Apply 가 한 칸씩 채웁니다</text>
  <text x="600" y="52" font-size="12" fill="#666" text-anchor="middle" font-style="italic">Pure(curried) → Apply(email) → Apply(pw) → Apply(age) → Apply(tier) → Valid(User)</text>

  <rect x="20" y="100" width="1160" height="110" fill="#f4f9ff" stroke="none" rx="12"/>

  <!-- Box 1 — Pure(curried) -->
  <rect x="40" y="128" width="160" height="64" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2.2" rx="6"/>
  <text x="120" y="155" font-size="12.5" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">Pure(curried)</text>
  <text x="120" y="176" font-size="11" fill="#0c3a5e" text-anchor="middle">Valid(4인자 함수)</text>

  <line x1="202" y1="160" x2="278" y2="160" stroke="#1f1f1f" stroke-width="2.4" marker-end="url(#arrow-fn)"/>
  <text x="240" y="148" font-size="10.5" fill="#1f1f1f" text-anchor="middle" font-family="'Consolas', monospace">Apply(email)</text>

  <!-- Box 2 -->
  <rect x="280" y="128" width="160" height="64" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2.2" rx="6"/>
  <text x="360" y="165" font-size="12.5" fill="#0c3a5e" text-anchor="middle">Valid(3인자 남음)</text>

  <line x1="442" y1="160" x2="518" y2="160" stroke="#1f1f1f" stroke-width="2.4" marker-end="url(#arrow-fn)"/>
  <text x="480" y="148" font-size="10.5" fill="#1f1f1f" text-anchor="middle" font-family="'Consolas', monospace">Apply(pw)</text>

  <!-- Box 3 -->
  <rect x="520" y="128" width="160" height="64" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2.2" rx="6"/>
  <text x="600" y="165" font-size="12.5" fill="#0c3a5e" text-anchor="middle">Valid(2인자 남음)</text>

  <line x1="682" y1="160" x2="758" y2="160" stroke="#1f1f1f" stroke-width="2.4" marker-end="url(#arrow-fn)"/>
  <text x="720" y="148" font-size="10.5" fill="#1f1f1f" text-anchor="middle" font-family="'Consolas', monospace">Apply(age)</text>

  <!-- Box 4 -->
  <rect x="760" y="128" width="160" height="64" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2.2" rx="6"/>
  <text x="840" y="165" font-size="12.5" fill="#0c3a5e" text-anchor="middle">Valid(1인자 남음)</text>

  <line x1="922" y1="160" x2="998" y2="160" stroke="#1f1f1f" stroke-width="2.4" marker-end="url(#arrow-fn)"/>
  <text x="960" y="148" font-size="10.5" fill="#1f1f1f" text-anchor="middle" font-family="'Consolas', monospace">Apply(tier)</text>

  <!-- Box 5 — Valid(User) -->
  <rect x="1000" y="128" width="160" height="64" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2.2" rx="6"/>
  <text x="1080" y="165" font-size="13" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">Valid(User)</text>

  <text x="600" y="262" font-size="12.5" fill="#5a4400" text-anchor="middle">어느 칸이든 Invalid 면 그 단계의 Apply 가 에러 채널에 오류를 누적합니다 (그림 8-2).</text>
  <text x="600" y="286" font-size="12.5" fill="#5a4400" text-anchor="middle">네 칸이 모두 통과해야 Valid(User), 하나라도 틀리면 누적된 오류의 Invalid 입니다.</text>
</svg>
