<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'Helvetica Neue', 'Noto Sans KR', sans-serif">
  <defs>
    <marker id="arrow-fn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f1f1f"/>
    </marker>
  </defs>

  <rect width="900" height="520" fill="#ffffff"/>

  <text x="450" y="56" font-size="16" font-weight="bold" fill="#1f1f1f" text-anchor="middle">Apply 의 두 채널 — 값은 함수 적용, 에러는 결합</text>

  <!-- 값 채널 (위) -->
  <rect x="40" y="92" width="820" height="120" fill="#f4f9ff" stroke="none" rx="12"/>
  <text x="60" y="118" font-size="13" fill="#1f77b4" font-style="italic" font-weight="bold" letter-spacing="0.5">값 채널 (둘 다 Valid)</text>

  <rect x="150" y="135" width="150" height="52" fill="#d9ead3" stroke="#38761d" stroke-width="2" rx="6"/>
  <text x="225" y="167" font-size="15" fill="#1c3a0d" text-anchor="middle" font-family="'Consolas', monospace">Valid(f)</text>
  <rect x="370" y="135" width="150" height="52" fill="#d9ead3" stroke="#38761d" stroke-width="2" rx="6"/>
  <text x="445" y="167" font-size="15" fill="#1c3a0d" text-anchor="middle" font-family="'Consolas', monospace">Valid(a)</text>
  <line x1="520" y1="161" x2="610" y2="161" stroke="#1f1f1f" stroke-width="2.4" marker-end="url(#arrow-fn)"/>
  <text x="565" y="150" font-size="13" fill="#1f1f1f" text-anchor="middle">f(a)</text>
  <rect x="620" y="135" width="180" height="52" fill="#d9ead3" stroke="#38761d" stroke-width="2.4" rx="6"/>
  <text x="710" y="167" font-size="15" fill="#1c3a0d" text-anchor="middle" font-family="'Consolas', monospace">Valid(f(a))</text>

  <!-- 에러 채널 (아래) -->
  <rect x="40" y="240" width="820" height="150" fill="#f3f3f3" stroke="none" rx="12"/>
  <text x="60" y="266" font-size="13" fill="#990000" font-style="italic" font-weight="bold" letter-spacing="0.5">에러 채널 (둘 다 Invalid)</text>

  <rect x="150" y="288" width="150" height="52" fill="#fbe9e9" stroke="#990000" stroke-width="2" rx="6"/>
  <text x="225" y="320" font-size="15" fill="#5a0000" text-anchor="middle" font-family="'Consolas', monospace">[e₁]</text>
  <rect x="370" y="288" width="150" height="52" fill="#fbe9e9" stroke="#990000" stroke-width="2" rx="6"/>
  <text x="445" y="320" font-size="15" fill="#5a0000" text-anchor="middle" font-family="'Consolas', monospace">[e₂]</text>
  <line x1="520" y1="314" x2="610" y2="314" stroke="#1f1f1f" stroke-width="2.4" marker-end="url(#arrow-fn)"/>
  <text x="565" y="303" font-size="15" fill="#990000" text-anchor="middle" font-weight="bold" font-family="'Consolas', monospace">++</text>
  <rect x="620" y="288" width="180" height="52" fill="#fbe9e9" stroke="#990000" stroke-width="2.4" rx="6"/>
  <text x="710" y="320" font-size="15" fill="#5a0000" text-anchor="middle" font-family="'Consolas', monospace">[e₁, e₂]</text>

  <text x="450" y="372" font-size="13" fill="#5a0000" text-anchor="middle" font-style="italic">두 리스트의 결합 = IReadOnlyList 의 Monoid (Order 0, 항등원 = 빈 리스트, 3장)</text>

  <text x="450" y="438" font-size="13" fill="#1f1f1f" text-anchor="middle">한쪽만 Invalid 면 그쪽 에러가, 둘 다 Invalid 면 두 에러가 누적됩니다.</text>
</svg>
