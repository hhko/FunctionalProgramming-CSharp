<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="'Helvetica Neue', 'Noto Sans KR', sans-serif">
  <defs>
    <marker id="arrow-fn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f1f1f"/>
    </marker>
    <marker id="arrow-lift" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f77b4"/>
    </marker>
  </defs>

  <rect width="900" height="560" fill="#ffffff"/>

  <rect x="40" y="40" width="820" height="245" fill="#f4f9ff" stroke="none" rx="12"/>
  <text x="60" y="66" font-size="13" fill="#1f77b4" font-style="italic" font-weight="bold" letter-spacing="0.5">Elevated World</text>

  <!-- 왼쪽: 자료 컨테이너 -->
  <text x="255" y="106" font-size="15" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">Option&lt;int&gt;</text>
  <rect x="195" y="120" width="120" height="72" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2.2" rx="6"/>
  <text x="255" y="166" font-size="26" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">42</text>
  <text x="255" y="232" font-size="13" fill="#0c3a5e" text-anchor="middle" font-style="italic">값을 품음</text>

  <!-- 오른쪽: 함수 효과 -->
  <text x="660" y="106" font-size="15" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">Reader&lt;Env, int&gt;</text>
  <rect x="580" y="120" width="160" height="72" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2.2" rx="6"/>
  <text x="660" y="165" font-size="22" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">Env → int</text>
  <text x="660" y="232" font-size="13" fill="#0c3a5e" text-anchor="middle" font-style="italic">값 대신 함수를 품음</text>

  <rect x="40" y="350" width="820" height="170" fill="#fffdf3" stroke="none" rx="12"/>
  <text x="60" y="376" font-size="13" fill="#bf9000" font-style="italic" font-weight="bold" letter-spacing="0.5">Normal World</text>

  <!-- 왼쪽 끌어내림: 바로 꺼냄 -->
  <rect x="195" y="410" width="120" height="70" fill="#fff2cc" stroke="#bf9000" stroke-width="2.2" rx="6"/>
  <text x="255" y="455" font-size="26" fill="#5a4400" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">42</text>
  <line x1="255" y1="250" x2="255" y2="408" stroke="#1f77b4" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-lift)"/>
  <text x="200" y="332" font-size="15" fill="#1f77b4" text-anchor="end" font-weight="bold" font-family="'Consolas', monospace">바로 꺼냄</text>

  <!-- 오른쪽 끌어내림: Run(env) 로 환경 주입 -->
  <rect x="600" y="410" width="120" height="70" fill="#fff2cc" stroke="#bf9000" stroke-width="2.2" rx="6"/>
  <text x="660" y="455" font-size="24" fill="#5a4400" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">int</text>
  <line x1="660" y1="250" x2="660" y2="408" stroke="#1f77b4" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-lift)"/>
  <text x="678" y="332" font-size="18" fill="#1f77b4" text-anchor="start" font-weight="bold" font-family="'Consolas', monospace">Run(env)</text>

  <rect x="430" y="415" width="96" height="60" fill="#fff2cc" stroke="#bf9000" stroke-width="2.2" rx="6"/>
  <text x="478" y="452" font-size="20" fill="#5a4400" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">env</text>
  <line x1="528" y1="445" x2="596" y2="445" stroke="#1f1f1f" stroke-width="2.4" marker-end="url(#arrow-fn)"/>
  <text x="562" y="434" font-size="14" fill="#1f1f1f" text-anchor="middle" font-weight="bold" font-family="'Consolas', monospace">주입</text>
</svg>
