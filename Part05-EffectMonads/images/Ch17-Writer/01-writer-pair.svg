<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1140 470" font-family="'Helvetica Neue', 'Noto Sans KR', sans-serif">
  <defs>
    <marker id="arrow-fn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f1f1f"/>
    </marker>
    <marker id="arrow-lift" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f77b4"/>
    </marker>
  </defs>

  <rect width="1140" height="470" fill="#ffffff"/>

  <!-- Reader: 함수 시민, 값 한 갈래 -->
  <text x="180" y="52" font-size="14" fill="#555555" text-anchor="middle" font-style="italic">함수 시민 — 입력을 주입해야 값</text>
  <rect x="130" y="66" width="100" height="48" fill="#fff2cc" stroke="#bf9000" stroke-width="2.2" rx="6"/>
  <text x="180" y="97" font-size="18" fill="#5a4400" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">Env</text>
  <line x1="180" y1="116" x2="180" y2="166" stroke="#1f1f1f" stroke-width="2.4" marker-end="url(#arrow-fn)"/>
  <rect x="92" y="168" width="176" height="64" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2.2" rx="6"/>
  <text x="180" y="206" font-size="17" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">Reader&lt;Env, A&gt;</text>
  <line x1="180" y1="234" x2="180" y2="300" stroke="#1f1f1f" stroke-width="2.4" marker-end="url(#arrow-fn)"/>
  <rect x="145" y="302" width="70" height="48" fill="#fff2cc" stroke="#bf9000" stroke-width="2.2" rx="6"/>
  <text x="180" y="333" font-size="20" fill="#5a4400" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">A</text>

  <!-- State: 함수 시민, 값 + 새 상태 두 갈래 -->
  <rect x="510" y="66" width="100" height="48" fill="#fff2cc" stroke="#bf9000" stroke-width="2.2" rx="6"/>
  <text x="560" y="97" font-size="20" fill="#5a4400" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">S</text>
  <line x1="560" y1="116" x2="560" y2="166" stroke="#1f1f1f" stroke-width="2.4" marker-end="url(#arrow-fn)"/>
  <rect x="470" y="168" width="180" height="64" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2.2" rx="6"/>
  <text x="560" y="206" font-size="17" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">State&lt;S, A&gt;</text>
  <line x1="528" y1="234" x2="505" y2="300" stroke="#1f1f1f" stroke-width="2.4" marker-end="url(#arrow-fn)"/>
  <line x1="592" y1="234" x2="615" y2="300" stroke="#1f1f1f" stroke-width="2.4" marker-end="url(#arrow-fn)"/>
  <rect x="465" y="302" width="70" height="48" fill="#fff2cc" stroke="#bf9000" stroke-width="2.2" rx="6"/>
  <text x="500" y="333" font-size="20" fill="#5a4400" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">A</text>
  <rect x="585" y="302" width="70" height="48" fill="#fff2cc" stroke="#bf9000" stroke-width="2.2" rx="6"/>
  <text x="620" y="333" font-size="20" fill="#5a4400" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">S</text>

  <!-- Writer: 쌍 시민, 입력 없이 Run() 으로 꺼냄 -->
  <text x="945" y="52" font-size="14" fill="#555555" text-anchor="middle" font-style="italic">쌍 시민 — 입력 없이 Run() 으로 꺼냄</text>
  <rect x="835" y="138" width="220" height="76" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2.2" rx="6"/>
  <line x1="945" y1="138" x2="945" y2="214" stroke="#1f77b4" stroke-width="1.5"/>
  <text x="890" y="172" font-size="20" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">A</text>
  <text x="890" y="196" font-size="11" fill="#0c3a5e" text-anchor="middle">값</text>
  <text x="1000" y="172" font-size="20" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">W</text>
  <text x="1000" y="196" font-size="11" fill="#0c3a5e" text-anchor="middle">출력</text>
  <text x="945" y="124" font-size="17" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">Writer&lt;W, A&gt;</text>
  <line x1="945" y1="216" x2="945" y2="300" stroke="#1f77b4" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-lift)"/>
  <text x="963" y="262" font-size="16" fill="#1f77b4" text-anchor="start" font-weight="bold" font-family="'Consolas', monospace">Run()</text>
  <rect x="878" y="302" width="134" height="48" fill="#fff2cc" stroke="#bf9000" stroke-width="2.2" rx="6"/>
  <text x="945" y="333" font-size="20" fill="#5a4400" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">(A, W)</text>
</svg>
