<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 340" font-family="'Helvetica Neue', 'Noto Sans KR', sans-serif">
  <defs>
    <marker id="arrow-fn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f1f1f"/>
    </marker>
  </defs>

  <rect width="880" height="340" fill="#ffffff"/>

  <text x="440" y="26" font-size="15" fill="#1f1f1f" text-anchor="middle" font-weight="bold">키-값 컨테이너의 map — 값에만 작용, 키는 보존</text>

  <rect x="30" y="46" width="820" height="252" fill="#f4f9ff" stroke="none" rx="12"/>
  <text x="46" y="66" font-size="11" fill="#1f77b4" font-style="italic" font-weight="bold" letter-spacing="0.4">Elevated World</text>

  <!-- 왼쪽 MyMap -->
  <text x="200" y="92" font-size="12" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">MyMap&lt;string, int&gt;</text>
  <rect x="70" y="102" width="260" height="160" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2.4" rx="8"/>
  <text x="100" y="142" font-size="16" font-family="'Consolas', monospace"><tspan fill="#5a6b7a">apple  :</tspan> <tspan fill="#0c3a5e" font-weight="bold">1000</tspan></text>
  <text x="100" y="185" font-size="16" font-family="'Consolas', monospace"><tspan fill="#5a6b7a">banana :</tspan> <tspan fill="#0c3a5e" font-weight="bold">500</tspan></text>
  <text x="100" y="228" font-size="16" font-family="'Consolas', monospace"><tspan fill="#5a6b7a">cherry :</tspan> <tspan fill="#0c3a5e" font-weight="bold">3000</tspan></text>

  <!-- map 화살표 -->
  <line x1="340" y1="182" x2="538" y2="182" stroke="#1f1f1f" stroke-width="2.4" marker-end="url(#arrow-fn)"/>
  <text x="439" y="172" font-size="15" fill="#1f1f1f" text-anchor="middle" font-weight="bold" font-family="'Consolas', monospace">Map(×1.1)</text>

  <!-- 오른쪽 MyMap -->
  <text x="680" y="92" font-size="12" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">MyMap&lt;string, int&gt;</text>
  <rect x="550" y="102" width="260" height="160" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2.4" rx="8"/>
  <text x="580" y="142" font-size="16" font-family="'Consolas', monospace"><tspan fill="#5a6b7a">apple  :</tspan> <tspan fill="#bf6000" font-weight="bold">1100</tspan></text>
  <text x="580" y="185" font-size="16" font-family="'Consolas', monospace"><tspan fill="#5a6b7a">banana :</tspan> <tspan fill="#bf6000" font-weight="bold">550</tspan></text>
  <text x="580" y="228" font-size="16" font-family="'Consolas', monospace"><tspan fill="#5a6b7a">cherry :</tspan> <tspan fill="#bf6000" font-weight="bold">3300</tspan></text>

  <text x="440" y="286" font-size="12" fill="#5a6b7a" text-anchor="middle">키 (회색) 는 그대로, 값 (주황) 만 변환 — 키는 태그 MapF&lt;Key&gt; 에 갇혀 보존</text>
</svg>
