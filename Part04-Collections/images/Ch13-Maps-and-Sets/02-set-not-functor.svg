<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320" font-family="'Helvetica Neue', 'Noto Sans KR', sans-serif">
  <defs>
    <marker id="arrow-fn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f1f1f"/>
    </marker>
    <marker id="arrow-gap" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#c0392b"/>
    </marker>
  </defs>

  <rect width="960" height="320" fill="#ffffff"/>

  <text x="480" y="28" font-size="15" fill="#1f1f1f" text-anchor="middle" font-weight="bold">집합에 map 이 막히는 이유 — 모양 보존 위반</text>

  <!-- 입력 집합 {1,2,3} -->
  <text x="110" y="92" font-size="12" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">MySet&lt;int&gt;</text>
  <rect x="40" y="104" width="140" height="120" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2.4" rx="8"/>
  <text x="110" y="172" font-size="26" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">{1, 2, 3}</text>
  <text x="110" y="246" font-size="13" fill="#5a6b7a" text-anchor="middle">원소 3 개</text>

  <!-- map 화살표 -->
  <line x1="185" y1="164" x2="305" y2="164" stroke="#1f1f1f" stroke-width="2.4" marker-end="url(#arrow-fn)"/>
  <text x="245" y="152" font-size="14" fill="#1f1f1f" text-anchor="middle" font-weight="bold" font-family="'Consolas', monospace">map(x%2)</text>

  <!-- 변환 결과 [1,0,1] (중복 발생) -->
  <text x="400" y="92" font-size="12" fill="#5a6b7a" text-anchor="middle">변환 결과 (중복 발생)</text>
  <rect x="320" y="104" width="160" height="120" fill="#fbe9e7" stroke="#c0392b" stroke-width="2.4" rx="8"/>
  <text x="400" y="172" font-size="24" fill="#c0392b" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">[1, 0, 1]</text>
  <text x="400" y="246" font-size="13" fill="#c0392b" text-anchor="middle">1 이 두 번 (1, 3 → 1)</text>

  <!-- 중복 제거 화살표 -->
  <line x1="485" y1="164" x2="605" y2="164" stroke="#c0392b" stroke-width="2.4" stroke-dasharray="4 4" marker-end="url(#arrow-gap)"/>
  <text x="545" y="152" font-size="13" fill="#c0392b" text-anchor="middle">중복 제거</text>

  <!-- 결과 집합 {1,0} -->
  <text x="700" y="92" font-size="12" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">MySet&lt;int&gt;</text>
  <rect x="630" y="104" width="140" height="120" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2.4" rx="8"/>
  <text x="700" y="172" font-size="26" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">{1, 0}</text>
  <text x="700" y="246" font-size="13" fill="#c0392b" text-anchor="middle" font-weight="bold">원소 2 개</text>

  <!-- 결론 -->
  <text x="855" y="158" font-size="15" fill="#c0392b" text-anchor="middle" font-weight="bold">3 → 2</text>
  <text x="855" y="180" font-size="12" fill="#c0392b" text-anchor="middle">개수 줄어듦</text>
  <text x="480" y="298" font-size="12.5" fill="#5a6b7a" text-anchor="middle">map 은 원소 개수를 바꾸지 않아야 한다 (모양 보존) — 집합은 이 약속을 못 지켜 Functor 의 경계 사례입니다</text>
</svg>
