<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="'Helvetica Neue', 'Noto Sans KR', sans-serif">
  <defs>
    <marker id="arrow-lift" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f77b4"/>
    </marker>
  </defs>

  <rect width="960" height="520" fill="#ffffff"/>

  <rect x="40" y="50" width="880" height="195" fill="#f4f9ff" stroke="none" rx="12"/>
  <text x="62" y="78" font-size="13" fill="#1f77b4" font-style="italic" font-weight="bold" letter-spacing="0.5">Elevated World</text>
  <text x="62" y="98" font-size="12" fill="#0c3a5e" font-style="italic">컨테이너 / 효과로 끌어올린 값과 함수</text>

  <rect x="150" y="120" width="130" height="66" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2.2" rx="6"/>
  <text x="215" y="162" font-size="22" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">E&lt;a&gt;</text>
  <text x="215" y="218" font-size="11" fill="#0c3a5e" text-anchor="middle">Option&lt;a&gt;, List&lt;a&gt; …</text>

  <rect x="415" y="120" width="130" height="66" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2.2" rx="6"/>
  <text x="480" y="162" font-size="22" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">E&lt;b&gt;</text>
  <text x="480" y="218" font-size="11" fill="#0c3a5e" text-anchor="middle">끌어올린 결과</text>

  <rect x="690" y="120" width="180" height="66" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2.2" rx="6"/>
  <text x="780" y="162" font-size="20" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">E&lt;a → b&gt;</text>
  <text x="780" y="218" font-size="11" fill="#0c3a5e" text-anchor="middle">함수도 끌어올릴 수 있다</text>

  <rect x="40" y="305" width="880" height="180" fill="#fffdf3" stroke="none" rx="12"/>
  <text x="62" y="333" font-size="13" fill="#bf9000" font-style="italic" font-weight="bold" letter-spacing="0.5">Normal World</text>
  <text x="62" y="353" font-size="12" fill="#5a4400" font-style="italic">일상의 값과 함수</text>

  <rect x="150" y="375" width="130" height="66" fill="#fff2cc" stroke="#bf9000" stroke-width="2.2" rx="6"/>
  <text x="215" y="417" font-size="24" fill="#5a4400" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">a</text>
  <text x="215" y="465" font-size="11" fill="#5a4400" text-anchor="middle">int, string, User …</text>

  <rect x="415" y="375" width="130" height="66" fill="#fff2cc" stroke="#bf9000" stroke-width="2.2" rx="6"/>
  <text x="480" y="417" font-size="24" fill="#5a4400" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">b</text>
  <text x="480" y="465" font-size="11" fill="#5a4400" text-anchor="middle">평범한 결과</text>

  <rect x="690" y="375" width="180" height="66" fill="#fff2cc" stroke="#bf9000" stroke-width="2.2" rx="6"/>
  <text x="780" y="417" font-size="22" fill="#5a4400" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">a → b</text>
  <text x="780" y="465" font-size="11" fill="#5a4400" text-anchor="middle">평범한 함수</text>

  <line x1="215" y1="372" x2="215" y2="189" stroke="#1f77b4" stroke-width="3" stroke-linecap="round" stroke-dasharray="6 5" marker-end="url(#arrow-lift)"/>
  <line x1="480" y1="372" x2="480" y2="189" stroke="#1f77b4" stroke-width="3" stroke-linecap="round" stroke-dasharray="6 5" marker-end="url(#arrow-lift)"/>
  <line x1="780" y1="372" x2="780" y2="189" stroke="#1f77b4" stroke-width="3" stroke-linecap="round" stroke-dasharray="6 5" marker-end="url(#arrow-lift)"/>
  <text x="500" y="280" font-size="14" fill="#1f77b4" text-anchor="middle" font-style="italic" font-weight="bold">끌어올림 (lift)</text>
</svg>
