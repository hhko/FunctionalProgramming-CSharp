<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" font-family="'Helvetica Neue', 'Noto Sans KR', sans-serif">
  <defs>
    <marker id="arrow-lift" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f77b4"/>
    </marker>
  </defs>
  <rect width="1200" height="540" fill="#ffffff"/>

  <!-- ============================================================ -->
  <!-- 그리기 순서:                                                  -->
  <!--   1. 배경 두 band (Elevated / Normal)                         -->
  <!--   2. 모든 박스 (Elevated 5 + Normal 2)                        -->
  <!--   3. Elevated 안 사슬 화살표 + 라벨                            -->
  <!--   4. pure / fold 두 세계 가로지르는 선 (마지막에 그려 박스 위) -->
  <!-- ============================================================ -->

  <!-- (1) 두 band 배경 -->
  <rect x="20" y="60" width="1160" height="220" fill="#f4f9ff" stroke="none" rx="12"/>
  <text x="40" y="88" font-size="14" fill="#1f77b4" font-weight="bold" font-style="italic" letter-spacing="0.5">Elevated World</text>

  <!-- (1-b) K마커 — E 자리에 어떤 컨테이너든 들어간다는 안내 -->
  <rect x="640" y="72" width="540" height="40" fill="#fff7ee" stroke="#cc6600" stroke-width="2" rx="6"/>
  <text x="660" y="97" font-size="15" fill="#5a2e00" font-family="'Consolas', monospace">E 자리에 무엇이든: Option·Result·Task·List …</text>

  <rect x="20" y="320" width="1160" height="200" fill="#fffdf3" stroke="none" rx="12"/>
  <text x="40" y="348" font-size="14" fill="#bf9000" font-weight="bold" font-style="italic" letter-spacing="0.5">Normal World</text>

  <!-- (2-a) Elevated 박스 5 개 -->
  <rect x="105" y="150" width="110" height="80" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2.5" rx="6"/>
  <text x="160" y="198" font-size="20" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">E&lt;a&gt;</text>

  <rect x="325" y="150" width="110" height="80" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2.5" rx="6"/>
  <text x="380" y="198" font-size="20" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">E&lt;b&gt;</text>

  <rect x="545" y="150" width="110" height="80" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2.5" rx="6"/>
  <text x="600" y="198" font-size="20" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">E&lt;c&gt;</text>

  <rect x="765" y="150" width="110" height="80" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2.5" rx="6"/>
  <text x="820" y="202" font-size="30" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">…</text>

  <rect x="985" y="150" width="110" height="80" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2.5" rx="6"/>
  <text x="1040" y="198" font-size="20" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">E&lt;z&gt;</text>

  <!-- (2-b) Normal 박스 2 개 (수직 중앙 y=380~460) -->
  <rect x="105" y="380" width="110" height="80" fill="#fff2cc" stroke="#bf9000" stroke-width="2.5" rx="6"/>
  <text x="160" y="432" font-size="28" fill="#5a4400" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">a</text>

  <rect x="985" y="380" width="110" height="80" fill="#fff2cc" stroke="#bf9000" stroke-width="2.5" rx="6"/>
  <text x="1040" y="432" font-size="28" fill="#5a4400" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">z</text>

  <!-- (3) Elevated 안 사슬 화살표 + 라벨 -->
  <line x1="215" y1="190" x2="320" y2="190" stroke="#1f77b4" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-lift)"/>
  <text x="267" y="178" font-size="16" fill="#1f77b4" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">map</text>

  <line x1="435" y1="190" x2="540" y2="190" stroke="#1f77b4" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-lift)"/>
  <text x="487" y="178" font-size="16" fill="#1f77b4" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">bind</text>

  <line x1="655" y1="190" x2="760" y2="190" stroke="#1f77b4" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-lift)"/>
  <text x="707" y="178" font-size="16" fill="#1f77b4" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">map</text>

  <line x1="875" y1="190" x2="980" y2="190" stroke="#1f77b4" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-lift)"/>
  <text x="927" y="178" font-size="16" fill="#1f77b4" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">map</text>

  <!-- (4) pure / fold — *마지막에 그려* 모든 박스 위에 표시 -->
  <!-- pure: a 박스 상단 (y=380) → E<a> 박스 하단 (y=230) -->
  <line x1="160" y1="380" x2="160" y2="230" stroke="#1f77b4" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-lift)"/>
  <text x="185" y="312" font-size="18" fill="#1f77b4" font-weight="bold" font-family="'Consolas', monospace">pure</text>

  <!-- fold: E<z> 박스 하단 (y=230) → z 박스 상단 (y=380) -->
  <line x1="1040" y1="230" x2="1040" y2="380" stroke="#1f77b4" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-lift)"/>
  <text x="1065" y="312" font-size="18" fill="#1f77b4" font-weight="bold" font-family="'Consolas', monospace">fold</text>
</svg>
