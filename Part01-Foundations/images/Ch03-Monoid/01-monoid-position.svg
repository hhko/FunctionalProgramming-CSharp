<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 470" font-family="'Helvetica Neue', 'Noto Sans KR', sans-serif">
  <rect width="980" height="470" fill="#ffffff"/>

  <text x="490" y="36" font-size="17" fill="#1f1f1f" text-anchor="middle" font-weight="bold">Monoid 의 위치 — Order 0 (Normal World 아래) vs Order 1 (Elevated World 위)</text>

  <!-- Order 1 band (top, blue / Elevated) -->
  <rect x="40" y="64" width="900" height="150" fill="#f4f9ff" rx="12"/>
  <text x="62" y="90" font-size="13" fill="#1f77b4" font-weight="bold" letter-spacing="0.3">Order 1 — Elevated World 위 · kind  * → * · 컨테이너 (4 ~ 9 장)</text>
  <rect x="62" y="104" width="150" height="44" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2" rx="6"/>
  <text x="137" y="131" font-size="13" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace">Functor</text>
  <rect x="226" y="104" width="150" height="44" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2" rx="6"/>
  <text x="301" y="131" font-size="13" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace">Foldable</text>
  <rect x="390" y="104" width="150" height="44" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2" rx="6"/>
  <text x="465" y="131" font-size="13" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace">Monad</text>
  <rect x="554" y="104" width="170" height="44" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2" rx="6"/>
  <text x="639" y="131" font-size="13" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace">Traversable</text>
  <text x="760" y="131" font-size="13" fill="#1f77b4">…</text>
  <text x="62" y="180" font-size="12" fill="#0c3a5e">자료: <tspan font-family="'Consolas', monospace">MyList&lt;a&gt;</tspan> (3-tuple: 자료 / 태그 / trait) · <tspan font-weight="bold">K&lt;F, A&gt; 필요</tspan> · 능력은 static abstract</text>
  <text x="62" y="200" font-size="12" fill="#0c3a5e">컨테이너 종류가 능력을 가진다 — <tspan font-family="'Consolas', monospace">MyListF.Map(f, fa)</tspan></text>

  <!-- middle: shared tools -->
  <rect x="300" y="226" width="380" height="34" fill="#ffffff" stroke="#999" stroke-width="1.4" stroke-dasharray="4 3" rx="8"/>
  <text x="490" y="248" font-size="12.5" fill="#555" text-anchor="middle"><tspan font-weight="bold">공통 도구</tspan>: self-bound (<tspan font-family="'Consolas', monospace">where A : Trait&lt;A&gt;</tspan>) + static abstract</text>

  <!-- Order 0 band (bottom, gold / Normal) -->
  <rect x="40" y="274" width="900" height="150" fill="#fffdf3" rx="12"/>
  <text x="62" y="300" font-size="13" fill="#bf9000" font-weight="bold" letter-spacing="0.3">Order 0 — Normal World 아래 · kind  * · 완성 타입 (3 장, 이 장)</text>
  <rect x="62" y="314" width="170" height="44" fill="#fff2cc" stroke="#bf9000" stroke-width="2" rx="6"/>
  <text x="147" y="341" font-size="13" fill="#5a4400" text-anchor="middle" font-family="'Consolas', monospace">Semigroup</text>
  <rect x="246" y="314" width="170" height="44" fill="#fde9b8" stroke="#bf9000" stroke-width="2.6" rx="6"/>
  <text x="331" y="341" font-size="13" fill="#5a4400" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">Monoid</text>
  <text x="62" y="390" font-size="12" fill="#5a4400">자료: <tspan font-family="'Consolas', monospace">struct Sum : Monoid&lt;Sum&gt;</tspan> (1-tuple: 자료가 trait 직접 구현) · <tspan font-weight="bold">K&lt;F, A&gt; 불필요</tspan></text>
  <text x="62" y="410" font-size="12" fill="#5a4400">값이 능력을 가진다 — <tspan font-family="'Consolas', monospace">a.Combine(b)</tspan> (instance) · 항등원은 <tspan font-family="'Consolas', monospace">Sum.Empty</tspan> (static)</text>
</svg>
