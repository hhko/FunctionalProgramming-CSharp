  <text x="670" y="148" font-size="22" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">E&lt;a&gt;</text>

  <text x="450" y="255" font-size="42" fill="#1f77b4" text-anchor="middle" font-weight="bold" font-family="'Consolas', monospace">≡</text>

