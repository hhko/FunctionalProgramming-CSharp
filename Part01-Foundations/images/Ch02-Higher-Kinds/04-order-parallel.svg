<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 560" font-family="'Helvetica Neue', 'Noto Sans KR', sans-serif">
  <defs>
    <marker id="arrow-parallel" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#888"/>
    </marker>
  </defs>

  <rect width="1100" height="560" fill="#ffffff"/>

  <text x="550" y="40" font-size="16" fill="#1f1f1f" text-anchor="middle" font-weight="bold">Order 단계 — 값 차원과 타입 차원의 평행</text>

  <!-- 타입 차원 띠 (위) -->
  <rect x="40" y="80" width="1020" height="170" fill="#f4f9ff" stroke="none" rx="12"/>
  <text x="60" y="106" font-size="13" fill="#1f77b4" font-weight="bold" letter-spacing="0.5">타입 차원 (kind)</text>

  <!-- Order 0 (타입) -->
  <rect x="100" y="125" width="260" height="100" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2.2" rx="6"/>
  <text x="230" y="150" font-size="13" fill="#0c3a5e" text-anchor="middle" font-weight="bold">Order 0</text>
  <text x="230" y="172" font-size="14" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">kind  *</text>
  <text x="230" y="195" font-size="12" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace">Int, List&lt;Int&gt;</text>
  <text x="230" y="215" font-size="11" fill="#0c3a5e" text-anchor="middle" font-style="italic">완성 타입</text>

  <!-- Order 1 (타입) -->
  <rect x="420" y="125" width="260" height="100" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2.2" rx="6"/>
  <text x="550" y="150" font-size="13" fill="#0c3a5e" text-anchor="middle" font-weight="bold">Order 1</text>
  <text x="550" y="172" font-size="14" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">kind  * → *</text>
  <text x="550" y="195" font-size="12" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace">List, Option, Task</text>
  <text x="550" y="215" font-size="11" fill="#0c3a5e" text-anchor="middle" font-style="italic">type constructor</text>

  <!-- Order 2 (타입) — Higher -->
  <rect x="740" y="125" width="260" height="100" fill="#d1e9fa" stroke="#1f77b4" stroke-width="3.5" rx="6"/>
  <text x="870" y="150" font-size="13" fill="#0c3a5e" text-anchor="middle" font-weight="bold">Order 2 (HKT)</text>
  <text x="870" y="172" font-size="14" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">kind  (* → *) → ...</text>
  <text x="870" y="195" font-size="12" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace">Functor f, Monad f</text>
  <text x="870" y="215" font-size="11" fill="#0c3a5e" text-anchor="middle" font-style="italic">HKT — type constructor 를 받음</text>

  <!-- 가운데 평행 매핑 (세로 점선 3 개) -->
  <line x1="230" y1="250" x2="230" y2="310" stroke="#888" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#arrow-parallel)" marker-start="url(#arrow-parallel)"/>
  <line x1="550" y1="250" x2="550" y2="310" stroke="#888" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#arrow-parallel)" marker-start="url(#arrow-parallel)"/>
  <line x1="870" y1="250" x2="870" y2="310" stroke="#888" stroke-width="2" stroke-dasharray="4 4" marker-end="url(#arrow-parallel)" marker-start="url(#arrow-parallel)"/>
  <text x="550" y="285" font-size="12" fill="#666" text-anchor="middle">↕ 같은 Order ↕</text>

  <!-- 값 차원 띠 (아래) -->
  <rect x="40" y="320" width="1020" height="170" fill="#fffdf3" stroke="none" rx="12"/>
  <text x="60" y="346" font-size="13" fill="#bf9000" font-weight="bold" letter-spacing="0.5">값 차원 (함수)</text>

  <!-- Order 0 (값) -->
  <rect x="100" y="365" width="260" height="100" fill="#fff2cc" stroke="#bf9000" stroke-width="2.2" rx="6"/>
  <text x="230" y="390" font-size="13" fill="#5a4400" text-anchor="middle" font-weight="bold">Order 0</text>
  <text x="230" y="412" font-size="14" fill="#5a4400" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">Int</text>
  <text x="230" y="435" font-size="12" fill="#5a4400" text-anchor="middle" font-family="'Consolas', monospace">5, 42</text>
  <text x="230" y="455" font-size="11" fill="#5a4400" text-anchor="middle" font-style="italic">평범한 값</text>

  <!-- Order 1 (값) -->
  <rect x="420" y="365" width="260" height="100" fill="#fff2cc" stroke="#bf9000" stroke-width="2.2" rx="6"/>
  <text x="550" y="390" font-size="13" fill="#5a4400" text-anchor="middle" font-weight="bold">Order 1</text>
  <text x="550" y="412" font-size="14" fill="#5a4400" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">Int → Int</text>
  <text x="550" y="435" font-size="12" fill="#5a4400" text-anchor="middle" font-family="'Consolas', monospace">x =&gt; x * 2</text>
  <text x="550" y="455" font-size="11" fill="#5a4400" text-anchor="middle" font-style="italic">평범한 함수</text>

  <!-- Order 2 (값) — HOF -->
  <rect x="740" y="365" width="260" height="100" fill="#fde9b8" stroke="#bf9000" stroke-width="3.5" rx="6"/>
  <text x="870" y="390" font-size="13" fill="#5a4400" text-anchor="middle" font-weight="bold">Order 2 (HOF)</text>
  <text x="870" y="412" font-size="14" fill="#5a4400" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">(Int → Int) → Int</text>
  <text x="870" y="435" font-size="12" fill="#5a4400" text-anchor="middle" font-family="'Consolas', monospace">fn =&gt; fn(5)</text>
  <text x="870" y="455" font-size="11" fill="#5a4400" text-anchor="middle" font-style="italic">HOF — 함수를 받음</text>

  <!-- 다인자 ≠ 고차 안내 박스 -->
  <rect x="100" y="505" width="900" height="40" fill="#ffffff" stroke="#999999" stroke-width="1.5" stroke-dasharray="4 3" rx="6"/>
  <text x="550" y="530" font-size="12" fill="#666" text-anchor="middle"><tspan font-weight="bold">다인자 ≠ 고차</tspan>  ·  (Int, Int) → Int / Dictionary&lt;K, V&gt; 는 Higher 아님</text>
</svg>
