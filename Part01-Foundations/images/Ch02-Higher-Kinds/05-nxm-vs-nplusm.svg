<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 480" font-family="'Helvetica Neue', 'Noto Sans KR', sans-serif">
  <defs>
    <marker id="arrow-big" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#444"/>
    </marker>
    <linearGradient id="grad-nxm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd6d0"/>
      <stop offset="100%" stop-color="#fab5ac"/>
    </linearGradient>
    <linearGradient id="grad-nplusm-trait" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cdf2d7"/>
      <stop offset="100%" stop-color="#a8e6ba"/>
    </linearGradient>
    <linearGradient id="grad-nplusm-cont" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dff5e6"/>
      <stop offset="100%" stop-color="#bfe9cf"/>
    </linearGradient>
  </defs>

  <rect width="1180" height="480" fill="#ffffff"/>

  <!-- Title -->
  <text x="590" y="34" font-size="18" fill="#1f1f1f" text-anchor="middle" font-weight="bold">N×M    →    N+M</text>

  <!-- ============ LEFT: N×M ============ -->
  <rect x="30" y="80" width="500" height="370" fill="#fff7f5" stroke="none" rx="14"/>
  <text x="280" y="115" font-size="15" fill="#c00" text-anchor="middle" font-weight="bold">객체지향 — N × M</text>

  <!-- 능력 헤더 (3) -->
  <text x="225" y="155" font-size="13" fill="#444" text-anchor="middle" font-weight="bold">Map</text>
  <text x="320" y="155" font-size="13" fill="#444" text-anchor="middle" font-weight="bold">Bind</text>
  <text x="415" y="155" font-size="13" fill="#444" text-anchor="middle" font-weight="bold">Fold</text>

  <!-- 3x3 격자 (9 셀) — 시각적 강조 -->
  <!-- Row 1: List -->
  <text x="125" y="195" font-size="13" fill="#444" text-anchor="end" font-weight="bold">List</text>
  <rect x="180" y="170" width="90" height="50" fill="url(#grad-nxm)" stroke="#c00" stroke-width="2" rx="4"/>
  <rect x="275" y="170" width="90" height="50" fill="url(#grad-nxm)" stroke="#c00" stroke-width="2" rx="4"/>
  <rect x="370" y="170" width="90" height="50" fill="url(#grad-nxm)" stroke="#c00" stroke-width="2" rx="4"/>

  <!-- Row 2: Option -->
  <text x="125" y="250" font-size="13" fill="#444" text-anchor="end" font-weight="bold">Option</text>
  <rect x="180" y="225" width="90" height="50" fill="url(#grad-nxm)" stroke="#c00" stroke-width="2" rx="4"/>
  <rect x="275" y="225" width="90" height="50" fill="url(#grad-nxm)" stroke="#c00" stroke-width="2" rx="4"/>
  <rect x="370" y="225" width="90" height="50" fill="url(#grad-nxm)" stroke="#c00" stroke-width="2" rx="4"/>

  <!-- Row 3: Task -->
  <text x="125" y="305" font-size="13" fill="#444" text-anchor="end" font-weight="bold">Task</text>
  <rect x="180" y="280" width="90" height="50" fill="url(#grad-nxm)" stroke="#c00" stroke-width="2" rx="4"/>
  <rect x="275" y="280" width="90" height="50" fill="url(#grad-nxm)" stroke="#c00" stroke-width="2" rx="4"/>
  <rect x="370" y="280" width="90" height="50" fill="url(#grad-nxm)" stroke="#c00" stroke-width="2" rx="4"/>

  <!-- 9 cell counter (총 비용 숫자) — 큰 강조 -->
  <text x="280" y="380" font-size="40" fill="#c00" text-anchor="middle" font-weight="bold">9</text>
  <text x="280" y="406" font-size="12" fill="#933" text-anchor="middle">= 3 × 3 별개 구현</text>
  <text x="280" y="428" font-size="11" fill="#933" text-anchor="middle">✗ 컨테이너마다 별개 코드</text>

  <!-- ============ 중앙 화살표 ============ -->
  <line x1="545" y1="240" x2="615" y2="240" stroke="#444" stroke-width="4" marker-end="url(#arrow-big)"/>
  <text x="580" y="225" font-size="13" fill="#444" text-anchor="middle" font-weight="bold">절감</text>

  <!-- ============ RIGHT: N+M ============ -->
  <rect x="650" y="80" width="500" height="370" fill="#f4fbf6" stroke="none" rx="14"/>
  <text x="900" y="115" font-size="15" fill="#0a7" text-anchor="middle" font-weight="bold">함수형 — N + M</text>

  <!-- trait 영역 (M=3) — 왼쪽 세로 3 박스 -->
  <text x="745" y="155" font-size="12" fill="#444" text-anchor="middle" font-weight="bold">trait (M=3)</text>
  <rect x="680" y="170" width="130" height="50" fill="url(#grad-nplusm-trait)" stroke="#0a7" stroke-width="2" rx="4"/>
  <text x="745" y="200" font-size="12" fill="#1a5a32" text-anchor="middle" font-weight="bold">Functor&lt;F&gt;</text>
  <rect x="680" y="225" width="130" height="50" fill="url(#grad-nplusm-trait)" stroke="#0a7" stroke-width="2" rx="4"/>
  <text x="745" y="255" font-size="12" fill="#1a5a32" text-anchor="middle" font-weight="bold">Monad&lt;F&gt;</text>
  <rect x="680" y="280" width="130" height="50" fill="url(#grad-nplusm-trait)" stroke="#0a7" stroke-width="2" rx="4"/>
  <text x="745" y="310" font-size="12" fill="#1a5a32" text-anchor="middle" font-weight="bold">Foldable&lt;F&gt;</text>

  <!-- 가운데 + (연결 표시) -->
  <text x="900" y="260" font-size="32" fill="#0a7" text-anchor="middle" font-weight="bold">+</text>

  <!-- 컨테이너 영역 (N=3) — 오른쪽 세로 3 박스 -->
  <text x="1055" y="155" font-size="12" fill="#444" text-anchor="middle" font-weight="bold">컨테이너 (N=3)</text>
  <rect x="990" y="170" width="130" height="50" fill="url(#grad-nplusm-cont)" stroke="#0a7" stroke-width="2" rx="4"/>
  <text x="1055" y="200" font-size="12" fill="#1a5a32" text-anchor="middle" font-weight="bold">MyList</text>
  <rect x="990" y="225" width="130" height="50" fill="url(#grad-nplusm-cont)" stroke="#0a7" stroke-width="2" rx="4"/>
  <text x="1055" y="255" font-size="12" fill="#1a5a32" text-anchor="middle" font-weight="bold">MyOption</text>
  <rect x="990" y="280" width="130" height="50" fill="url(#grad-nplusm-cont)" stroke="#0a7" stroke-width="2" rx="4"/>
  <text x="1055" y="310" font-size="12" fill="#1a5a32" text-anchor="middle" font-weight="bold">MyTask</text>

  <!-- 6 cell counter (총 비용 숫자) — 큰 강조 -->
  <text x="900" y="380" font-size="40" fill="#0a7" text-anchor="middle" font-weight="bold">6</text>
  <text x="900" y="406" font-size="12" fill="#395" text-anchor="middle">= 3 + 3 (trait + 컨테이너)</text>
  <text x="900" y="428" font-size="11" fill="#395" text-anchor="middle">✓ F 자리에 컨테이너만 바꿔 끼움</text>
</svg>
