<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 110" font-family="'Helvetica Neue', 'Noto Sans KR', sans-serif">
  <rect width="950" height="110" fill="#ffffff"/>

  <!-- Code block — soft gray background only, no border -->
  <rect x="20" y="20" width="910" height="70" fill="#f5f5f5" rx="4"/>

  <!-- Line 1 (y=50) — 한 줄, brace 가 코드와 연속 -->
  <text x="40" y="50" font-size="13" fill="#222" font-family="'Consolas', monospace">public interface Functor&lt;F&gt; </text>
  <text x="245" y="50" font-size="13" fill="#cc6600" font-family="'Consolas', monospace" font-weight="bold">where F : Functor&lt;F&gt;</text>
  <text x="400" y="50" font-size="13" fill="#222" font-family="'Consolas', monospace"> { </text>
  <text x="411" y="50" font-size="13" fill="#38761d" font-family="'Consolas', monospace" font-weight="bold">static abstract</text>
  <text x="518" y="50" font-size="13" fill="#222" font-family="'Consolas', monospace"> K&lt;F, B&gt; Map&lt;A, B&gt;(Func&lt;A, B&gt; f, K&lt;F, A&gt; fa); }</text>

  <!-- Annotation ① — under `where F : Functor<F>` -->
  <text x="310" y="78" font-size="13" fill="#cc6600" font-weight="bold" text-anchor="middle">①</text>

  <!-- Annotation ② — under `static abstract` -->
  <text x="465" y="78" font-size="13" fill="#38761d" font-weight="bold" text-anchor="middle">②</text>
</svg>
