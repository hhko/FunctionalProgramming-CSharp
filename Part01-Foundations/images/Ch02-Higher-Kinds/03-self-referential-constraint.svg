<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 150" font-family="'Helvetica Neue', 'Noto Sans KR', sans-serif">
  <rect width="950" height="150" fill="#ffffff"/>

  <text x="40" y="26" font-size="14" fill="#1f1f1f" font-weight="bold">함수형 trait 의 핵심 두 도구</text>

  <!-- Code block — soft gray background only, no border -->
  <rect x="20" y="40" width="910" height="56" fill="#f5f5f5" rx="4"/>

  <!-- Code line (baseline y=74) -->
  <text x="40" y="74" font-size="13" fill="#222" font-family="'Consolas', monospace">public interface Functor&lt;F&gt; </text>
  <text x="245" y="74" font-size="13" fill="#cc6600" font-family="'Consolas', monospace" font-weight="bold">where F : Functor&lt;F&gt;</text>
  <text x="395" y="74" font-size="13" fill="#222" font-family="'Consolas', monospace"> { </text>
  <text x="416" y="74" font-size="13" fill="#38761d" font-family="'Consolas', monospace" font-weight="bold">static abstract</text>
  <text x="523" y="74" font-size="13" fill="#222" font-family="'Consolas', monospace"> K&lt;F, B&gt; Map&lt;A, B&gt;(Func&lt;A, B&gt; f, K&lt;F, A&gt; fa); }</text>

  <!-- Markers + connectors -->
  <text x="320" y="90" font-size="12" fill="#cc6600" font-weight="bold" text-anchor="middle">①</text>
  <line x1="320" y1="96" x2="320" y2="112" stroke="#cc6600" stroke-width="1" stroke-dasharray="2 2"/>
  <text x="465" y="90" font-size="12" fill="#38761d" font-weight="bold" text-anchor="middle">②</text>
  <line x1="465" y1="96" x2="465" y2="112" stroke="#38761d" stroke-width="1" stroke-dasharray="2 2"/>

  <!-- Legend -->
  <text x="40" y="124" font-size="12" fill="#cc6600" font-weight="bold">① self-bound</text>
  <text x="155" y="124" font-size="12" fill="#444">— F 가 Functor 구현체임을 보장 → F 자리에 함수 호출이 가능</text>
  <text x="40" y="144" font-size="12" fill="#38761d" font-weight="bold">② static abstract</text>
  <text x="175" y="144" font-size="12" fill="#444">— 능력이 인스턴스가 아니라 타입(trait)의 정적 멤버에 산다 (C# 11+)</text>
</svg>
