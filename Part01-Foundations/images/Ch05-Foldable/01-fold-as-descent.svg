<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'Helvetica Neue', 'Noto Sans KR', sans-serif">
  <defs>
    <marker id="arrow-lift" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f77b4"/>
    </marker>
  </defs>

  <rect width="900" height="520" fill="#ffffff"/>

  <rect x="40" y="40" width="820" height="220" fill="#f4f9ff" stroke="none" rx="12"/>
  <text x="60" y="66" font-size="13" fill="#1f77b4" font-style="italic" font-weight="bold" letter-spacing="0.5">Elevated World — 여러 원소가 든 컨테이너</text>

  <rect x="170" y="115" width="560" height="120" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2.2" rx="8"/>
  <text x="450" y="138" font-size="14" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">E&lt;a&gt;</text>

  <!-- inner elements -->
  <rect x="200" y="155" width="70" height="60" fill="#fff2cc" stroke="#bf9000" stroke-width="2" rx="4"/>
  <text x="235" y="192" font-size="20" fill="#5a4400" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">a₁</text>

  <rect x="290" y="155" width="70" height="60" fill="#fff2cc" stroke="#bf9000" stroke-width="2" rx="4"/>
  <text x="325" y="192" font-size="20" fill="#5a4400" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">a₂</text>

  <rect x="380" y="155" width="70" height="60" fill="#fff2cc" stroke="#bf9000" stroke-width="2" rx="4"/>
  <text x="415" y="192" font-size="20" fill="#5a4400" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">a₃</text>

  <text x="490" y="192" font-size="22" fill="#0c3a5e" font-weight="bold">…</text>

  <rect x="520" y="155" width="70" height="60" fill="#fff2cc" stroke="#bf9000" stroke-width="2" rx="4"/>
  <text x="555" y="192" font-size="20" fill="#5a4400" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">aₙ</text>

  <rect x="40" y="350" width="820" height="140" fill="#fffdf3" stroke="none" rx="12"/>
  <text x="60" y="376" font-size="13" fill="#bf9000" font-style="italic" font-weight="bold" letter-spacing="0.5">Normal World — 압축된 한 값</text>

  <rect x="400" y="395" width="120" height="70" fill="#fff2cc" stroke="#bf9000" stroke-width="2.2" rx="6"/>
  <text x="460" y="440" font-size="24" fill="#5a4400" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">b</text>

  <line x1="450" y1="240" x2="450" y2="390" stroke="#1f77b4" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-lift)"/>
  <text x="478" y="305" font-size="22" fill="#1f77b4" font-weight="bold" font-family="'Consolas', monospace">fold</text>
  <text x="478" y="328" font-size="12" fill="#1f77b4" font-style="italic">끌어내림</text>

  <text x="450" y="500" font-size="13" fill="#1f1f1f" text-anchor="middle" font-style="italic">fold 는 컨테이너의 원소들을 단계별로 접어 normal 한 값으로 압축합니다</text>
</svg>
