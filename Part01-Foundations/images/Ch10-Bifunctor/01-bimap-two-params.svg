<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'Helvetica Neue', 'Noto Sans KR', sans-serif">
  <defs>
    <marker id="arrow-fn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f1f1f"/>
    </marker>
  </defs>

  <rect width="900" height="520" fill="#ffffff"/>

  <text x="450" y="50" font-size="16" font-weight="bold" fill="#1f1f1f" text-anchor="middle">BiMap — 두 함수로 두 인자를 동시에 변환 (모양 F 보존)</text>

  <!-- 왼쪽 F<L, A> -->
  <rect x="90" y="110" width="220" height="300" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2.4" rx="10"/>
  <text x="200" y="140" font-size="18" fill="#0c3a5e" text-anchor="middle" font-weight="bold" font-family="'Consolas', monospace">F&lt;L, A&gt;</text>
  <rect x="130" y="165" width="140" height="70" fill="#fff2cc" stroke="#bf9000" stroke-width="2" rx="6"/>
  <text x="200" y="208" font-size="22" fill="#5a4400" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">L</text>
  <rect x="130" y="290" width="140" height="70" fill="#fff2cc" stroke="#bf9000" stroke-width="2" rx="6"/>
  <text x="200" y="333" font-size="22" fill="#5a4400" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">A</text>

  <!-- 오른쪽 F<M, B> -->
  <rect x="590" y="110" width="220" height="300" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2.4" rx="10"/>
  <text x="700" y="140" font-size="18" fill="#0c3a5e" text-anchor="middle" font-weight="bold" font-family="'Consolas', monospace">F&lt;M, B&gt;</text>
  <rect x="630" y="165" width="140" height="70" fill="#fff2cc" stroke="#bf9000" stroke-width="2" rx="6"/>
  <text x="700" y="208" font-size="22" fill="#5a4400" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">M</text>
  <rect x="630" y="290" width="140" height="70" fill="#fff2cc" stroke="#bf9000" stroke-width="2" rx="6"/>
  <text x="700" y="333" font-size="22" fill="#5a4400" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">B</text>

  <!-- 두 함수 -->
  <line x1="272" y1="200" x2="628" y2="200" stroke="#1f1f1f" stroke-width="2.4" marker-end="url(#arrow-fn)"/>
  <text x="450" y="188" font-size="18" fill="#1f1f1f" text-anchor="middle" font-weight="bold" font-family="'Consolas', monospace">first : L → M</text>

  <line x1="272" y1="325" x2="628" y2="325" stroke="#1f1f1f" stroke-width="2.4" marker-end="url(#arrow-fn)"/>
  <text x="450" y="313" font-size="18" fill="#1f1f1f" text-anchor="middle" font-weight="bold" font-family="'Consolas', monospace">second : A → B</text>

  <text x="450" y="455" font-size="13" fill="#1f1f1f" text-anchor="middle" font-style="italic">BiMap : (L → M) → (A → B) → F&lt;L, A&gt; → F&lt;M, B&gt;</text>
</svg>
