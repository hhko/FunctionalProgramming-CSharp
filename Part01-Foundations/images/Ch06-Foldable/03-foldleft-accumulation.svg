<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 470" font-family="'Helvetica Neue', 'Noto Sans KR', sans-serif">
  <defs>
    <marker id="arrow-fn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f1f1f"/>
    </marker>
  </defs>

  <rect width="1100" height="470" fill="#ffffff"/>

  <text x="550" y="32" font-size="15" fill="#1f1f1f" text-anchor="middle" font-weight="bold">FoldLeft : seed 0 + [1, 2, 3] → ((0 + 1) + 2) + 3 = 6 (좌 → 우)</text>
  <text x="550" y="52" font-size="12" fill="#666" text-anchor="middle" font-style="italic">왼쪽 끝의 누적값에 한 원소씩 더해 들어가는 흐름</text>

  <rect x="40" y="78" width="1020" height="288" fill="#fffdf3" stroke="none" rx="12"/>
  <text x="60" y="104" font-size="13" fill="#bf9000" font-style="italic" font-weight="bold" letter-spacing="0.5">단계별 누적</text>

  <!-- 입력 잎 행: [1, 2, 3] 가 위에서 차례로 내려와 결합 -->
  <rect x="322" y="124" width="46" height="32" fill="#fff2cc" stroke="#bf9000" stroke-width="2.2" rx="6"/>
  <text x="345" y="146" font-size="16" fill="#5a4400" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">1</text>
  <line x1="345" y1="158" x2="345" y2="216" stroke="#1f1f1f" stroke-width="2.4" marker-end="url(#arrow-fn)"/>

  <rect x="552" y="124" width="46" height="32" fill="#fff2cc" stroke="#bf9000" stroke-width="2.2" rx="6"/>
  <text x="575" y="146" font-size="16" fill="#5a4400" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">2</text>
  <line x1="575" y1="158" x2="575" y2="216" stroke="#1f1f1f" stroke-width="2.4" marker-end="url(#arrow-fn)"/>

  <rect x="817" y="124" width="46" height="32" fill="#fff2cc" stroke="#bf9000" stroke-width="2.2" rx="6"/>
  <text x="840" y="146" font-size="16" fill="#5a4400" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">3</text>
  <line x1="840" y1="158" x2="840" y2="216" stroke="#1f1f1f" stroke-width="2.4" marker-end="url(#arrow-fn)"/>

  <!-- step 0: seed -->
  <rect x="80" y="220" width="100" height="60" fill="#fff2cc" stroke="#bf9000" stroke-width="2.2" rx="6"/>
  <text x="130" y="258" font-size="22" fill="#5a4400" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">0</text>
  <text x="130" y="305" font-size="11" fill="#5a4400" text-anchor="middle" font-style="italic">seed</text>

  <line x1="182" y1="250" x2="288" y2="250" stroke="#1f1f1f" stroke-width="2.4" marker-end="url(#arrow-fn)"/>
  <text x="235" y="240" font-size="14" fill="#1f1f1f" text-anchor="middle" font-weight="bold" font-family="'Consolas', monospace">+ 1</text>
  <text x="235" y="268" font-size="11" fill="#1f1f1f" text-anchor="middle" font-family="'Consolas', monospace">int &#215; int &#8594; int</text>

  <!-- step 1 -->
  <rect x="290" y="220" width="110" height="60" fill="#fff2cc" stroke="#bf9000" stroke-width="2.2" rx="6"/>
  <text x="345" y="258" font-size="18" fill="#5a4400" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">(0+1)=1</text>
  <text x="345" y="305" font-size="11" fill="#5a4400" text-anchor="middle" font-style="italic">단계 1</text>

  <line x1="402" y1="250" x2="508" y2="250" stroke="#1f1f1f" stroke-width="2.4" marker-end="url(#arrow-fn)"/>
  <text x="455" y="240" font-size="14" fill="#1f1f1f" text-anchor="middle" font-weight="bold" font-family="'Consolas', monospace">+ 2</text>
  <text x="455" y="268" font-size="11" fill="#1f1f1f" text-anchor="middle" font-family="'Consolas', monospace">int &#215; int &#8594; int</text>

  <!-- step 2 -->
  <rect x="510" y="220" width="130" height="60" fill="#fff2cc" stroke="#bf9000" stroke-width="2.2" rx="6"/>
  <text x="575" y="258" font-size="16" fill="#5a4400" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">((0+1)+2)=3</text>
  <text x="575" y="305" font-size="11" fill="#5a4400" text-anchor="middle" font-style="italic">단계 2</text>

  <line x1="642" y1="250" x2="748" y2="250" stroke="#1f1f1f" stroke-width="2.4" marker-end="url(#arrow-fn)"/>
  <text x="695" y="240" font-size="14" fill="#1f1f1f" text-anchor="middle" font-weight="bold" font-family="'Consolas', monospace">+ 3</text>
  <text x="695" y="268" font-size="11" fill="#1f1f1f" text-anchor="middle" font-family="'Consolas', monospace">int &#215; int &#8594; int</text>

  <!-- step 3 (final) -->
  <rect x="750" y="220" width="180" height="60" fill="#fff2cc" stroke="#bf9000" stroke-width="3.2" rx="6"/>
  <text x="840" y="258" font-size="14" fill="#5a4400" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">(((0+1)+2)+3)=6</text>
  <text x="840" y="305" font-size="11" fill="#5a4400" text-anchor="middle" font-style="italic">단계 3 — 최종</text>

  <rect x="40" y="386" width="1020" height="68" fill="#f4f9ff" stroke="none" rx="12"/>
  <text x="550" y="416" font-size="14" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace">FoldLeft : ((b, a) → b) → b → E&lt;a&gt; → b</text>
  <text x="550" y="440" font-size="12" fill="#0c3a5e" text-anchor="middle" font-style="italic">누적함수가 (누적값, 원소) → 누적값. 왼쪽 끝에서 시작해 한 원소씩 흡수.</text>
</svg>
