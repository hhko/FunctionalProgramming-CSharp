<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 470" font-family="'Helvetica Neue','Noto Sans KR',sans-serif">
  <defs>
    <marker id="i3d" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker>
    <marker id="i3r" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#c0504d"/></marker>
    <marker id="i3g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#548235"/></marker>
  </defs>
  <rect width="1000" height="470" fill="#ffffff"/>
  <text x="500" y="30" font-size="20" fill="#1f1f1f" text-anchor="middle" font-weight="bold">격리 수준 — 무엇을 "충돌" 로 볼까 (Snapshot vs Serialisable)</text>
  <text x="500" y="54" font-size="13" fill="#888888" text-anchor="middle">트랜잭션이 <tspan font-family="'Consolas',monospace">y</tspan> 를 읽어 <tspan font-family="'Consolas',monospace">x</tspan> 에 쓰는 도중, 다른 스레드가 <tspan font-family="'Consolas',monospace">y</tspan> 를 바꾸면? v5 <tspan font-family="'Consolas',monospace">Isolation</tspan> 의 두 수준입니다.</text>

  <!-- 트랜잭션 -->
  <rect x="300" y="74" width="400" height="62" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2" rx="8"/>
  <text x="500" y="98" font-size="13" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas',monospace">x.Value = y.Value + 1</text>
  <text x="500" y="120" font-size="11" fill="#1f77b4" text-anchor="middle">y 를 읽고 (=2), x 에 씁니다.  처음엔 x=1, y=2</text>
  <!-- 동시 쓰기 -->
  <rect x="724" y="80" width="160" height="50" fill="#fbeceb" stroke="#c0504d" stroke-width="1.8" rx="6"/>
  <text x="804" y="100" font-size="11" fill="#943634" text-anchor="middle">다른 스레드</text>
  <text x="804" y="118" font-size="12" fill="#943634" text-anchor="middle" font-family="'Consolas',monospace">y: 2 → 9</text>
  <line x1="722" y1="105" x2="702" y2="105" stroke="#c0504d" stroke-width="2" marker-end="url(#i3r)"/>

  <!-- Snapshot -->
  <rect x="40" y="162" width="440" height="244" fill="#fef8ea" stroke="none" rx="10"/>
  <text x="260" y="188" font-size="15" fill="#8a6d00" text-anchor="middle" font-weight="bold">Snapshot — 쓴 참조만 검사</text>
  <rect x="62" y="204" width="396" height="36" fill="#ffffff" stroke="#bf9000" stroke-width="1.6" rx="6"/>
  <text x="260" y="227" font-size="12.5" fill="#5a4400" text-anchor="middle" font-family="'Consolas',monospace">검사 대상 = { x }   (y 는 읽기만 → 무시)</text>
  <text x="260" y="266" font-size="12.5" fill="#5a4400" text-anchor="middle">y 가 바뀌어도 신경 쓰지 않습니다.</text>
  <text x="260" y="288" font-size="12.5" fill="#5a4400" text-anchor="middle">→ 재시도 없이 그대로 커밋</text>
  <rect x="130" y="306" width="260" height="40" fill="#fff2cc" stroke="#bf9000" stroke-width="2" rx="6"/>
  <text x="260" y="331" font-size="12.5" fill="#5a4400" text-anchor="middle" font-family="'Consolas',monospace">x = 옛 y + 1 = 3</text>
  <text x="260" y="378" font-size="12" fill="#8a6d00" text-anchor="middle">동시성이 높지만, 읽은 값이 낡을 수 있습니다.</text>

  <!-- Serialisable -->
  <rect x="520" y="162" width="440" height="244" fill="#f3f9f0" stroke="none" rx="10"/>
  <text x="740" y="188" font-size="15" fill="#548235" text-anchor="middle" font-weight="bold">Serialisable — 읽은 참조까지 검사</text>
  <rect x="542" y="204" width="396" height="36" fill="#ffffff" stroke="#548235" stroke-width="1.6" rx="6"/>
  <text x="740" y="227" font-size="12.5" fill="#375623" text-anchor="middle" font-family="'Consolas',monospace">검사 대상 = { x, y }</text>
  <text x="740" y="266" font-size="12.5" fill="#375623" text-anchor="middle">y 가 바뀜 → 충돌로 보고 전체 재시도</text>
  <text x="740" y="288" font-size="12.5" fill="#375623" text-anchor="middle">→ fresh y (=9) 로 다시 계산</text>
  <rect x="610" y="306" width="260" height="40" fill="#e2efda" stroke="#548235" stroke-width="2" rx="6"/>
  <text x="740" y="331" font-size="12.5" fill="#375623" text-anchor="middle" font-family="'Consolas',monospace">x = 새 y + 1 = 10</text>
  <text x="740" y="378" font-size="12" fill="#548235" text-anchor="middle">가장 엄격해 충돌이 잦지만, 읽기·쓰기 일관성을 지킵니다.</text>

  <text x="500" y="436" font-size="13" fill="#1f1f1f" text-anchor="middle">학습용 <tspan font-family="'Consolas',monospace">Atomically</tspan> 는 <tspan font-family="'Consolas',monospace">Reads</tspan> 에 적은 모든 버전을 검증하므로 <tspan font-weight="bold">Serialisable 쪽</tspan>입니다. v5 의 기본은 더 느슨한 <tspan font-weight="bold">Snapshot</tspan> 입니다.</text>
</svg>
