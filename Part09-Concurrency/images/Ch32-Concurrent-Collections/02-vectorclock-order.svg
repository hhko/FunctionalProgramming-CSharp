<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 470" font-family="'Helvetica Neue','Noto Sans KR',sans-serif">
  <defs>
    <marker id="v32g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#548235"/></marker>
    <marker id="v32b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#7a5fb0"/></marker>
    <marker id="v32ax" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#999"/></marker>
  </defs>
  <rect width="1000" height="470" fill="#ffffff"/>
  <text x="500" y="32" font-size="20" fill="#1f1f1f" text-anchor="middle" font-weight="bold"><tspan font-family="'Consolas',monospace">VectorClock</tspan> — 부분 순서로 인과성 판정</text>
  <text x="500" y="56" font-size="13" fill="#888888" text-anchor="middle">성분이 모두 ≤ 면 Before (인과 선행), 한쪽은 크고 한쪽은 작으면 Concurrent (인과 무관).</text>

  <!-- 좌표 격자: x=p1, y=p2 -->
  <line x1="150" y1="380" x2="470" y2="380" stroke="#999" stroke-width="1.6" marker-end="url(#v32ax)"/>
  <line x1="150" y1="380" x2="150" y2="120" stroke="#999" stroke-width="1.6" marker-end="url(#v32ax)"/>
  <text x="478" y="384" font-size="12" fill="#999" font-family="'Consolas',monospace">p1</text>
  <text x="150" y="110" font-size="12" fill="#999" text-anchor="middle" font-family="'Consolas',monospace">p2</text>
  <text x="150" y="400" font-size="10" fill="#999" text-anchor="middle">0</text>
  <text x="270" y="400" font-size="10" fill="#999" text-anchor="middle">1</text>
  <text x="390" y="400" font-size="10" fill="#999" text-anchor="middle">2</text>
  <text x="134" y="384" font-size="10" fill="#999" text-anchor="middle">0</text>
  <text x="134" y="264" font-size="10" fill="#999" text-anchor="middle">1</text>

  <!-- Before: (1,0) → (2,0) -->
  <line x1="284" y1="380" x2="376" y2="380" stroke="#548235" stroke-width="2.6" marker-end="url(#v32g)"/>
  <text x="330" y="370" font-size="11" fill="#548235" text-anchor="middle" font-weight="bold">Before</text>

  <!-- Concurrent: (1,0) <-> (0,1) -->
  <line x1="258" y1="368" x2="162" y2="272" stroke="#7a5fb0" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="178" y="338" font-size="11" fill="#7a5fb0" font-weight="bold">Concurrent</text>

  <!-- Merge: (1,0)+(0,1) -> (1,1) -->
  <line x1="270" y1="368" x2="270" y2="272" stroke="#bf9000" stroke-width="1.6" stroke-dasharray="3 3" marker-end="url(#v32b)"/>
  <line x1="162" y1="260" x2="258" y2="260" stroke="#bf9000" stroke-width="1.6" stroke-dasharray="3 3" marker-end="url(#v32b)"/>
  <text x="356" y="300" font-size="11" fill="#bf9000" text-anchor="middle">Merge (max)</text>

  <!-- 점들 -->
  <circle cx="270" cy="380" r="7" fill="#1f77b4"/>
  <text x="270" y="364" font-size="11" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas',monospace">{p1:1}</text>
  <circle cx="390" cy="380" r="7" fill="#548235"/>
  <text x="408" y="384" font-size="11" fill="#375623" font-family="'Consolas',monospace">{p1:2}</text>
  <circle cx="150" cy="260" r="7" fill="#7a5fb0"/>
  <text x="150" y="244" font-size="11" fill="#5a3f86" text-anchor="middle" font-family="'Consolas',monospace">{p2:1}</text>
  <circle cx="270" cy="260" r="7" fill="#bf9000"/>
  <text x="286" y="250" font-size="11" fill="#8a6d00" font-family="'Consolas',monospace">{p1:1, p2:1}</text>

  <!-- 오른쪽 설명 -->
  <rect x="520" y="92" width="448" height="116" fill="#f3f9f0" stroke="#cfe3c4" stroke-width="1.4" rx="8"/>
  <text x="540" y="116" font-size="13" fill="#548235" font-weight="bold">happens-before (선행)</text>
  <text x="540" y="140" font-size="12" fill="#333" font-family="'Consolas',monospace">{p1:1} vs {p1:2}</text>
  <text x="540" y="162" font-size="12" fill="#333">p1 칸: 1 ≤ 2,  p2 칸: 0 ≤ 0</text>
  <text x="540" y="184" font-size="12" fill="#375623">→ 모든 칸 ≤ → <tspan font-weight="bold">Before</tspan> (한 노드가 진행)</text>

  <rect x="520" y="222" width="448" height="116" fill="#f5f1fa" stroke="#d8cce9" stroke-width="1.4" rx="8"/>
  <text x="540" y="246" font-size="13" fill="#7a5fb0" font-weight="bold">concurrent (인과 무관)</text>
  <text x="540" y="270" font-size="12" fill="#333" font-family="'Consolas',monospace">{p1:1} vs {p2:1}</text>
  <text x="540" y="292" font-size="12" fill="#333">p1 칸: 1 &gt; 0,  p2 칸: 0 &lt; 1</text>
  <text x="540" y="314" font-size="12" fill="#5a3f86">→ 섞임 (한쪽은 크고 한쪽은 작음) → <tspan font-weight="bold">Concurrent</tspan></text>

  <text x="500" y="436" font-size="13" fill="#1f1f1f" text-anchor="middle">메시지를 받으면 두 시계를 칸별 <tspan font-family="'Consolas',monospace">max</tspan> 로 <tspan font-family="'Consolas',monospace">Merge</tspan> 합니다. <tspan font-family="'Consolas',monospace">{p1:1}</tspan> 과 <tspan font-family="'Consolas',monospace">{p2:1}</tspan> 을 합치면 <tspan font-family="'Consolas',monospace">{p1:1, p2:1}</tspan> 이 되어 두 사건을 모두 뒤따릅니다.</text>
</svg>
