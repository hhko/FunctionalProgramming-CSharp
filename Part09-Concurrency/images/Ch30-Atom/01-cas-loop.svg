<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 540" font-family="'Helvetica Neue','Noto Sans KR',sans-serif">
  <defs>
    <marker id="c30g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#548235"/></marker>
    <marker id="c30r" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#c0504d"/></marker>
    <marker id="c30d" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker>
    <marker id="c30y" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#bf9000"/></marker>
  </defs>
  <rect width="1000" height="540" fill="#ffffff"/>
  <text x="500" y="32" font-size="20" fill="#1f1f1f" text-anchor="middle" font-weight="bold"><tspan font-family="'Consolas',monospace">Swap</tspan> 의 CAS 재시도 루프 — 충돌하면 fresh 값으로 다시</text>
  <text x="500" y="56" font-size="13" fill="#888888" text-anchor="middle">두 스레드가 같은 값을 읽고 동시에 바꾸려 하면, CAS 가 한쪽만 통과시키고 진 쪽을 재시도시킵니다.</text>

  <text x="40" y="106" font-size="13" fill="#1f77b4" font-weight="bold">스레드 A</text>
  <rect x="80" y="84" width="158" height="48" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2" rx="6"/>
  <text x="159" y="103" font-size="10.5" fill="#1f77b4" text-anchor="middle">① Volatile.Read</text>
  <text x="159" y="122" font-size="12.5" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas',monospace">current=Counter(10)</text>
  <line x1="240" y1="108" x2="288" y2="108" stroke="#555" stroke-width="2" marker-end="url(#c30d)"/>
  <rect x="290" y="84" width="140" height="48" fill="#f4f4f4" stroke="#999" stroke-width="1.6" rx="6"/>
  <text x="360" y="103" font-size="10.5" fill="#666" text-anchor="middle">② next=f(current)</text>
  <text x="360" y="122" font-size="12.5" fill="#333" text-anchor="middle" font-family="'Consolas',monospace">Counter(11)</text>
  <line x1="432" y1="108" x2="480" y2="108" stroke="#555" stroke-width="2" marker-end="url(#c30d)"/>
  <rect x="482" y="84" width="206" height="48" fill="#e2efda" stroke="#548235" stroke-width="2.2" rx="6"/>
  <text x="585" y="103" font-size="10" fill="#548235" text-anchor="middle">③ CompareExchange(11, 10)</text>
  <text x="585" y="122" font-size="12.5" fill="#375623" text-anchor="middle" font-weight="bold">✓ 성공 (본 10 = 현재 10)</text>
  <line x1="560" y1="134" x2="455" y2="194" stroke="#548235" stroke-width="2" marker-end="url(#c30g)"/>

  <text x="500" y="184" font-size="12" fill="#8a6d00" text-anchor="middle">공유 <tspan font-family="'Consolas',monospace">value</tspan> — CAS 로만 바뀝니다</text>
  <rect x="362" y="196" width="96" height="34" fill="#fff2cc" stroke="#bf9000" stroke-width="2" rx="6"/>
  <text x="410" y="218" font-size="13" fill="#5a4400" text-anchor="middle" font-family="'Consolas',monospace">10</text>
  <line x1="460" y1="213" x2="494" y2="213" stroke="#bf9000" stroke-width="2" marker-end="url(#c30y)"/>
  <text x="477" y="206" font-size="9.5" fill="#bf9000" text-anchor="middle">A</text>
  <rect x="496" y="196" width="96" height="34" fill="#fff2cc" stroke="#bf9000" stroke-width="2" rx="6"/>
  <text x="544" y="218" font-size="13" fill="#5a4400" text-anchor="middle" font-family="'Consolas',monospace">11</text>
  <line x1="594" y1="213" x2="628" y2="213" stroke="#bf9000" stroke-width="2" marker-end="url(#c30y)"/>
  <text x="611" y="206" font-size="9.5" fill="#bf9000" text-anchor="middle">B</text>
  <rect x="630" y="196" width="96" height="34" fill="#fff2cc" stroke="#bf9000" stroke-width="2" rx="6"/>
  <text x="678" y="218" font-size="13" fill="#5a4400" text-anchor="middle" font-family="'Consolas',monospace">12</text>

  <text x="40" y="300" font-size="13" fill="#7a5fb0" font-weight="bold">스레드 B</text>
  <rect x="80" y="278" width="158" height="48" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2" rx="6"/>
  <text x="159" y="297" font-size="10.5" fill="#1f77b4" text-anchor="middle">① Volatile.Read</text>
  <text x="159" y="316" font-size="12.5" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas',monospace">current=Counter(10)</text>
  <line x1="240" y1="302" x2="288" y2="302" stroke="#555" stroke-width="2" marker-end="url(#c30d)"/>
  <rect x="290" y="278" width="140" height="48" fill="#f4f4f4" stroke="#999" stroke-width="1.6" rx="6"/>
  <text x="360" y="297" font-size="10.5" fill="#666" text-anchor="middle">② next=f(current)</text>
  <text x="360" y="316" font-size="12.5" fill="#333" text-anchor="middle" font-family="'Consolas',monospace">Counter(11)</text>
  <line x1="432" y1="302" x2="480" y2="302" stroke="#555" stroke-width="2" marker-end="url(#c30d)"/>
  <rect x="482" y="278" width="206" height="48" fill="#f6dddc" stroke="#c0504d" stroke-width="2.2" rx="6"/>
  <text x="585" y="297" font-size="10" fill="#c0504d" text-anchor="middle">③ CompareExchange(11, 10)</text>
  <text x="585" y="316" font-size="12.5" fill="#943634" text-anchor="middle" font-weight="bold">✗ 실패 (본 10 ≠ 현재 11)</text>

  <path d="M688,302 Q742,302 742,360 Q742,396 250,396 L118,396" fill="none" stroke="#c0504d" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#c30r)"/>
  <text x="430" y="388" font-size="11" fill="#c0504d" text-anchor="middle">재시도 — fresh 값으로 처음부터</text>
  <rect x="80" y="416" width="158" height="48" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2" rx="6"/>
  <text x="159" y="435" font-size="10.5" fill="#1f77b4" text-anchor="middle">① Volatile.Read (fresh)</text>
  <text x="159" y="454" font-size="12.5" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas',monospace">current=Counter(11)</text>
  <line x1="240" y1="440" x2="288" y2="440" stroke="#555" stroke-width="2" marker-end="url(#c30d)"/>
  <rect x="290" y="416" width="140" height="48" fill="#f4f4f4" stroke="#999" stroke-width="1.6" rx="6"/>
  <text x="360" y="435" font-size="10.5" fill="#666" text-anchor="middle">② next=f(current)</text>
  <text x="360" y="454" font-size="12.5" fill="#333" text-anchor="middle" font-family="'Consolas',monospace">Counter(12)</text>
  <line x1="432" y1="440" x2="480" y2="440" stroke="#555" stroke-width="2" marker-end="url(#c30d)"/>
  <rect x="482" y="416" width="206" height="48" fill="#e2efda" stroke="#548235" stroke-width="2.2" rx="6"/>
  <text x="585" y="435" font-size="10" fill="#548235" text-anchor="middle">③ CompareExchange(12, 11)</text>
  <text x="585" y="454" font-size="12.5" fill="#375623" text-anchor="middle" font-weight="bold">✓ 성공 (본 11 = 현재 11)</text>
  <line x1="640" y1="416" x2="690" y2="232" stroke="#548235" stroke-width="2" marker-end="url(#c30g)"/>

  <text x="500" y="508" font-size="13" fill="#1f1f1f" text-anchor="middle"><tspan font-family="'Consolas',monospace">value = Counter(12)</tspan> — 두 증가가 모두 살아남습니다. CAS 는 진 쪽을 덮어쓰지 않고 다시 시켜 갱신 유실이 없습니다.</text>
</svg>
