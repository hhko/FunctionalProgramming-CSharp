<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 470" font-family="'Helvetica Neue','Noto Sans KR',sans-serif">
  <defs>
    <marker id="l3g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#548235"/></marker>
    <marker id="l3r" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#c0504d"/></marker>
    <marker id="l3d" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#777"/></marker>
  </defs>
  <rect width="1000" height="470" fill="#ffffff"/>
  <text x="500" y="30" font-size="20" fill="#1f1f1f" text-anchor="middle" font-weight="bold">비관적 락 vs 낙관적 CAS — 막을까, 충돌하면 다시 할까</text>
  <text x="500" y="54" font-size="13" fill="#888888" text-anchor="middle">락은 한 스레드만 들이고 나머지를 세웁니다. CAS 는 모두 시도하게 두고 진 쪽만 다시 합니다.</text>

  <!-- 왼쪽: 비관적 락 -->
  <rect x="32" y="72" width="446" height="306" fill="#fbeeed" stroke="none" rx="10"/>
  <text x="255" y="98" font-size="15" fill="#c0504d" text-anchor="middle" font-weight="bold">비관적 락 (lock) — 미리 막는다</text>
  <rect x="52" y="132" width="70" height="36" fill="#ffffff" stroke="#c0504d" stroke-width="1.6" rx="6"/>
  <text x="87" y="155" font-size="13" fill="#943634" text-anchor="middle">T1</text>
  <rect x="52" y="228" width="70" height="36" fill="#ffffff" stroke="#c0504d" stroke-width="1.6" rx="6"/>
  <text x="87" y="251" font-size="13" fill="#943634" text-anchor="middle">T2</text>
  <rect x="196" y="120" width="74" height="158" fill="#ffffff" stroke="#777777" stroke-width="2.2" rx="6"/>
  <text x="233" y="190" font-size="13" fill="#555" text-anchor="middle" font-family="'Consolas',monospace">lock</text>
  <text x="233" y="208" font-size="10" fill="#888" text-anchor="middle">한 번에 1</text>
  <line x1="124" y1="150" x2="194" y2="155" stroke="#548235" stroke-width="2.2" marker-end="url(#l3g)"/>
  <text x="158" y="142" font-size="10" fill="#548235" text-anchor="middle">입장</text>
  <line x1="124" y1="246" x2="194" y2="216" stroke="#c0504d" stroke-width="2.2" stroke-dasharray="5 4" marker-end="url(#l3r)"/>
  <text x="150" y="262" font-size="10" fill="#c0504d" text-anchor="middle">대기 (T1 끝까지)</text>
  <rect x="344" y="130" width="110" height="44" fill="#fff2cc" stroke="#bf9000" stroke-width="2" rx="6"/>
  <text x="399" y="157" font-size="13" fill="#5a4400" text-anchor="middle" font-family="'Consolas',monospace">value 갱신</text>
  <line x1="272" y1="152" x2="342" y2="152" stroke="#548235" stroke-width="2.2" marker-end="url(#l3g)"/>
  <text x="255" y="320" font-size="12" fill="#c0504d" text-anchor="middle">한 줄로 세웁니다 — 느리고, 두 락이 엇갈리면</text>
  <text x="255" y="338" font-size="12" fill="#c0504d" text-anchor="middle">교착 (deadlock) 위험까지 따라옵니다.</text>

  <!-- 오른쪽: 낙관적 CAS -->
  <rect x="522" y="72" width="446" height="306" fill="#f3f9f0" stroke="none" rx="10"/>
  <text x="745" y="98" font-size="15" fill="#548235" text-anchor="middle" font-weight="bold">낙관적 CAS — 해 보고 어긋나면 다시</text>
  <rect x="542" y="132" width="70" height="36" fill="#ffffff" stroke="#548235" stroke-width="1.6" rx="6"/>
  <text x="577" y="155" font-size="13" fill="#375623" text-anchor="middle">T1</text>
  <rect x="542" y="228" width="70" height="36" fill="#ffffff" stroke="#7a5fb0" stroke-width="1.6" rx="6"/>
  <text x="577" y="251" font-size="13" fill="#5a3f86" text-anchor="middle">T2</text>
  <rect x="830" y="158" width="110" height="44" fill="#fff2cc" stroke="#bf9000" stroke-width="2" rx="6"/>
  <text x="885" y="185" font-size="13" fill="#5a4400" text-anchor="middle" font-family="'Consolas',monospace">value</text>
  <line x1="614" y1="150" x2="828" y2="172" stroke="#548235" stroke-width="2.2" marker-end="url(#l3g)"/>
  <text x="710" y="142" font-size="10" fill="#548235" text-anchor="middle">읽고 → CAS ✓ 성공</text>
  <line x1="614" y1="246" x2="828" y2="196" stroke="#c0504d" stroke-width="2.2" marker-end="url(#l3r)"/>
  <text x="715" y="262" font-size="10" fill="#c0504d" text-anchor="middle">읽고 → CAS ✗ (값 바뀜)</text>
  <path d="M700,250 Q650,300 600,270 L600,266" fill="none" stroke="#c0504d" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#l3r)"/>
  <text x="650" y="312" font-size="10" fill="#c0504d" text-anchor="middle">fresh 값으로 재시도</text>
  <text x="745" y="338" font-size="12" fill="#548235" text-anchor="middle">막지 않습니다 — 모두 동시에 시도하고, 진 쪽만 다시 합니다.</text>

  <text x="500" y="418" font-size="13" fill="#1f1f1f" text-anchor="middle">CAS 는 "비교" 와 "교환" 이 CPU 의 한 명령이라 그 사이 누구도 끼어들지 못합니다.</text>
  <text x="500" y="440" font-size="13" fill="#1f1f1f" text-anchor="middle">그래서 v5 <tspan font-family="'Consolas',monospace">Atom</tspan> 은 락을 한 줄도 쓰지 않고 CAS 만으로 안전합니다.</text>
</svg>
