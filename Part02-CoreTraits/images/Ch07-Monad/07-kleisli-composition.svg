<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" font-family="'Helvetica Neue', 'Noto Sans KR', sans-serif">
  <defs>
    <marker id="arrow-fn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f1f1f"/>
    </marker>
    <marker id="arrow-lift" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f77b4"/>
    </marker>
  </defs>

  <rect width="800" height="540" fill="#ffffff"/>

  <!-- 두 세계 띠 (그림 7-1 과 같은 배치) -->
  <rect x="40" y="70" width="720" height="180" fill="#f4f9ff" stroke="none" rx="12"/>
  <text x="60" y="98" font-size="13" fill="#1f77b4" font-style="italic" font-weight="bold" letter-spacing="0.5">Elevated World</text>
  <rect x="40" y="330" width="720" height="180" fill="#fffdf3" stroke="none" rx="12"/>
  <text x="60" y="358" font-size="13" fill="#bf9000" font-style="italic" font-weight="bold" letter-spacing="0.5">Normal World</text>

  <!-- 박스: a (Normal, 좌하) -->
  <rect x="92" y="388" width="92" height="58" fill="#fff2cc" stroke="#bf9000" stroke-width="2.2" rx="6"/>
  <text x="138" y="424" font-size="22" fill="#5a4400" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">a</text>

  <!-- 박스: E<b> (Elevated, 중상) -->
  <rect x="336" y="126" width="118" height="58" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2.2" rx="6"/>
  <text x="395" y="162" font-size="22" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">E&lt;b&gt;</text>

  <!-- 박스: b (Normal, 중하 — E<b> 바로 아래) -->
  <rect x="349" y="388" width="92" height="58" fill="#fff2cc" stroke="#bf9000" stroke-width="2.2" rx="6"/>
  <text x="395" y="424" font-size="22" fill="#5a4400" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">b</text>

  <!-- 박스: E<c> (Elevated, 우상) -->
  <rect x="610" y="126" width="118" height="58" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2.2" rx="6"/>
  <text x="669" y="162" font-size="22" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">E&lt;c&gt;</text>

  <!-- f : a → E<b> (검정 함수 화살표) -->
  <line x1="178" y1="392" x2="350" y2="184" stroke="#1f1f1f" stroke-width="2.4" marker-end="url(#arrow-fn)"/>
  <text x="145" y="300" font-size="16" fill="#1f1f1f" font-weight="bold" font-family="'Consolas', monospace">f : a → E&lt;b&gt;</text>

  <!-- bind 가 어긋남을 메움: E<b> 에서 b 를 한 층 끌어내림 (그림 7-1 의 빨간 ? 자리) -->
  <line x1="395" y1="186" x2="395" y2="386" stroke="#1f77b4" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-lift)"/>
  <text x="409" y="298" font-size="14" fill="#1f77b4" font-weight="bold" font-style="italic">bind (b 꺼냄)</text>

  <!-- g : b → E<c> (검정 함수 화살표) -->
  <line x1="441" y1="392" x2="624" y2="184" stroke="#1f1f1f" stroke-width="2.4" marker-end="url(#arrow-fn)"/>
  <text x="540" y="300" font-size="16" fill="#1f1f1f" font-weight="bold" font-family="'Consolas', monospace">g : b → E&lt;c&gt;</text>

  <!-- 합성 결과 f >=> g : a → E<c> -->
  <text x="400" y="462" font-size="18" fill="#1f77b4" text-anchor="middle" font-weight="bold" font-family="'Consolas', monospace">f &gt;=&gt; g</text>
  <line x1="138" y1="478" x2="669" y2="478" stroke="#1f77b4" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow-lift)" stroke-dasharray="6 5"/>

  <!-- 하단 설명 -->
  <text x="400" y="518" font-size="13" fill="#8a7a33" text-anchor="middle">bind 가 E&lt;b&gt; 에서 b 를 끌어내려 g 입구에 맞추면, 올림 f → 내림 bind → 올림 g 전체가 한 함수 f &gt;=&gt; g : a → E&lt;c&gt;</text>
</svg>
