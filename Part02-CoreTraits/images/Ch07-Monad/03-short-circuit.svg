<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 360" font-family="'Helvetica Neue', 'Noto Sans KR', sans-serif">
  <defs>
    <marker id="arrow-fn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f1f1f"/>
    </marker>
    <marker id="arrow-skip" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#999999"/>
    </marker>
  </defs>

  <rect width="1000" height="360" fill="#ffffff"/>

  <text x="500" y="34" font-size="15" fill="#1f1f1f" text-anchor="middle" font-weight="bold">단락 회로 — 한 단계가 Nothing 이면 뒤는 평가되지 않습니다</text>
  <text x="500" y="54" font-size="12" fill="#666" text-anchor="middle" font-style="italic">ParseInt("3") · ParseInt("xyz") · ParseInt("5") 를 Bind 로 이은 사슬</text>

  <!-- Box 1 — Just(3) 성공 -->
  <rect x="40" y="120" width="180" height="70" fill="#d9ead3" stroke="#38761d" stroke-width="2.2" rx="6"/>
  <text x="130" y="150" font-size="15" fill="#274e13" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">Just(3)</text>
  <text x="130" y="172" font-size="11" fill="#274e13" text-anchor="middle">ParseInt("3") 성공</text>

  <!-- arrow 1->2 -->
  <line x1="222" y1="155" x2="288" y2="155" stroke="#1f1f1f" stroke-width="2.4" marker-end="url(#arrow-fn)"/>
  <text x="255" y="143" font-size="12" fill="#1f1f1f" text-anchor="middle" font-family="'Consolas', monospace">Bind</text>

  <!-- Box 2 — Nothing (실패 지점) -->
  <rect x="290" y="120" width="180" height="70" fill="#fbe9e9" stroke="#990000" stroke-width="2.6" rx="6"/>
  <text x="380" y="150" font-size="15" fill="#660000" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">Nothing</text>
  <text x="380" y="172" font-size="11" fill="#660000" text-anchor="middle">ParseInt("xyz") 실패</text>

  <!-- arrow 2->3 단락 (점선 회색) -->
  <line x1="472" y1="155" x2="538" y2="155" stroke="#999999" stroke-width="2.2" stroke-dasharray="6 5" marker-end="url(#arrow-skip)"/>
  <text x="505" y="135" font-size="11" fill="#999999" text-anchor="middle">Bind</text>
  <text x="505" y="178" font-size="10.5" fill="#999999" text-anchor="middle">f 호출 안 함</text>

  <!-- Box 3 — 평가 안 됨 (회색 점선) -->
  <rect x="540" y="120" width="180" height="70" fill="#f4f4f4" stroke="#999999" stroke-width="2" stroke-dasharray="6 5" rx="6"/>
  <text x="630" y="150" font-size="14" fill="#999999" text-anchor="middle" font-family="'Consolas', monospace">ParseInt("5")</text>
  <text x="630" y="172" font-size="11" fill="#999999" text-anchor="middle">평가 안 됨 (건너뜀)</text>

  <!-- arrow 3->4 점선 회색 -->
  <line x1="722" y1="155" x2="788" y2="155" stroke="#999999" stroke-width="2.2" stroke-dasharray="6 5" marker-end="url(#arrow-skip)"/>

  <!-- Box 4 — 최종 Nothing -->
  <rect x="790" y="120" width="180" height="70" fill="#fbe9e9" stroke="#990000" stroke-width="2.6" rx="6"/>
  <text x="880" y="150" font-size="15" fill="#660000" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">Nothing</text>
  <text x="880" y="172" font-size="11" fill="#660000" text-anchor="middle">최종 결과</text>

  <text x="500" y="250" font-size="12.5" fill="#5a4400" text-anchor="middle">첫 Nothing 이후 Bind 의 Nothing 가지가 다음 함수를 호출하지 않아, 실패가 사슬을 끊고 곧장 빠져나옵니다.</text>
  <text x="500" y="274" font-size="12.5" fill="#5a4400" text-anchor="middle">명령형의 이른 return 과 같은 효과가 분기 코드 없이 Bind 의 시그니처만으로 일어납니다.</text>
</svg>
