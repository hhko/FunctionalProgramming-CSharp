<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 520" font-family="'Helvetica Neue', 'Noto Sans KR', sans-serif">
  <defs>
    <marker id="arrow-lift-up" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f77b4"/>
    </marker>
    <marker id="arrow-fn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f1f1f"/>
    </marker>
  </defs>

  <rect width="1100" height="520" fill="#ffffff"/>

  <text x="550" y="32" font-size="15" fill="#1f1f1f" text-anchor="middle" font-weight="bold">map 의 끌어올림 vs fold 의 끌어내림 — 같은 격자, 반대 방향</text>

  <rect x="40" y="60" width="1020" height="200" fill="#f4f9ff" stroke="none" rx="12"/>
  <text x="60" y="86" font-size="13" fill="#1f77b4" font-style="italic" font-weight="bold" letter-spacing="0.5">Elevated World</text>

  <!-- map left side: E<a> → E<b> -->
  <rect x="120" y="135" width="120" height="70" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2.2" rx="6"/>
  <text x="180" y="178" font-size="20" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">E&lt;a&gt;</text>

  <rect x="360" y="135" width="120" height="70" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2.2" rx="6"/>
  <text x="420" y="178" font-size="20" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">E&lt;b&gt;</text>

  <!-- map: horizontal Elevated function E<a> → E<b> -->
  <line x1="240" y1="170" x2="360" y2="170" stroke="#1f1f1f" stroke-width="2.4" marker-end="url(#arrow-fn)"/>
  <text x="300" y="128" font-size="16" fill="#1f1f1f" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">Map(f)</text>

  <!-- fold right side: E<a> only at top -->
  <rect x="700" y="135" width="120" height="70" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2.2" rx="6"/>
  <text x="760" y="178" font-size="20" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">E&lt;a&gt;</text>

  <rect x="40" y="300" width="1020" height="200" fill="#fffdf3" stroke="none" rx="12"/>
  <text x="60" y="326" font-size="13" fill="#bf9000" font-style="italic" font-weight="bold" letter-spacing="0.5">Normal World</text>

  <!-- map left side: a → (nothing — both are in Elevated already) -->
  <rect x="120" y="375" width="120" height="70" fill="#fff2cc" stroke="#bf9000" stroke-width="2.2" rx="6"/>
  <text x="180" y="420" font-size="24" fill="#5a4400" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">a</text>

  <rect x="360" y="375" width="120" height="70" fill="#fff2cc" stroke="#bf9000" stroke-width="2.2" rx="6"/>
  <text x="420" y="420" font-size="24" fill="#5a4400" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">b</text>

  <!-- map: horizontal Normal function a → b -->
  <line x1="240" y1="410" x2="360" y2="410" stroke="#1f1f1f" stroke-width="2.4" marker-end="url(#arrow-fn)"/>
  <text x="300" y="398" font-size="16" fill="#1f1f1f" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">f</text>

  <!-- fold right side: b at bottom -->
  <rect x="940" y="375" width="120" height="70" fill="#fff2cc" stroke="#bf9000" stroke-width="2.2" rx="6"/>
  <text x="1000" y="420" font-size="24" fill="#5a4400" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">b</text>

  <!-- map: vertical arrow from Normal up to Elevated (positive direction) -->
  <line x1="180" y1="370" x2="180" y2="213" stroke="#1f77b4" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-lift-up)"/>
  <line x1="420" y1="370" x2="420" y2="213" stroke="#1f77b4" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-lift-up)"/>

  <text x="300" y="275" font-size="22" fill="#1f77b4" text-anchor="middle" font-weight="bold" font-family="'Consolas', monospace">map ↑</text>
  <text x="300" y="296" font-size="12" fill="#1f77b4" text-anchor="middle" font-style="italic">끌어올림 (Normal → Elevated)</text>

  <!-- fold: diagonal arrow from Elevated down to Normal -->
  <line x1="820" y1="205" x2="940" y2="375" stroke="#1f77b4" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-lift-up)"/>
  <text x="900" y="275" font-size="22" fill="#1f77b4" text-anchor="middle" font-weight="bold" font-family="'Consolas', monospace">fold ↓</text>
  <text x="900" y="296" font-size="12" fill="#1f77b4" text-anchor="middle" font-style="italic">끌어내림 (Elevated → Normal)</text>
</svg>
