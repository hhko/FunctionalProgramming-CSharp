<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 450" font-family="'Helvetica Neue', 'Noto Sans KR', sans-serif">
  <defs>
    <marker id="arrow-fn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f1f1f"/>
    </marker>
  </defs>

  <rect width="860" height="450" fill="#ffffff"/>

  <!-- ── MyList: 칸 5개 그대로, 값만 변환 ── -->
  <text x="60" y="42" font-size="14" fill="#0c3a5e" font-weight="bold">MyList — 칸 개수·순서는 그대로, 값만 변환</text>

  <rect x="70" y="62" width="310" height="66" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2.2" rx="8"/>
  <rect x="82" y="78" width="46" height="36" fill="#ffffff" stroke="#1f77b4" stroke-width="1.5" rx="4"/>
  <text x="105" y="103" font-size="17" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">1</text>
  <rect x="137" y="78" width="46" height="36" fill="#ffffff" stroke="#1f77b4" stroke-width="1.5" rx="4"/>
  <text x="160" y="103" font-size="17" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">2</text>
  <rect x="192" y="78" width="46" height="36" fill="#ffffff" stroke="#1f77b4" stroke-width="1.5" rx="4"/>
  <text x="215" y="103" font-size="17" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">3</text>
  <rect x="247" y="78" width="46" height="36" fill="#ffffff" stroke="#1f77b4" stroke-width="1.5" rx="4"/>
  <text x="270" y="103" font-size="17" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">4</text>
  <rect x="302" y="78" width="46" height="36" fill="#ffffff" stroke="#1f77b4" stroke-width="1.5" rx="4"/>
  <text x="325" y="103" font-size="17" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">5</text>

  <text x="437" y="82" font-size="13" fill="#1f1f1f" text-anchor="middle" font-weight="bold" font-family="'Consolas', monospace">Map(n =&gt; n*2)</text>
  <line x1="388" y1="95" x2="486" y2="95" stroke="#1f1f1f" stroke-width="2.4" marker-end="url(#arrow-fn)"/>

  <rect x="488" y="62" width="310" height="66" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2.2" rx="8"/>
  <rect x="500" y="78" width="46" height="36" fill="#ffffff" stroke="#1f77b4" stroke-width="1.5" rx="4"/>
  <text x="523" y="103" font-size="17" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">2</text>
  <rect x="555" y="78" width="46" height="36" fill="#ffffff" stroke="#1f77b4" stroke-width="1.5" rx="4"/>
  <text x="578" y="103" font-size="17" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">4</text>
  <rect x="610" y="78" width="46" height="36" fill="#ffffff" stroke="#1f77b4" stroke-width="1.5" rx="4"/>
  <text x="633" y="103" font-size="17" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">6</text>
  <rect x="665" y="78" width="46" height="36" fill="#ffffff" stroke="#1f77b4" stroke-width="1.5" rx="4"/>
  <text x="688" y="103" font-size="17" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">8</text>
  <rect x="720" y="78" width="46" height="36" fill="#ffffff" stroke="#1f77b4" stroke-width="1.5" rx="4"/>
  <text x="743" y="103" font-size="15" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">10</text>

  <!-- ── MyMaybe: Just / Nothing 분기 그대로 ── -->
  <text x="60" y="212" font-size="14" fill="#0c3a5e" font-weight="bold">MyMaybe — Just / Nothing 분기는 그대로, 값만 변환</text>

  <rect x="70" y="228" width="150" height="48" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2.2" rx="6"/>
  <text x="145" y="258" font-size="17" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">Just(42)</text>
  <text x="357" y="240" font-size="13" fill="#1f1f1f" text-anchor="middle" font-weight="bold" font-family="'Consolas', monospace">Map(n =&gt; n*2)</text>
  <line x1="228" y1="252" x2="486" y2="252" stroke="#1f1f1f" stroke-width="2.4" marker-end="url(#arrow-fn)"/>
  <rect x="488" y="228" width="150" height="48" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2.2" rx="6"/>
  <text x="563" y="258" font-size="17" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">Just(84)</text>

  <rect x="70" y="303" width="150" height="48" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2.2" rx="6"/>
  <text x="145" y="333" font-size="17" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">Nothing</text>
  <text x="357" y="315" font-size="13" fill="#888888" text-anchor="middle" font-style="italic">Map — f 호출 0회</text>
  <line x1="228" y1="327" x2="486" y2="327" stroke="#1f1f1f" stroke-width="2.4" marker-end="url(#arrow-fn)" stroke-dasharray="6 4"/>
  <rect x="488" y="303" width="150" height="48" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2.2" rx="6"/>
  <text x="563" y="333" font-size="17" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">Nothing</text>

  <text x="430" y="410" font-size="13" fill="#555555" text-anchor="middle" font-style="italic">컨테이너 종류(F)·원소 개수·내부 배치는 그대로 — 변한 것은 안의 값뿐입니다</text>
</svg>
