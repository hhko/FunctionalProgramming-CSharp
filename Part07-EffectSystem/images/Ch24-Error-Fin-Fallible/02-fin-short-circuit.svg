<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 400" font-family="'Helvetica Neue','Noto Sans KR',sans-serif">
  <defs>
    <marker id="p24c" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#548235"/>
    </marker>
    <marker id="p24d" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#c0504d"/>
    </marker>
  </defs>
  <rect width="980" height="400" fill="#ffffff"/>

  <text x="490" y="36" font-size="20" fill="#1f1f1f" text-anchor="middle" font-weight="bold"><tspan font-family="'Consolas',monospace">Fin</tspan> 의 <tspan font-family="'Consolas',monospace">Bind</tspan> 단락 — 첫 실패에서 멈추고 이유를 남긴다</text>
  <text x="490" y="60" font-size="13" fill="#888888" text-anchor="middle"><tspan font-family="'Consolas',monospace">Positive(10) ▷ Positive(-5) ▷ Positive(99)</tspan> 를 이어 봅니다.</text>

  <!-- 단계 사슬 -->
  <rect x="60" y="92" width="170" height="56" fill="#dcebd0" stroke="#548235" stroke-width="2" rx="6"/>
  <text x="145" y="116" font-size="13" fill="#375623" text-anchor="middle" font-family="'Consolas',monospace">Positive(10)</text>
  <text x="145" y="136" font-size="13" fill="#375623" text-anchor="middle" font-family="'Consolas',monospace" font-weight="bold">Succ(10)</text>
  <line x1="232" y1="120" x2="288" y2="120" stroke="#548235" stroke-width="2.4" marker-end="url(#p24c)"/>
  <text x="260" y="110" font-size="11" fill="#548235" text-anchor="middle">값 꺼내 잇기</text>

  <rect x="290" y="92" width="170" height="56" fill="#f6dddc" stroke="#c0504d" stroke-width="2.4" rx="6"/>
  <text x="375" y="116" font-size="13" fill="#943634" text-anchor="middle" font-family="'Consolas',monospace">Positive(-5)</text>
  <text x="375" y="136" font-size="13" fill="#943634" text-anchor="middle" font-family="'Consolas',monospace" font-weight="bold">Fail(Error)</text>

  <!-- 단락: 다음 단계 건너뜀 (회색) -->
  <line x1="462" y1="120" x2="518" y2="120" stroke="#bbbbbb" stroke-width="2.4" stroke-dasharray="6 4" marker-end="url(#p24d)"/>
  <text x="490" y="110" font-size="11" fill="#999999" text-anchor="middle">건너뜀</text>
  <rect x="520" y="92" width="170" height="56" fill="#f3f3f3" stroke="#bbbbbb" stroke-width="1.6" stroke-dasharray="5 4" rx="6"/>
  <text x="605" y="116" font-size="13" fill="#aaaaaa" text-anchor="middle" font-family="'Consolas',monospace">Positive(99)</text>
  <text x="605" y="136" font-size="12" fill="#aaaaaa" text-anchor="middle">미실행</text>

  <!-- Error 가 결과까지 직통 -->
  <path d="M375,150 Q375,250 760,250" fill="none" stroke="#c0504d" stroke-width="2.8" marker-end="url(#p24d)"/>
  <rect x="720" y="222" width="200" height="56" fill="#f6dddc" stroke="#c0504d" stroke-width="2.4" rx="6"/>
  <text x="820" y="246" font-size="13" fill="#943634" text-anchor="middle" font-family="'Consolas',monospace" font-weight="bold">Fail(Error)</text>
  <text x="820" y="266" font-size="11" fill="#943634" text-anchor="middle">"-5 은(는) 양수가 아님"</text>
  <text x="540" y="240" font-size="12" fill="#c0504d" text-anchor="middle" font-style="italic">Error 가 결과까지 그대로 (이유 보존)</text>

  <text x="490" y="332" font-size="13" fill="#1f1f1f" text-anchor="middle"><tspan font-family="'Consolas',monospace">Succ</tspan> 는 값을 다음으로 잇고, 첫 <tspan font-family="'Consolas',monospace">Fail</tspan> 에서 뒤 단계를 건너뛰고 곧장 단락합니다.</text>
  <text x="490" y="356" font-size="12" fill="#888888" text-anchor="middle">단락해도 <tspan font-family="'Consolas',monospace">Error</tspan> 가 결과에 남아 "왜 멈췄는지"를 보존합니다.</text>
</svg>
