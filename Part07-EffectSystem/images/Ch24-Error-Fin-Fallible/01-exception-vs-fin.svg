<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 430" font-family="'Helvetica Neue','Noto Sans KR',sans-serif">
  <defs>
    <marker id="p24a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#c0504d"/>
    </marker>
    <marker id="p24b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#548235"/>
    </marker>
  </defs>
  <rect width="980" height="430" fill="#ffffff"/>

  <text x="490" y="36" font-size="20" fill="#1f1f1f" text-anchor="middle" font-weight="bold">예외 대 <tspan font-family="'Consolas',monospace">Fin&lt;A&gt;</tspan> — 흐름 바깥으로 튀나, 값으로 흐르나</text>

  <!-- 왼쪽: 예외 -->
  <text x="245" y="72" font-size="15" fill="#943634" text-anchor="middle" font-weight="bold">예외 — 흐름 바깥으로 튐</text>
  <rect x="80" y="88" width="330" height="250" fill="#fbeceb" stroke="#c0504d" stroke-width="1.8" rx="10"/>
  <rect x="120" y="112" width="250" height="38" fill="#ffffff" stroke="#b0b0b0" stroke-width="1.4" rx="5"/>
  <text x="245" y="136" font-size="13" fill="#444" text-anchor="middle" font-family="'Consolas',monospace">int Parse(string)</text>
  <text x="245" y="170" font-size="12" fill="#943634" text-anchor="middle">시그니처에 실패가 안 보임</text>
  <line x1="245" y1="184" x2="245" y2="214" stroke="#c0504d" stroke-width="2" stroke-dasharray="5 4"/>
  <rect x="150" y="214" width="190" height="36" fill="#f3d4d2" stroke="#c0504d" stroke-width="1.6" rx="5"/>
  <text x="245" y="238" font-size="13" fill="#943634" text-anchor="middle" font-family="'Consolas',monospace">throw</text>
  <!-- 바깥으로 튀는 화살표 -->
  <path d="M340,232 Q400,232 400,150 Q400,108 360,108" fill="none" stroke="#c0504d" stroke-width="2.4" stroke-dasharray="6 4" marker-end="url(#p24a)"/>
  <text x="245" y="290" font-size="12" fill="#943634" text-anchor="middle">호출 흐름을 건너뛰어</text>
  <text x="245" y="310" font-size="12" fill="#943634" text-anchor="middle">바깥 <tspan font-family="'Consolas',monospace">catch</tspan> 로 튐</text>

  <!-- 오른쪽: Fin -->
  <text x="735" y="72" font-size="15" fill="#375623" text-anchor="middle" font-weight="bold"><tspan font-family="'Consolas',monospace">Fin&lt;A&gt;</tspan> — 값으로 흐름 안에</text>
  <rect x="570" y="88" width="330" height="250" fill="#eef6e8" stroke="#548235" stroke-width="1.8" rx="10"/>
  <rect x="610" y="112" width="250" height="38" fill="#ffffff" stroke="#548235" stroke-width="1.4" rx="5"/>
  <text x="735" y="136" font-size="13" fill="#375623" text-anchor="middle" font-family="'Consolas',monospace">Fin&lt;int&gt; Parse(string)</text>
  <text x="735" y="170" font-size="12" fill="#375623" text-anchor="middle">시그니처에 실패가 드러남</text>
  <line x1="735" y1="184" x2="735" y2="208" stroke="#548235" stroke-width="2" marker-end="url(#p24b)"/>
  <rect x="610" y="208" width="120" height="44" fill="#dcebd0" stroke="#548235" stroke-width="1.8" rx="6"/>
  <text x="670" y="235" font-size="13" fill="#375623" text-anchor="middle" font-family="'Consolas',monospace">Succ A</text>
  <rect x="740" y="208" width="120" height="44" fill="#f6dddc" stroke="#c0504d" stroke-width="1.8" rx="6"/>
  <text x="800" y="235" font-size="13" fill="#943634" text-anchor="middle" font-family="'Consolas',monospace">Fail Error</text>
  <text x="735" y="290" font-size="12" fill="#375623" text-anchor="middle">성공·실패를 한 값에 담아</text>
  <text x="735" y="310" font-size="12" fill="#375623" text-anchor="middle">반환값 안에서 정직하게 흐름</text>

  <text x="490" y="392" font-size="13" fill="#1f1f1f" text-anchor="middle">예외는 타입에 안 보이고 흐름을 벗어나지만, <tspan font-family="'Consolas',monospace">Fin</tspan> 은 실패를 <tspan font-weight="bold">값으로</tspan> 시그니처에 드러내 호출한 쪽이 다룹니다.</text>
</svg>
