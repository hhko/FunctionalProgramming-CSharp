<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 410" font-family="'Helvetica Neue','Noto Sans KR',sans-serif">
  <defs>
    <marker id="p26a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f77b4"/>
    </marker>
  </defs>
  <rect width="980" height="410" fill="#ffffff"/>

  <text x="490" y="38" font-size="20" fill="#1f1f1f" text-anchor="middle" font-weight="bold"><tspan font-family="'Consolas',monospace">Eff&lt;RT, A&gt;</tspan> = <tspan font-family="'Consolas',monospace">ReaderT&lt;RT, IO, A&gt;</tspan> — 6부 변환기의 회수</text>
  <text x="490" y="62" font-size="13" fill="#888888" text-anchor="middle">7부의 실무 효과 타입은 새것이 아니라, 6부에서 쌓은 <tspan font-family="'Consolas',monospace">ReaderT</tspan> 스택에 이름표를 붙인 것입니다.</text>

  <!-- 왼쪽: ReaderT 두 빈칸 -->
  <text x="245" y="98" font-size="15" fill="#0c3a5e" text-anchor="middle" font-weight="bold">6부 변환기 <tspan font-family="'Consolas',monospace">ReaderT&lt;Env, M, A&gt;</tspan></text>
  <rect x="110" y="116" width="270" height="62" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2.2" rx="6"/>
  <text x="245" y="144" font-size="14" fill="#0c3a5e" text-anchor="middle" font-weight="bold">환경 의존 (Reader 층)</text>
  <text x="245" y="165" font-size="12" fill="#0c3a5e" text-anchor="middle">바깥 빈칸 <tspan font-family="'Consolas',monospace">Env</tspan></text>
  <rect x="110" y="184" width="270" height="62" fill="#f5f5f5" stroke="#888888" stroke-width="2.2" stroke-dasharray="7 5" rx="6"/>
  <text x="245" y="212" font-size="14" fill="#555555" text-anchor="middle" font-family="'Consolas',monospace" font-weight="bold">내부 모나드 M</text>
  <text x="245" y="233" font-size="12" fill="#777777" text-anchor="middle">안쪽 빈칸</text>

  <!-- 치환 화살표 -->
  <line x1="388" y1="215" x2="478" y2="215" stroke="#1f77b4" stroke-width="2.6" marker-end="url(#p26a)"/>
  <text x="433" y="203" font-size="12" fill="#1f77b4" text-anchor="middle" font-style="italic">두 빈칸을 채우면</text>
  <text x="433" y="146" font-size="12" fill="#1f77b4" text-anchor="middle"><tspan font-family="'Consolas',monospace">Env := RT</tspan></text>
  <text x="433" y="246" font-size="12" fill="#548235" text-anchor="middle"><tspan font-family="'Consolas',monospace">M := IO</tspan></text>

  <!-- 오른쪽: Eff<RT,A> -->
  <text x="735" y="98" font-size="15" fill="#1f1f1f" text-anchor="middle" font-weight="bold">7부 실무 효과 <tspan font-family="'Consolas',monospace">Eff&lt;RT, A&gt;</tspan></text>
  <rect x="600" y="116" width="270" height="62" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2.2" rx="6"/>
  <text x="735" y="144" font-size="14" fill="#0c3a5e" text-anchor="middle" font-weight="bold">런타임 <tspan font-family="'Consolas',monospace">RT</tspan> 주입</text>
  <text x="735" y="165" font-size="12" fill="#0c3a5e" text-anchor="middle">환경 자리에 런타임</text>
  <rect x="600" y="184" width="270" height="62" fill="#e2efda" stroke="#548235" stroke-width="2.2" rx="6"/>
  <text x="735" y="212" font-size="14" fill="#375623" text-anchor="middle" font-family="'Consolas',monospace" font-weight="bold">IO</text>
  <text x="735" y="233" font-size="12" fill="#375623" text-anchor="middle">내부 모나드 자리에 IO</text>

  <text x="735" y="284" font-size="14" fill="#1f1f1f" text-anchor="middle" font-family="'Consolas',monospace" font-weight="bold">Eff&lt;RT, A&gt; = ReaderT&lt;RT, IO, A&gt;</text>

  <rect x="120" y="318" width="740" height="62" fill="#fbfbfb" stroke="#cccccc" stroke-width="1.2" rx="8"/>
  <text x="490" y="346" font-size="13" fill="#1f1f1f" text-anchor="middle">22장이 예고한 다리가 여기서 완성됩니다. <tspan font-weight="bold">변환기는 연습이 아니라 토대였습니다.</tspan></text>
  <text x="490" y="368" font-size="12" fill="#888888" text-anchor="middle">v5 도 글자 그대로 <tspan font-family="'Consolas',monospace">record Eff&lt;RT, A&gt;(ReaderT&lt;RT, IO, A&gt; effect)</tspan> 입니다 (비유 아닌 사실).</text>
</svg>
