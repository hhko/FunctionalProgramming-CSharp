<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 460" font-family="'Helvetica Neue','Noto Sans KR',sans-serif">
  <defs>
    <marker id="p23b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#548235"/>
    </marker>
  </defs>
  <rect width="980" height="460" fill="#ffffff"/>

  <text x="490" y="36" font-size="20" fill="#1f1f1f" text-anchor="middle" font-weight="bold">트램폴린 — 깊은 <tspan font-family="'Consolas',monospace">Bind</tspan> 도 스택을 터뜨리지 않는다</text>

  <!-- 왼쪽: 재귀 (터짐) -->
  <text x="245" y="74" font-size="15" fill="#943634" text-anchor="middle" font-weight="bold">thunk 재귀 — C# 호출 스택</text>
  <rect x="120" y="90" width="250" height="290" fill="#fbeceb" stroke="#c0504d" stroke-width="1.6" rx="8"/>
  <g font-family="'Consolas',monospace" font-size="12" fill="#943634" text-anchor="middle">
    <rect x="150" y="106" width="190" height="30" fill="#f3d4d2" stroke="#c0504d" stroke-width="1.2" rx="4"/><text x="245" y="126">Bind 1</text>
    <rect x="160" y="140" width="180" height="30" fill="#f3d4d2" stroke="#c0504d" stroke-width="1.2" rx="4"/><text x="250" y="160">Bind 2</text>
    <rect x="170" y="174" width="170" height="30" fill="#f3d4d2" stroke="#c0504d" stroke-width="1.2" rx="4"/><text x="255" y="194">Bind 3</text>
    <rect x="180" y="208" width="160" height="30" fill="#f3d4d2" stroke="#c0504d" stroke-width="1.2" rx="4"/><text x="260" y="228">…</text>
    <rect x="190" y="242" width="150" height="30" fill="#f3d4d2" stroke="#c0504d" stroke-width="1.2" rx="4"/><text x="265" y="262">Bind 99998</text>
    <rect x="200" y="276" width="140" height="30" fill="#f3d4d2" stroke="#c0504d" stroke-width="1.2" rx="4"/><text x="270" y="296">Bind 99999</text>
  </g>
  <text x="245" y="334" font-size="22" fill="#c0504d" text-anchor="middle" font-weight="bold">✗ StackOverflow</text>
  <text x="245" y="362" font-size="12" fill="#943634" text-anchor="middle">깊이만큼 호출 스택이 쌓여 터짐</text>

  <!-- 오른쪽: 트램폴린 (평평) -->
  <text x="700" y="74" font-size="15" fill="#375623" text-anchor="middle" font-weight="bold">트램폴린 — while 루프 + 힙 위 conts</text>
  <rect x="540" y="90" width="370" height="290" fill="#eef6e8" stroke="#548235" stroke-width="1.6" rx="8"/>

  <!-- 평평한 루프 -->
  <rect x="565" y="116" width="150" height="120" fill="#ffffff" stroke="#548235" stroke-width="2" rx="6"/>
  <text x="640" y="142" font-size="13" fill="#375623" text-anchor="middle" font-weight="bold">while 루프</text>
  <text x="640" y="166" font-size="11" fill="#375623" text-anchor="middle">깊이 1 고정</text>
  <text x="640" y="188" font-size="11" fill="#375623" text-anchor="middle">Bind → push</text>
  <text x="640" y="206" font-size="11" fill="#375623" text-anchor="middle">Pure → pop</text>
  <text x="640" y="224" font-size="11" fill="#375623" text-anchor="middle">Effect → 실행·pop</text>

  <!-- conts 힙 스택 -->
  <text x="810" y="112" font-size="12" fill="#548235" text-anchor="middle" font-family="'Consolas',monospace">conts (힙)</text>
  <rect x="755" y="120" width="110" height="30" fill="#dcebd0" stroke="#548235" stroke-width="1.2" rx="4"/><text x="810" y="140" font-size="11" fill="#375623" text-anchor="middle" font-family="'Consolas',monospace">x → ×2</text>
  <rect x="755" y="152" width="110" height="30" fill="#dcebd0" stroke="#548235" stroke-width="1.2" rx="4"/><text x="810" y="172" font-size="11" fill="#375623" text-anchor="middle" font-family="'Consolas',monospace">x → +1</text>
  <rect x="755" y="184" width="110" height="30" fill="#f3f8ee" stroke="#9bbd7e" stroke-width="1.2" stroke-dasharray="4 3" rx="4"/><text x="810" y="204" font-size="11" fill="#7a9c5e" text-anchor="middle">…</text>
  <line x1="718" y1="176" x2="752" y2="160" stroke="#548235" stroke-width="2" marker-end="url(#p23b)"/>
  <text x="735" y="250" font-size="11" fill="#548235" text-anchor="middle">연속을 데이터로 쌓고 되감기</text>

  <text x="725" y="334" font-size="20" fill="#548235" text-anchor="middle" font-weight="bold">10만 단계도 안전</text>
  <text x="725" y="362" font-size="12" fill="#375623" text-anchor="middle">깊이가 호출 스택이 아닌 <tspan font-family="'Consolas',monospace">conts</tspan> 에 데이터로 쌓임</text>

  <text x="490" y="420" font-size="13" fill="#1f1f1f" text-anchor="middle">C# 재귀를 힙 위의 명시적 스택으로 바꿨기에, <tspan font-weight="bold">깊이와 무관하게</tspan> 안전합니다.</text>
</svg>
