<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 430" font-family="'Helvetica Neue','Noto Sans KR',sans-serif">
  <defs>
    <marker id="f3b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#1f77b4"/></marker>
    <marker id="f3p" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#7a5fb0"/></marker>
  </defs>
  <rect width="980" height="430" fill="#ffffff"/>
  <text x="490" y="30" font-size="20" fill="#1f1f1f" text-anchor="middle" font-weight="bold">학습용 <tspan font-family="'Consolas',monospace">StreamT</tspan> (당김) vs v5 <tspan font-family="'Consolas',monospace">SourceT</tspan> (접기) — 같은 lazy, 다른 엔진</text>
  <text x="490" y="54" font-size="13" fill="#888888" text-anchor="middle">둘 다 당긴/접은 만큼만 계산합니다. 소비를 보는 방향만 다릅니다.</text>

  <!-- 왼쪽: 학습용 pull -->
  <rect x="32" y="74" width="446" height="276" fill="#eef4fd" stroke="none" rx="10"/>
  <text x="255" y="98" font-size="14" fill="#1f77b4" text-anchor="middle" font-weight="bold">학습용 StreamT — 당김 (pull)</text>
  <text x="255" y="120" font-size="11.5" fill="#1f77b4" text-anchor="middle">소비자가 한 조각씩 끌어당깁니다 (cons-cell).</text>
  <g font-family="'Consolas',monospace" font-size="12">
    <rect x="56" y="146" width="120" height="40" fill="#ffffff" stroke="#1f77b4" stroke-width="1.8" rx="5"/><text x="116" y="164" text-anchor="middle" fill="#0c3a5e">Head</text><text x="116" y="180" text-anchor="middle" fill="#999">Tail ●</text>
    <rect x="200" y="146" width="120" height="40" fill="#ffffff" stroke="#1f77b4" stroke-width="1.8" rx="5"/><text x="260" y="164" text-anchor="middle" fill="#0c3a5e">Head</text><text x="260" y="180" text-anchor="middle" fill="#999">Tail ●</text>
    <rect x="344" y="146" width="110" height="40" fill="#fafafa" stroke="#bbb" stroke-width="1.4" stroke-dasharray="4 3" rx="5"/><text x="399" y="170" text-anchor="middle" fill="#bbb">… 잠김</text>
  </g>
  <line x1="255" y1="232" x2="178" y2="190" stroke="#1f77b4" stroke-width="2.2" marker-end="url(#f3b)"/>
  <rect x="180" y="234" width="150" height="40" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2" rx="6"/>
  <text x="255" y="259" font-size="12" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas',monospace">ToList: Pull 반복</text>
  <text x="255" y="300" font-size="11.5" fill="#1f77b4" text-anchor="middle">소비자가 <tspan font-family="'Consolas',monospace">Pull()</tspan> 을 부를 때만</text>
  <text x="255" y="320" font-size="11.5" fill="#1f77b4" text-anchor="middle">다음 한 칸이 계산됩니다.</text>

  <!-- 오른쪽: v5 fold -->
  <rect x="502" y="74" width="446" height="276" fill="#f5f1fa" stroke="none" rx="10"/>
  <text x="725" y="98" font-size="14" fill="#7a5fb0" text-anchor="middle" font-weight="bold">v5 SourceT — 접기 (fold / push)</text>
  <text x="725" y="120" font-size="11.5" fill="#7a5fb0" text-anchor="middle">스트림이 값을 reducer 로 흘려보내 누적합니다.</text>
  <rect x="524" y="146" width="170" height="40" fill="#ffffff" stroke="#7a5fb0" stroke-width="1.8" rx="5"/>
  <text x="609" y="171" font-size="12" fill="#5a3f86" text-anchor="middle" font-family="'Consolas',monospace">스트림: 1, 2, 3, …</text>
  <line x1="696" y1="166" x2="740" y2="166" stroke="#7a5fb0" stroke-width="2.2" marker-end="url(#f3p)"/>
  <rect x="744" y="146" width="180" height="40" fill="#ece4f5" stroke="#7a5fb0" stroke-width="2" rx="6"/>
  <text x="834" y="164" font-size="11" fill="#5a3f86" text-anchor="middle">Reduce(state, reducer)</text>
  <text x="834" y="180" font-size="11" fill="#5a3f86" text-anchor="middle">누적 → state</text>
  <text x="725" y="232" font-size="11.5" fill="#7a5fb0" text-anchor="middle">reducer 가 <tspan font-family="'Consolas',monospace">Reduced.Done</tspan> 을 주면</text>
  <text x="725" y="252" font-size="11.5" fill="#7a5fb0" text-anchor="middle"><tspan font-family="'Consolas',monospace">Take</tspan> 처럼 조기 종료합니다.</text>
  <rect x="560" y="278" width="330" height="40" fill="#ffffff" stroke="#7a5fb0" stroke-width="1.4" rx="6"/>
  <text x="725" y="303" font-size="11.5" fill="#5a3f86" text-anchor="middle">v5 README: "essentially a fold over the stream"</text>

  <text x="490" y="386" font-size="13" fill="#1f1f1f" text-anchor="middle">무한·대용량을 당긴/접은 만큼만 다룬다는 lazy 의 결과는 같습니다. 학습용은 당김 한 방향을 또렷이 보이려</text>
  <text x="490" y="408" font-size="13" fill="#1f1f1f" text-anchor="middle">cons-cell <tspan font-family="'Consolas',monospace">pull</tspan> 로, v5 는 효율과 자원·취소까지 위해 <tspan font-family="'Consolas',monospace">fold</tspan> 로 — 엔진만 다릅니다.</text>
</svg>
