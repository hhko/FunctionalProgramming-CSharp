<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 440" font-family="'Helvetica Neue','Noto Sans KR',sans-serif">
  <rect width="1000" height="440" fill="#ffffff"/>
  <text x="500" y="30" font-size="20" fill="#1f1f1f" text-anchor="middle" font-weight="bold">왜 셋을 합치나 — 열린 끝을 닫아 실행 가능한 Effect 로</text>
  <text x="500" y="54" font-size="13" fill="#888888" text-anchor="middle">v5 는 파이프의 "닫힘" 을 타입으로 표현합니다. 양끝이 닫혀야 (Effect) 비로소 실행됩니다.</text>

  <!-- 열림/닫힘 범례 -->
  <rect x="650" y="70" width="20" height="20" fill="#cccccc" rx="3"/>
  <text x="678" y="85" font-size="11" fill="#666">닫힘 (Unit / Void)</text>
  <rect x="820" y="70" width="20" height="20" fill="none" stroke="#548235" stroke-width="2" stroke-dasharray="4 3" rx="3"/>
  <text x="848" y="85" font-size="11" fill="#548235">열림 (값 흐름)</text>

  <!-- Producer -->
  <text x="60" y="130" font-size="13" fill="#bf9000" font-weight="bold">Producer</text>
  <rect x="180" y="108" width="44" height="44" fill="#cccccc" rx="4"/>
  <text x="202" y="135" font-size="11" fill="#555" text-anchor="middle" font-family="'Consolas',monospace">Unit</text>
  <rect x="224" y="108" width="280" height="44" fill="#fff2cc" stroke="#bf9000" stroke-width="2" rx="0"/>
  <text x="364" y="135" font-size="13" fill="#5a4400" text-anchor="middle">받을 것 없음 → 값을 yield</text>
  <rect x="504" y="108" width="44" height="44" fill="none" stroke="#548235" stroke-width="2" stroke-dasharray="4 3" rx="4"/>
  <text x="526" y="135" font-size="11" fill="#548235" text-anchor="middle">OUT</text>
  <text x="600" y="135" font-size="12" fill="#888" font-family="'Consolas',monospace">PipeT&lt;Unit, OUT&gt;</text>

  <!-- Pipe -->
  <text x="60" y="190" font-size="13" fill="#1f77b4" font-weight="bold">Pipe</text>
  <rect x="180" y="168" width="44" height="44" fill="none" stroke="#548235" stroke-width="2" stroke-dasharray="4 3" rx="4"/>
  <text x="202" y="195" font-size="11" fill="#548235" text-anchor="middle">IN</text>
  <rect x="224" y="168" width="280" height="44" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2"/>
  <text x="364" y="195" font-size="13" fill="#0c3a5e" text-anchor="middle">받아서 변환해 내보냄</text>
  <rect x="504" y="168" width="44" height="44" fill="none" stroke="#548235" stroke-width="2" stroke-dasharray="4 3" rx="4"/>
  <text x="526" y="195" font-size="11" fill="#548235" text-anchor="middle">OUT</text>
  <text x="600" y="195" font-size="12" fill="#888" font-family="'Consolas',monospace">PipeT&lt;IN, OUT&gt;</text>

  <!-- Consumer -->
  <text x="60" y="250" font-size="13" fill="#548235" font-weight="bold">Consumer</text>
  <rect x="180" y="228" width="44" height="44" fill="none" stroke="#548235" stroke-width="2" stroke-dasharray="4 3" rx="4"/>
  <text x="202" y="255" font-size="11" fill="#548235" text-anchor="middle">IN</text>
  <rect x="224" y="228" width="280" height="44" fill="#e2efda" stroke="#548235" stroke-width="2"/>
  <text x="364" y="255" font-size="13" fill="#375623" text-anchor="middle">받아 접음 → 내보낼 것 없음</text>
  <rect x="504" y="228" width="44" height="44" fill="#cccccc" rx="4"/>
  <text x="526" y="255" font-size="11" fill="#555" text-anchor="middle" font-family="'Consolas',monospace">Void</text>
  <text x="600" y="255" font-size="12" fill="#888" font-family="'Consolas',monospace">PipeT&lt;IN, Void&gt;</text>

  <!-- 합성선 -->
  <text x="500" y="300" font-size="13" fill="#1f1f1f" text-anchor="middle">Producer <tspan font-family="'Consolas',monospace" font-weight="bold">|</tspan> Pipe <tspan font-family="'Consolas',monospace" font-weight="bold">|</tspan> Consumer 로 이으면, 가운데 열린 끝들이 서로 맞물려 닫히고</text>

  <!-- Effect -->
  <text x="60" y="350" font-size="13" fill="#1f1f1f" font-weight="bold">Effect</text>
  <rect x="180" y="328" width="44" height="44" fill="#cccccc" rx="4"/>
  <text x="202" y="355" font-size="11" fill="#555" text-anchor="middle" font-family="'Consolas',monospace">Unit</text>
  <rect x="224" y="328" width="280" height="44" fill="#fbfbe8" stroke="#1f1f1f" stroke-width="2.4" rx="0"/>
  <text x="364" y="354" font-size="12.5" fill="#1f1f1f" text-anchor="middle" font-weight="bold">양끝 닫힘 → 실행 가능</text>
  <rect x="504" y="328" width="44" height="44" fill="#cccccc" rx="4"/>
  <text x="526" y="355" font-size="11" fill="#555" text-anchor="middle" font-family="'Consolas',monospace">Void</text>
  <text x="600" y="355" font-size="12" fill="#888" font-family="'Consolas',monospace">PipeT&lt;Unit, Void&gt;</text>

  <text x="500" y="408" font-size="13" fill="#1f1f1f" text-anchor="middle">학습용은 이 닫힘을 타입으로 인코딩하지 않고, <tspan font-family="'Consolas',monospace">Run</tspan> 이 곧장 결과 <tspan font-family="'Consolas',monospace">R</tspan> 을 냅니다 — 같은 "닫아야 실행" 을 단순화한 모양입니다.</text>
</svg>
