<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 470" font-family="'Helvetica Neue','Noto Sans KR',sans-serif">
  <defs>
    <marker id="e2d" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker>
    <marker id="e2g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#548235"/></marker>
  </defs>
  <rect width="1000" height="470" fill="#ffffff"/>
  <text x="500" y="32" font-size="20" fill="#1f1f1f" text-anchor="middle" font-weight="bold">자원 안전 ETL — <tspan font-family="'Consolas',monospace">bracket</tspan> 으로 감싼 스트림 변환</text>
  <text x="500" y="56" font-size="13" fill="#888888" text-anchor="middle"><tspan font-family="'Consolas',monospace">open file</tspan> → Conduit(파싱 → 임계값 → 합산) → <tspan font-family="'Consolas',monospace">close file</tspan>. <tspan font-family="'Consolas',monospace">try/finally</tspan> 라 예외에도 닫힙니다 (8부 bracket).</text>

  <!-- 바깥 RunOverFile try/finally 박스 -->
  <rect x="40" y="78" width="700" height="356" fill="none" stroke="#555555" stroke-width="2" stroke-dasharray="7 5" rx="12"/>
  <text x="60" y="100" font-size="12.5" fill="#555555" font-weight="bold">RunOverFile — try / finally</text>

  <!-- open -->
  <rect x="270" y="112" width="240" height="38" fill="#fff2cc" stroke="#bf9000" stroke-width="2" rx="6"/>
  <text x="390" y="136" font-size="13" fill="#5a4400" text-anchor="middle" font-family="'Consolas',monospace">events.Add("open file")</text>
  <line x1="390" y1="150" x2="390" y2="172" stroke="#555" stroke-width="2" marker-end="url(#e2d)"/>

  <!-- Conduit 3단계 -->
  <text x="120" y="192" font-size="11" fill="#888">입력 (줄 리스트)</text>
  <rect x="58" y="200" width="120" height="120" fill="#fbfbfb" stroke="#cccccc" stroke-width="1.4" rx="6"/>
  <g font-family="'Consolas',monospace" font-size="12" fill="#444">
    <text x="118" y="222" text-anchor="middle">"10"</text>
    <text x="118" y="244" text-anchor="middle" fill="#c0504d">"bad"</text>
    <text x="118" y="266" text-anchor="middle">"30"</text>
    <text x="118" y="288" text-anchor="middle">"5"</text>
    <text x="118" y="310" text-anchor="middle">"100"</text>
  </g>
  <line x1="180" y1="260" x2="214" y2="260" stroke="#555" stroke-width="1.8" marker-end="url(#e2d)"/>
  <rect x="216" y="234" width="150" height="52" fill="#e8f4fd" stroke="#1f77b4" stroke-width="1.8" rx="6"/>
  <text x="291" y="256" font-size="12" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas',monospace">Choose(파싱)</text>
  <text x="291" y="274" font-size="10" fill="#1f77b4" text-anchor="middle">"bad" 버림 → 10,30,5,100</text>
  <line x1="368" y1="260" x2="400" y2="260" stroke="#555" stroke-width="1.8" marker-end="url(#e2d)"/>
  <rect x="402" y="234" width="150" height="52" fill="#e8f4fd" stroke="#1f77b4" stroke-width="1.8" rx="6"/>
  <text x="477" y="256" font-size="12" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas',monospace">Filter(≥ 20)</text>
  <text x="477" y="274" font-size="10" fill="#1f77b4" text-anchor="middle">5,10 버림 → 30,100</text>
  <line x1="554" y1="260" x2="586" y2="260" stroke="#548235" stroke-width="1.8" marker-end="url(#e2g)"/>
  <rect x="588" y="234" width="120" height="52" fill="#e2efda" stroke="#548235" stroke-width="2.2" rx="6"/>
  <text x="648" y="256" font-size="12" fill="#375623" text-anchor="middle" font-family="'Consolas',monospace">Sum</text>
  <text x="648" y="274" font-size="13" fill="#375623" text-anchor="middle" font-family="'Consolas',monospace" font-weight="bold">130</text>

  <!-- close (finally) -->
  <line x1="390" y1="320" x2="390" y2="352" stroke="#555" stroke-width="2" marker-end="url(#e2d)"/>
  <rect x="240" y="354" width="300" height="40" fill="#fff2cc" stroke="#bf9000" stroke-width="2" rx="6"/>
  <text x="390" y="372" font-size="13" fill="#5a4400" text-anchor="middle" font-family="'Consolas',monospace">events.Add("close file")</text>
  <text x="390" y="387" font-size="10" fill="#8a6d00" text-anchor="middle">finally — 정상에도, 예외에도 반드시</text>

  <!-- 오른쪽 events -->
  <rect x="772" y="150" width="196" height="230" fill="#f3f9f0" stroke="#cfe3c4" stroke-width="1.4" rx="8"/>
  <text x="870" y="176" font-size="13" fill="#548235" text-anchor="middle" font-weight="bold">events</text>
  <text x="790" y="208" font-size="12.5" fill="#375623" font-family="'Consolas',monospace">open file</text>
  <text x="790" y="230" font-size="12.5" fill="#375623">  ↓</text>
  <text x="790" y="252" font-size="12.5" fill="#375623" font-family="'Consolas',monospace">close file</text>
  <line x1="784" y1="268" x2="956" y2="268" stroke="#cfe3c4" stroke-width="1.2"/>
  <text x="790" y="294" font-size="11.5" fill="#548235">정상이든</text>
  <text x="790" y="314" font-size="11.5" fill="#c0504d">sink 가 예외든</text>
  <text x="790" y="338" font-size="11.5" fill="#375623"><tspan font-family="'Consolas',monospace">finally</tspan> 가</text>
  <text x="790" y="358" font-size="11.5" fill="#375623"><tspan font-family="'Consolas',monospace">close file</tspan> 보장</text>

  <text x="500" y="450" font-size="13" fill="#1f1f1f" text-anchor="middle">스트림 변환(Conduit)과 자원 수명(open/close)이 한 파이프라인에 — 8부 <tspan font-family="'Consolas',monospace">bracket</tspan> 의 해제 보장을 스트리밍에 그대로 결합합니다.</text>
</svg>
