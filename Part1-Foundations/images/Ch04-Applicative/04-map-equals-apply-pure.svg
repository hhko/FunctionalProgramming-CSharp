<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 520" font-family="'Helvetica Neue', 'Noto Sans KR', sans-serif">
  <defs>
    <marker id="arrow-fn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f1f1f"/>
    </marker>
    <marker id="arrow-lift" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f77b4"/>
    </marker>
  </defs>

  <rect width="1100" height="520" fill="#ffffff"/>

  <text x="550" y="32" font-size="15" fill="#1f1f1f" text-anchor="middle" font-weight="bold">Map ≡ Apply ∘ Pure — 같은 결과의 두 경로</text>

  <!-- Left panel: Map path -->
  <rect x="40" y="60" width="490" height="430" fill="#f4f9ff" stroke="none" rx="12"/>
  <text x="60" y="86" font-size="13" fill="#1f77b4" font-style="italic" font-weight="bold" letter-spacing="0.5">왼쪽 경로 — Map(f) 한 번</text>

  <rect x="180" y="130" width="160" height="70" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2.2" rx="6"/>
  <text x="260" y="172" font-size="18" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">K&lt;F, a&gt;</text>

  <line x1="260" y1="205" x2="260" y2="285" stroke="#1f1f1f" stroke-width="2.4" marker-end="url(#arrow-fn)"/>
  <text x="285" y="250" font-size="16" fill="#1f1f1f" font-weight="bold" font-family="'Consolas', monospace">Map(f)</text>

  <rect x="180" y="295" width="160" height="70" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2.2" rx="6"/>
  <text x="260" y="337" font-size="18" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">K&lt;F, b&gt;</text>

  <text x="260" y="440" font-size="13" fill="#666" text-anchor="middle" font-style="italic">3 장 Functor 의 단일 사다리</text>

  <!-- Equality sign -->
  <text x="555" y="290" font-size="50" fill="#1f77b4" text-anchor="middle" font-weight="bold" font-family="'Consolas', monospace">≡</text>

  <!-- Right panel: Apply ∘ Pure path -->
  <rect x="580" y="60" width="490" height="430" fill="#f4f9ff" stroke="none" rx="12"/>
  <text x="600" y="86" font-size="13" fill="#1f77b4" font-style="italic" font-weight="bold" letter-spacing="0.5">오른쪽 경로 — Pure(f) 후 Apply</text>

  <rect x="620" y="130" width="160" height="70" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2.2" rx="6"/>
  <text x="700" y="172" font-size="16" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">K&lt;F, a → b&gt;</text>

  <rect x="860" y="130" width="160" height="70" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2.2" rx="6"/>
  <text x="940" y="172" font-size="18" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">K&lt;F, a&gt;</text>

  <text x="820" y="170" font-size="28" fill="#1f77b4" text-anchor="middle" font-weight="bold" font-family="'Consolas', monospace">⊛</text>

  <line x1="820" y1="205" x2="820" y2="285" stroke="#1f1f1f" stroke-width="2.4" marker-end="url(#arrow-fn)"/>
  <text x="845" y="250" font-size="14" fill="#1f1f1f" font-weight="bold" font-family="'Consolas', monospace">apply</text>

  <rect x="740" y="295" width="160" height="70" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2.2" rx="6"/>
  <text x="820" y="337" font-size="18" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">K&lt;F, b&gt;</text>

  <!-- pure label on K<F, a→b> -->
  <text x="700" y="118" font-size="13" fill="#1f77b4" text-anchor="middle" font-style="italic">↑ pure(f)</text>

  <text x="820" y="440" font-size="13" fill="#666" text-anchor="middle" font-style="italic">4 장 Applicative 의 두 도구로 같은 자리 도달</text>
</svg>
