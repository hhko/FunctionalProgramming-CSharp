<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 460" font-family="'Helvetica Neue', 'Noto Sans KR', sans-serif">
  <defs>
    <marker id="arrow-fn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f1f1f"/>
    </marker>
  </defs>

  <rect width="1300" height="460" fill="#ffffff"/>

  <text x="650" y="32" font-size="15" fill="#1f1f1f" text-anchor="middle" font-weight="bold">Lift3 = pure(curry f) → apply × 3 (4 박스 사슬, Lift2 의 자연스러운 일반화)</text>
  <text x="650" y="52" font-size="12" fill="#666" text-anchor="middle" font-style="italic">f : a → b → c → d, 인자 N 개 → (N + 1) 박스 사슬</text>

  <rect x="40" y="80" width="1220" height="220" fill="#f4f9ff" stroke="none" rx="12"/>
  <text x="60" y="106" font-size="13" fill="#1f77b4" font-style="italic" font-weight="bold" letter-spacing="0.5">Elevated World — Lift3 의 4 박스 사슬</text>

  <rect x="80" y="160" width="200" height="80" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2.2" rx="6"/>
  <text x="180" y="195" font-size="13" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">K&lt;F, a→b→c→d&gt;</text>
  <text x="180" y="270" font-size="11" fill="#1f77b4" text-anchor="middle" font-style="italic">pure(curry f)</text>

  <line x1="282" y1="200" x2="338" y2="200" stroke="#1f1f1f" stroke-width="2.4" marker-end="url(#arrow-fn)"/>
  <text x="310" y="188" font-size="13" fill="#1f1f1f" text-anchor="middle" font-weight="bold" font-family="'Consolas', monospace">⊛ xa</text>

  <rect x="340" y="160" width="200" height="80" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2.2" rx="6"/>
  <text x="440" y="200" font-size="14" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">K&lt;F, b→c→d&gt;</text>
  <text x="440" y="270" font-size="11" fill="#1f77b4" text-anchor="middle" font-style="italic">apply(_, xa)</text>

  <line x1="542" y1="200" x2="598" y2="200" stroke="#1f1f1f" stroke-width="2.4" marker-end="url(#arrow-fn)"/>
  <text x="570" y="188" font-size="13" fill="#1f1f1f" text-anchor="middle" font-weight="bold" font-family="'Consolas', monospace">⊛ xb</text>

  <rect x="600" y="160" width="200" height="80" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2.2" rx="6"/>
  <text x="700" y="200" font-size="16" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">K&lt;F, c→d&gt;</text>
  <text x="700" y="270" font-size="11" fill="#1f77b4" text-anchor="middle" font-style="italic">apply(_, xb)</text>

  <line x1="802" y1="200" x2="858" y2="200" stroke="#1f1f1f" stroke-width="2.4" marker-end="url(#arrow-fn)"/>
  <text x="830" y="188" font-size="13" fill="#1f1f1f" text-anchor="middle" font-weight="bold" font-family="'Consolas', monospace">⊛ xc</text>

  <rect x="860" y="160" width="180" height="80" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2.2" rx="6"/>
  <text x="950" y="205" font-size="18" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">K&lt;F, d&gt;</text>
  <text x="950" y="270" font-size="11" fill="#1f77b4" text-anchor="middle" font-style="italic">apply(_, xc)</text>

  <rect x="40" y="330" width="1220" height="110" fill="#fffdf3" stroke="none" rx="12"/>
  <text x="60" y="356" font-size="13" fill="#bf9000" font-style="italic" font-weight="bold" letter-spacing="0.5">Normal World — LiftN 의 일반화</text>
  <text x="650" y="400" font-size="14" fill="#5a4400" text-anchor="middle" font-family="'Consolas', monospace">LiftN(f)(x1,…,xN)  ≡  apply(…apply(apply(pure(curry f), x1), x2)…, xN)</text>
  <text x="650" y="423" font-size="11" fill="#5a4400" text-anchor="middle" font-style="italic">N 이 늘어도 패턴은 같습니다. pure 한 번 + apply N 번.</text>
</svg>
