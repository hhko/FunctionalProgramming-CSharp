<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 460" font-family="'Helvetica Neue', 'Noto Sans KR', sans-serif">
  <defs>
    <marker id="arrow-fn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f1f1f"/>
    </marker>
  </defs>

  <rect width="1100" height="460" fill="#ffffff"/>

  <text x="550" y="32" font-size="15" fill="#1f1f1f" text-anchor="middle" font-weight="bold">FoldLeft : seed 0 + [1, 2, 3] → ((0 + 1) + 2) + 3 = 6 (좌 → 우)</text>
  <text x="550" y="52" font-size="12" fill="#666" text-anchor="middle" font-style="italic">왼쪽 끝의 누적값에 한 원소씩 더해 들어가는 흐름</text>

  <rect x="40" y="80" width="1020" height="190" fill="#fffdf3" stroke="none" rx="12"/>
  <text x="60" y="106" font-size="13" fill="#bf9000" font-style="italic" font-weight="bold" letter-spacing="0.5">단계별 누적</text>

  <!-- step 0: seed -->
  <rect x="80" y="140" width="100" height="60" fill="#fff2cc" stroke="#bf9000" stroke-width="2.2" rx="6"/>
  <text x="130" y="178" font-size="22" fill="#5a4400" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">0</text>
  <text x="130" y="225" font-size="11" fill="#5a4400" text-anchor="middle" font-style="italic">seed</text>

  <line x1="182" y1="170" x2="288" y2="170" stroke="#1f1f1f" stroke-width="2.4" marker-end="url(#arrow-fn)"/>
  <text x="235" y="160" font-size="14" fill="#1f1f1f" text-anchor="middle" font-weight="bold" font-family="'Consolas', monospace">+ 1</text>

  <!-- step 1 -->
  <rect x="290" y="140" width="110" height="60" fill="#fff2cc" stroke="#bf9000" stroke-width="2.2" rx="6"/>
  <text x="345" y="178" font-size="18" fill="#5a4400" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">(0+1)=1</text>
  <text x="345" y="225" font-size="11" fill="#5a4400" text-anchor="middle" font-style="italic">단계 1</text>

  <line x1="402" y1="170" x2="508" y2="170" stroke="#1f1f1f" stroke-width="2.4" marker-end="url(#arrow-fn)"/>
  <text x="455" y="160" font-size="14" fill="#1f1f1f" text-anchor="middle" font-weight="bold" font-family="'Consolas', monospace">+ 2</text>

  <!-- step 2 -->
  <rect x="510" y="140" width="130" height="60" fill="#fff2cc" stroke="#bf9000" stroke-width="2.2" rx="6"/>
  <text x="575" y="178" font-size="16" fill="#5a4400" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">((0+1)+2)=3</text>
  <text x="575" y="225" font-size="11" fill="#5a4400" text-anchor="middle" font-style="italic">단계 2</text>

  <line x1="642" y1="170" x2="748" y2="170" stroke="#1f1f1f" stroke-width="2.4" marker-end="url(#arrow-fn)"/>
  <text x="695" y="160" font-size="14" fill="#1f1f1f" text-anchor="middle" font-weight="bold" font-family="'Consolas', monospace">+ 3</text>

  <!-- step 3 (final) -->
  <rect x="750" y="140" width="180" height="60" fill="#fff2cc" stroke="#bf9000" stroke-width="2.2" rx="6"/>
  <text x="840" y="178" font-size="14" fill="#5a4400" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">(((0+1)+2)+3)=6</text>
  <text x="840" y="225" font-size="11" fill="#5a4400" text-anchor="middle" font-style="italic">단계 3 — 최종</text>

  <rect x="40" y="300" width="1020" height="130" fill="#f4f9ff" stroke="none" rx="12"/>
  <text x="60" y="326" font-size="13" fill="#1f77b4" font-style="italic" font-weight="bold" letter-spacing="0.5">시그니처</text>
  <text x="550" y="365" font-size="14" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace">FoldLeft : ((b, a) → b) → b → E&lt;a&gt; → b</text>
  <text x="550" y="395" font-size="12" fill="#0c3a5e" text-anchor="middle" font-style="italic">누적함수가 (누적값, 원소) → 누적값. 왼쪽 끝에서 시작해 한 원소씩 흡수.</text>
</svg>
