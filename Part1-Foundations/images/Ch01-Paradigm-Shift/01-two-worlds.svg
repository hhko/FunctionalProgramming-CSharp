<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 50 960 440" font-family="'Helvetica Neue', 'Noto Sans KR', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
  </defs>
  <rect width="960" height="540" fill="#ffffff"/>

  <!-- Elevated World band -->
  <rect x="40" y="60" width="880" height="180" fill="#f7faff" stroke="#1f77b4" stroke-width="1" rx="6"/>
  <text x="60" y="90" font-size="20" fill="#0c3a5e" font-weight="bold">Elevated World</text>
  <text x="60" y="112" font-size="13" fill="#0c3a5e" font-style="italic">컨테이너 / 효과로 끌어올린 값들</text>

  <!-- Elevated value boxes -->
  <rect x="180" y="140" width="120" height="70" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2.5" rx="6"/>
  <text x="240" y="180" font-size="22" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace">E&lt;a&gt;</text>
  <text x="240" y="225" font-size="12" fill="#0c3a5e" text-anchor="middle">Option&lt;a&gt;, List&lt;a&gt;, Result&lt;a&gt; …</text>

  <rect x="420" y="140" width="120" height="70" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2.5" rx="6"/>
  <text x="480" y="180" font-size="22" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace">E&lt;b&gt;</text>
  <text x="480" y="225" font-size="12" fill="#0c3a5e" text-anchor="middle">끌어올린 결과</text>

  <rect x="660" y="140" width="160" height="70" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2.5" rx="6"/>
  <text x="740" y="180" font-size="20" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace">E&lt;a → b&gt;</text>
  <text x="740" y="225" font-size="12" fill="#0c3a5e" text-anchor="middle">함수도 끌어올릴 수 있다</text>

  <!-- Dashed boundary -->
  <line x1="40" y1="280" x2="920" y2="280" stroke="#999" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="480" y="275" font-size="11" fill="#666" text-anchor="middle">─── 두 세계의 경계 ───</text>

  <!-- Normal World band -->
  <rect x="40" y="300" width="880" height="180" fill="#fffdf7" stroke="#bf9000" stroke-width="1" rx="6"/>
  <text x="60" y="330" font-size="20" fill="#594300" font-weight="bold">Normal World</text>
  <text x="60" y="352" font-size="13" fill="#594300" font-style="italic">일상의 값과 함수</text>

  <!-- Normal value boxes -->
  <rect x="180" y="380" width="120" height="70" fill="#fff2cc" stroke="#bf9000" stroke-width="2" rx="6"/>
  <text x="240" y="422" font-size="24" fill="#594300" text-anchor="middle" font-family="'Consolas', monospace">a</text>
  <text x="240" y="468" font-size="12" fill="#594300" text-anchor="middle">int, string, User …</text>

  <rect x="420" y="380" width="120" height="70" fill="#fff2cc" stroke="#bf9000" stroke-width="2" rx="6"/>
  <text x="480" y="422" font-size="24" fill="#594300" text-anchor="middle" font-family="'Consolas', monospace">b</text>
  <text x="480" y="468" font-size="12" fill="#594300" text-anchor="middle">평범한 결과</text>

  <rect x="660" y="380" width="160" height="70" fill="#fff2cc" stroke="#bf9000" stroke-width="2" rx="6"/>
  <text x="740" y="422" font-size="22" fill="#594300" text-anchor="middle" font-family="'Consolas', monospace">a → b</text>
  <text x="740" y="468" font-size="12" fill="#594300" text-anchor="middle">평범한 함수</text>

  <!-- Vertical hint arrows (lift) -->
  <line x1="240" y1="375" x2="240" y2="215" stroke="#1f77b4" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text x="252" y="300" font-size="12" fill="#1f77b4" font-style="italic">끌어올림</text>
</svg>
