<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" font-family="'Helvetica Neue','Noto Sans KR',sans-serif">
  <defs>
    <marker id="ae-a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#548235"/></marker>
    <marker id="ae-g" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#999"/></marker>
  </defs>
  <rect width="900" height="470" fill="#ffffff"/>
  <text x="450" y="28" font-size="19" fill="#1f1f1f" text-anchor="middle" font-weight="bold">applicative 누적 vs monadic 단락 — 모든 오류를 모은다</text>
  <text x="450" y="50" font-size="12.5" fill="#555" text-anchor="middle">입력 <tspan font-family="'Consolas',monospace" fill="#7a2b28">Register("ab", "no-at", 200)</tspan> — 세 검증이 모두 실패 (uV · eV · aV = Invalid)</text>

  <!-- TOP: applicative / Map3 -->
  <rect x="22" y="64" width="856" height="158" fill="#f3f8ef" stroke="#cfe0c2" rx="8"/>
  <text x="40" y="86" font-size="14" fill="#375623" font-weight="bold">applicative · Map3  →  누적</text>
  <g font-family="'Consolas',monospace" font-size="11.5">
    <rect x="48" y="98" width="150" height="30" fill="#fbeeee" stroke="#c0504d" stroke-width="1.5" stroke-dasharray="5 3" rx="4"/><text x="123" y="118" fill="#7a2b28" text-anchor="middle">uV "ab 너무 짧음"</text>
    <rect x="48" y="134" width="150" height="30" fill="#fbeeee" stroke="#c0504d" stroke-width="1.5" stroke-dasharray="5 3" rx="4"/><text x="123" y="154" fill="#7a2b28" text-anchor="middle">eV "@ 없음"</text>
    <rect x="48" y="170" width="150" height="30" fill="#fbeeee" stroke="#c0504d" stroke-width="1.5" stroke-dasharray="5 3" rx="4"/><text x="123" y="190" fill="#7a2b28" text-anchor="middle">aV "200 범위 밖"</text>
    <rect x="372" y="124" width="150" height="50" fill="#e2efda" stroke="#548235" stroke-width="2" rx="6"/>
    <text x="447" y="146" fill="#375623" text-anchor="middle" font-weight="bold">Map3</text>
    <text x="447" y="164" fill="#548235" text-anchor="middle" font-size="10">[..uV, ..eV, ..aV]</text>
    <rect x="636" y="118" width="226" height="62" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2" rx="6"/>
    <text x="749" y="139" fill="#0c3a5e" text-anchor="middle" font-weight="bold">Invalid([3개 오류])</text>
    <text x="749" y="158" fill="#1f77b4" text-anchor="middle" font-size="9.5">"ab 짧음" · "@ 없음" · "범위 밖"</text>
    <text x="749" y="172" fill="#777" text-anchor="middle" font-size="9.5" font-family="'Noto Sans KR',sans-serif">세 오류를 모두 모음</text>
  </g>
  <path d="M200,113 C 290,113 290,140 370,144" fill="none" stroke="#548235" stroke-width="1.8" marker-end="url(#ae-a)"/>
  <path d="M200,149 L 370,149" fill="none" stroke="#548235" stroke-width="1.8" marker-end="url(#ae-a)"/>
  <path d="M200,185 C 290,185 290,158 370,154" fill="none" stroke="#548235" stroke-width="1.8" marker-end="url(#ae-a)"/>
  <line x1="524" y1="149" x2="632" y2="149" stroke="#548235" stroke-width="2.2" marker-end="url(#ae-a)"/>

  <!-- BOTTOM: monadic / Bind -->
  <rect x="22" y="240" width="856" height="158" fill="#f6f6f6" stroke="#dddddd" rx="8"/>
  <text x="40" y="262" font-size="14" fill="#555" font-weight="bold">monadic · Bind  →  단락</text>
  <g font-family="'Consolas',monospace" font-size="11.5">
    <rect x="48" y="300" width="140" height="34" fill="#fbeeee" stroke="#c0504d" stroke-width="1.6" rx="4"/><text x="118" y="322" fill="#7a2b28" text-anchor="middle">uV Invalid</text>
    <rect x="250" y="300" width="140" height="34" fill="#f0f0f0" stroke="#bbb" stroke-width="1.4" stroke-dasharray="4 3" rx="4"/><text x="320" y="322" fill="#aaa" text-anchor="middle">eV (안 굴림)</text>
    <rect x="452" y="300" width="140" height="34" fill="#f0f0f0" stroke="#bbb" stroke-width="1.4" stroke-dasharray="4 3" rx="4"/><text x="522" y="322" fill="#aaa" text-anchor="middle">aV (안 굴림)</text>
    <rect x="660" y="298" width="202" height="38" fill="#eef2f5" stroke="#888" stroke-width="1.8" rx="6"/>
    <text x="761" y="322" fill="#444" text-anchor="middle" font-weight="bold">Invalid([1개 오류])</text>
  </g>
  <text x="221" y="288" font-size="20" fill="#c0504d" text-anchor="middle" font-weight="bold">✗ STOP</text>
  <line x1="188" y1="317" x2="248" y2="317" stroke="#c0504d" stroke-width="2" marker-end="url(#ae-g)"/>
  <line x1="390" y1="317" x2="450" y2="317" stroke="#ccc" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#ae-g)"/>
  <line x1="592" y1="317" x2="656" y2="317" stroke="#ccc" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#ae-g)"/>
  <text x="761" y="352" font-size="10.5" fill="#888" text-anchor="middle" font-family="'Noto Sans KR',sans-serif">첫 오류에서 멈춤 — username 오류 하나만</text>

  <text x="450" y="428" font-size="13" fill="#1f1f1f" text-anchor="middle"><tspan fill="#375623" font-weight="bold">독립이라 모은다 (위)</tspan>  ·  <tspan fill="#777" font-weight="bold">의존이라 멈춘다 (아래)</tspan></text>
  <text x="450" y="450" font-size="11.5" fill="#666" text-anchor="middle">세 검증이 서로의 결과를 필요로 하지 않으니, 동시에 굴려 실패를 다 모을 수 있습니다.</text>
</svg>
