<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 450" font-family="'Helvetica Neue','Noto Sans KR',sans-serif">
  <rect width="920" height="450" fill="#ffffff"/>
  <text x="460" y="28" font-size="19" fill="#1f1f1f" text-anchor="middle" font-weight="bold">학습용 Validation 과 v5 Validation — 같은 뼈대, v5 가 더 입힘</text>

  <!-- column headers -->
  <rect x="30" y="50" width="410" height="34" fill="#fff2cc" stroke="#bf9000" stroke-width="1.6" rx="6"/>
  <text x="235" y="72" font-size="13.5" fill="#5a4400" text-anchor="middle" font-weight="bold" font-family="'Consolas',monospace">학습용  Validation&lt;E, A&gt;</text>
  <rect x="480" y="50" width="410" height="34" fill="#e8f4fd" stroke="#1f77b4" stroke-width="1.6" rx="6"/>
  <text x="685" y="72" font-size="13.5" fill="#0c3a5e" text-anchor="middle" font-weight="bold" font-family="'Consolas',monospace">v5  Validation&lt;F, A&gt;</text>

  <g font-family="'Noto Sans KR',sans-serif" font-size="11.5">
    <!-- row labels (center) -->
    <text x="460" y="108" fill="#888" text-anchor="middle" font-size="10.5">실패 케이스</text>
    <text x="460" y="158" fill="#888" text-anchor="middle" font-size="10.5">누적 방법</text>
    <text x="460" y="208" fill="#888" text-anchor="middle" font-size="10.5">n-항 결합</text>
    <text x="460" y="258" fill="#888" text-anchor="middle" font-size="10.5">단락 (monadic)</text>
  </g>

  <g font-family="'Consolas',monospace" font-size="11">
    <!-- 실패 케이스 -->
    <rect x="30" y="92" width="380" height="30" fill="#fffaf0" stroke="#d9c48a" stroke-width="1.2" rx="4"/>
    <text x="44" y="112" fill="#5a4400">Invalid(IReadOnlyList&lt;E&gt;)</text>
    <rect x="510" y="92" width="380" height="30" fill="#f4faff" stroke="#aacde8" stroke-width="1.2" rx="4"/>
    <text x="524" y="112" fill="#0c3a5e">Fail(F)   where F : Monoid&lt;F&gt;</text>
    <!-- 누적 -->
    <rect x="30" y="142" width="380" height="30" fill="#fffaf0" stroke="#d9c48a" stroke-width="1.2" rx="4"/>
    <text x="44" y="162" fill="#5a4400">[.. a, .. b]   목록 이어붙임</text>
    <rect x="510" y="142" width="380" height="30" fill="#f4faff" stroke="#aacde8" stroke-width="1.2" rx="4"/>
    <text x="524" y="162" fill="#0c3a5e">Combine(e1, e2)   Monoid 위임</text>
    <!-- n-항 -->
    <rect x="30" y="192" width="380" height="30" fill="#fffaf0" stroke="#d9c48a" stroke-width="1.2" rx="4"/>
    <text x="44" y="212" fill="#5a4400">Map2 · Map3   (arity 고정)</text>
    <rect x="510" y="192" width="380" height="30" fill="#f4faff" stroke="#aacde8" stroke-width="1.2" rx="4"/>
    <text x="524" y="212" fill="#0c3a5e">.Map().Apply()  ·  &amp; 누적  ·  | 고르기</text>
    <!-- 단락 -->
    <rect x="30" y="242" width="380" height="30" fill="#f6f6f6" stroke="#ccc" stroke-width="1.2" rx="4"/>
    <text x="44" y="262" fill="#999">Bind 없음 (누적 한쪽만)</text>
    <rect x="510" y="242" width="380" height="30" fill="#f4faff" stroke="#aacde8" stroke-width="1.2" rx="4"/>
    <text x="524" y="262" fill="#0c3a5e">Bind / SelectMany 있음 (의존 폴백)</text>
  </g>

  <!-- bridge: list concat = Monoid -->
  <rect x="30" y="296" width="860" height="40" fill="#eef6e9" stroke="#548235" stroke-width="1.5" rx="20"/>
  <text x="460" y="321" font-size="12" fill="#375623" text-anchor="middle" font-family="'Noto Sans KR',sans-serif">학습용의 목록 이어붙임 (빈 목록 = 항등원, concat = 결합) 이 곧 <tspan font-weight="bold">1부 Monoid 의 실전</tspan> — v5 가 Monoid 제약을 둔 까닭</text>

  <!-- common skeleton -->
  <rect x="30" y="350" width="860" height="74" fill="#fbfbfb" stroke="#e0e0e0" stroke-width="1.2" rx="8"/>
  <text x="460" y="372" font-size="12.5" fill="#1f1f1f" text-anchor="middle" font-weight="bold" font-family="'Noto Sans KR',sans-serif">공통 뼈대 — "성공 아니면 누적된 실패, 여러 검증을 동시에 굴려 오류를 모은다"</text>
  <text x="460" y="394" font-size="11" fill="#666" text-anchor="middle" font-family="'Noto Sans KR',sans-serif">학습용은 이 뼈대만 남기고, v5 는 그 위에 Monoid 제약 · trait · 연산자 · monadic 폴백을 더했습니다.</text>
  <text x="460" y="414" font-size="10.5" fill="#999" text-anchor="middle" font-family="'Noto Sans KR',sans-serif">케이스 이름만 다름: 학습용 Valid / Invalid  ·  v5 Success / Fail</text>
</svg>
