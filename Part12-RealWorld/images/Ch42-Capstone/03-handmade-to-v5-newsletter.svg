<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="'Helvetica Neue','Noto Sans KR',sans-serif">
  <rect width="960" height="480" fill="#ffffff"/>
  <text x="480" y="28" font-size="19" fill="#1f1f1f" text-anchor="middle" font-weight="bold">손으로 만든 패턴 → v5 Newsletter 샘플 — 같은 구조의 실무판</text>

  <!-- headers -->
  <rect x="30" y="48" width="440" height="32" fill="#fff2cc" stroke="#bf9000" stroke-width="1.6" rx="6"/>
  <text x="250" y="69" font-size="13" fill="#5a4400" text-anchor="middle" font-weight="bold" font-family="'Noto Sans KR',sans-serif">이 책 — OrderService (손으로 만듦)</text>
  <rect x="490" y="48" width="440" height="32" fill="#e8f4fd" stroke="#1f77b4" stroke-width="1.6" rx="6"/>
  <text x="710" y="69" font-size="13" fill="#0c3a5e" text-anchor="middle" font-weight="bold" font-family="'Noto Sans KR',sans-serif">v5 Samples — Newsletter (실무판)</text>

  <g font-family="'Consolas',monospace">
    <!-- Row 1: runtime -->
    <rect x="34" y="90" width="436" height="78" fill="#fffaf0" stroke="#d9c48a" stroke-width="1.3" rx="5"/>
    <text x="48" y="110" font-size="10" fill="#5a4400">record AppRT(Console, Store)</text>
    <text x="48" y="128" font-size="10" fill="#5a4400">  : Has&lt;AppRT, IConsole&gt;,</text>
    <text x="48" y="144" font-size="10" fill="#5a4400">    Has&lt;AppRT, IClock&gt;,</text>
    <text x="48" y="160" font-size="10" fill="#5a4400">    Has&lt;AppRT, IStore&gt;</text>
    <rect x="490" y="90" width="440" height="78" fill="#f4faff" stroke="#aacde8" stroke-width="1.3" rx="5"/>
    <text x="504" y="110" font-size="10" fill="#0c3a5e">record Runtime(RuntimeEnv Env)</text>
    <text x="504" y="128" font-size="10" fill="#0c3a5e">  : Has&lt;Eff&lt;Runtime&gt;, WebIO&gt;,</text>
    <text x="504" y="144" font-size="10" fill="#0c3a5e">    Has&lt;Eff&lt;Runtime&gt;, EmailIO&gt;, ...</text>
    <text x="504" y="160" font-size="9.5" fill="#5a78b0">    (능력 trait 10개) , IDisposable</text>

    <!-- Row 2: workflow -->
    <rect x="34" y="182" width="436" height="78" fill="#fffaf0" stroke="#d9c48a" stroke-width="1.3" rx="5"/>
    <text x="48" y="202" font-size="10" fill="#5a4400">from t in Eff.Now&lt;RT&gt;()</text>
    <text x="48" y="220" font-size="10" fill="#5a4400">from _ in Eff.Save&lt;RT&gt;(key, val)</text>
    <text x="48" y="238" font-size="10" fill="#5a4400">from _ in Eff.Print&lt;RT&gt;(msg)</text>
    <text x="48" y="254" font-size="9.5" fill="#998" font-family="'Noto Sans KR',sans-serif">where RT : Has&lt;RT, ...&gt; (능력 제약)</text>
    <rect x="490" y="182" width="440" height="78" fill="#f4faff" stroke="#aacde8" stroke-width="1.3" rx="5"/>
    <text x="504" y="202" font-size="10" fill="#0c3a5e">from posts in Posts&lt;M,RT&gt;.read…(4)</text>
    <text x="504" y="220" font-size="10" fill="#0c3a5e">from members in Members&lt;M,RT&gt;.readAll</text>
    <text x="504" y="238" font-size="10" fill="#0c3a5e">from _ in Email&lt;M,RT&gt;.sendToAll(...)</text>
    <text x="504" y="254" font-size="9.5" fill="#5a78b0" font-family="'Noto Sans KR',sans-serif">where RT : Has&lt;M, ...&gt; (능력 제약)</text>

    <!-- Row 3: inject Test/Live -->
    <rect x="34" y="274" width="436" height="64" fill="#fffaf0" stroke="#d9c48a" stroke-width="1.3" rx="5"/>
    <text x="48" y="296" font-size="10" fill="#5a4400">new AppRT(</text>
    <text x="48" y="314" font-size="10" fill="#5a4400">  MemoryConsole, MemoryStore)</text>
    <text x="48" y="330" font-size="9.5" fill="#998" font-family="'Noto Sans KR',sans-serif">테스트 더블을 직접 주입</text>
    <rect x="490" y="274" width="440" height="64" fill="#f4faff" stroke="#aacde8" stroke-width="1.3" rx="5"/>
    <text x="504" y="296" font-size="10.5" fill="#0c3a5e">Runtime.Test(...)  /  Runtime.Live(...)</text>
    <text x="504" y="316" font-size="9.5" fill="#5a78b0" font-family="'Noto Sans KR',sans-serif">두 정적 팩터리로 테스트·실 구현 분기</text>
    <text x="504" y="332" font-size="9.5" fill="#5a78b0" font-family="'Noto Sans KR',sans-serif">LanguageExt.Sys.Live 에 실 구현</text>
  </g>

  <!-- bottom capsule -->
  <rect x="34" y="352" width="896" height="76" fill="#eef6e9" stroke="#548235" stroke-width="1.5" rx="8"/>
  <text x="482" y="376" font-size="13" fill="#375623" text-anchor="middle" font-weight="bold" font-family="'Noto Sans KR',sans-serif">같은 구조 — 런타임이 능력 trait 를 구현하고, 워크플로는 제네릭, Test/Live 로 갈아 끼운다.</text>
  <text x="482" y="398" font-size="11.5" fill="#548235" text-anchor="middle" font-family="'Noto Sans KR',sans-serif">v5 Samples 는 당신이 손으로 만든 그 패턴의 실무판입니다. 새 도구가 아니라 같은 발상에 능력 수와 실 구현을 더한 것뿐.</text>
  <text x="482" y="418" font-size="10" fill="#888" text-anchor="middle" font-family="'Consolas',monospace">Samples/Newsletter/Effects/Runtime.cs  ·  Command/Send.cs</text>

  <text x="482" y="452" font-size="11" fill="#999" text-anchor="middle" font-family="'Noto Sans KR',sans-serif">이 책에서 손으로 만든 Eff·Has·Validation 이 모두 컴파일·실행되는 실제 패턴이었음을, v5 의 실 코드가 확인해 줍니다.</text>
</svg>
