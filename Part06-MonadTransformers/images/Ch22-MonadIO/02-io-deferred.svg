<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 400" font-family="'Helvetica Neue','Noto Sans KR',sans-serif">
  <defs>
    <marker id="a22b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555555"/>
    </marker>
  </defs>
  <rect width="980" height="400" fill="#ffffff"/>

  <text x="490" y="40" font-size="20" fill="#1f1f1f" text-anchor="middle" font-weight="bold">조립과 실행의 분리 — 부수 효과는 끝까지 미뤄진다</text>

  <!-- 타임라인 -->
  <line x1="90" y1="200" x2="890" y2="200" stroke="#cccccc" stroke-width="2"/>

  <!-- 시점 1: Run(env) = 조립 -->
  <rect x="150" y="120" width="260" height="80" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2.2" rx="8"/>
  <text x="280" y="150" font-size="15" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas',monospace" font-weight="bold">stack.Run(env)</text>
  <text x="280" y="174" font-size="13" fill="#0c3a5e" text-anchor="middle">환경을 주입해 <tspan font-weight="bold">IO 를 조립</tspan></text>
  <text x="280" y="192" font-size="12" fill="#0c3a5e" text-anchor="middle">아직 부수 효과 없음</text>
  <rect x="180" y="232" width="200" height="40" fill="#f5f5f5" stroke="#999999" stroke-width="1.6" rx="5"/>
  <text x="280" y="257" font-size="13" fill="#777777" text-anchor="middle" font-family="'Consolas',monospace">sideLog = [ ]  (비어 있음)</text>

  <!-- 화살표 -->
  <line x1="412" y1="236" x2="566" y2="236" stroke="#555555" stroke-width="2.4" marker-end="url(#a22b)"/>
  <text x="489" y="226" font-size="12" fill="#555555" text-anchor="middle" font-style="italic">방아쇠를 당기면</text>

  <!-- 시점 2: io.Run() = 실행 -->
  <rect x="570" y="120" width="260" height="80" fill="#fff2cc" stroke="#bf9000" stroke-width="2.4" rx="8"/>
  <text x="700" y="150" font-size="15" fill="#5a4400" text-anchor="middle" font-family="'Consolas',monospace" font-weight="bold">io.Run()</text>
  <text x="700" y="174" font-size="13" fill="#5a4400" text-anchor="middle">조립된 IO 를 <tspan font-weight="bold">실행</tspan></text>
  <text x="700" y="192" font-size="12" fill="#5a4400" text-anchor="middle">이때 비로소 부수 효과</text>
  <rect x="570" y="232" width="260" height="40" fill="#fdf2d0" stroke="#bf9000" stroke-width="1.6" rx="5"/>
  <text x="700" y="257" font-size="12" fill="#5a4400" text-anchor="middle" font-family="'Consolas',monospace">sideLog = ["부수 효과 실행 → 7"]</text>

  <!-- 시점 점 -->
  <circle cx="280" cy="200" r="6" fill="#1f77b4"/>
  <circle cx="700" cy="200" r="6" fill="#bf9000"/>

  <text x="490" y="320" font-size="14" fill="#1f1f1f" text-anchor="middle"><tspan font-family="'Consolas',monospace">Run(env)</tspan> 와 <tspan font-family="'Consolas',monospace">io.Run()</tspan> 은 <tspan font-weight="bold">서로 다른 두 실행</tspan>입니다. 앞은 조립, 뒤는 실행.</text>
  <text x="490" y="350" font-size="13" fill="#888888" text-anchor="middle">부수 효과는 마지막 <tspan font-family="'Consolas',monospace">io.Run()</tspan> 한 번에서만 일어납니다. 함수형은 효과를 끝까지 미룹니다.</text>
</svg>
