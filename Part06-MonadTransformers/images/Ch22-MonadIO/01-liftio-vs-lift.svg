<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 440" font-family="'Helvetica Neue','Noto Sans KR',sans-serif">
  <defs>
    <marker id="a22a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f77b4"/>
    </marker>
  </defs>
  <rect width="980" height="440" fill="#ffffff"/>

  <text x="490" y="38" font-size="20" fill="#1f1f1f" text-anchor="middle" font-weight="bold">일반 <tspan font-family="'Consolas',monospace">lift</tspan> 대 <tspan font-family="'Consolas',monospace">LiftIO</tspan> — 한 칸 대 맨 안쪽 어디서든</text>

  <!-- 왼쪽: 일반 lift = 바로 아래 한 층 -->
  <text x="255" y="78" font-size="15" fill="#1f1f1f" text-anchor="middle" font-weight="bold">일반 <tspan font-family="'Consolas',monospace">lift</tspan> : 바로 아래 한 층</text>
  <rect x="150" y="98" width="210" height="56" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2.2" rx="6"/>
  <text x="255" y="131" font-size="15" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas',monospace" font-weight="bold">T&lt;M, A&gt;</text>
  <rect x="150" y="186" width="210" height="56" fill="#e2efda" stroke="#548235" stroke-width="2.2" rx="6"/>
  <text x="255" y="219" font-size="15" fill="#375623" text-anchor="middle" font-family="'Consolas',monospace" font-weight="bold">M&lt;A&gt;</text>
  <line x1="255" y1="184" x2="255" y2="156" stroke="#1f77b4" stroke-width="2.6" marker-end="url(#a22a)"/>
  <text x="380" y="174" font-size="13" fill="#1f77b4" text-anchor="start" font-family="'Consolas',monospace">M&lt;a&gt; → T&lt;M,a&gt;</text>
  <text x="255" y="276" font-size="12" fill="#888888" text-anchor="middle">바로 아래 인접한 한 층만 끌어올림</text>

  <!-- 구분선 -->
  <line x1="490" y1="90" x2="490" y2="300" stroke="#dddddd" stroke-width="1.5"/>

  <!-- 오른쪽: LiftIO = 깊은 스택의 맨 안쪽 IO -->
  <text x="730" y="78" font-size="15" fill="#1f1f1f" text-anchor="middle" font-weight="bold"><tspan font-family="'Consolas',monospace">LiftIO</tspan> : 맨 안쪽 IO 를 곧장</text>
  <rect x="625" y="96" width="210" height="40" fill="#e8f4fd" stroke="#1f77b4" stroke-width="1.8" rx="5"/>
  <text x="730" y="122" font-size="13" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas',monospace">ReaderT</text>
  <rect x="625" y="140" width="210" height="40" fill="#dbeafa" stroke="#1f77b4" stroke-width="1.8" rx="5"/>
  <text x="730" y="166" font-size="13" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas',monospace">StateT</text>
  <rect x="625" y="184" width="210" height="40" fill="#e2efda" stroke="#548235" stroke-width="1.8" rx="5"/>
  <text x="730" y="210" font-size="13" fill="#375623" text-anchor="middle" font-family="'Consolas',monospace">EitherT</text>
  <rect x="625" y="228" width="210" height="44" fill="#fff2cc" stroke="#bf9000" stroke-width="2.2" rx="5"/>
  <text x="730" y="256" font-size="14" fill="#5a4400" text-anchor="middle" font-family="'Consolas',monospace" font-weight="bold">IO  (맨 안쪽)</text>
  <!-- 긴 화살표: 맨 안쪽 IO → 맨 위 -->
  <line x1="858" y1="250" x2="858" y2="116" stroke="#1f77b4" stroke-width="2.8" marker-end="url(#a22a)"/>
  <line x1="836" y1="250" x2="858" y2="250" stroke="#1f77b4" stroke-width="2.8"/>
  <text x="888" y="186" font-size="13" fill="#1f77b4" text-anchor="middle" font-family="'Consolas',monospace" transform="rotate(90 888 186)">IO&lt;a&gt; → 맨 위까지</text>
  <text x="730" y="298" font-size="12" fill="#888888" text-anchor="middle">스택이 아무리 깊어도 IO 한 번에</text>

  <!-- 하단 -->
  <rect x="120" y="330" width="740" height="86" fill="#fbfbfb" stroke="#cccccc" stroke-width="1.2" rx="8"/>
  <text x="490" y="362" font-size="14" fill="#1f1f1f" text-anchor="middle">일반 <tspan font-family="'Consolas',monospace">lift</tspan> 로는 IO 를 한 층씩 올려야 합니다. <tspan font-family="'Consolas',monospace">LiftIO</tspan> 는 그 한 동사로 맨 안쪽 IO 를 그 자리로 끌어올립니다.</text>
  <text x="490" y="392" font-size="13" fill="#888888" text-anchor="middle"><tspan font-family="'Consolas',monospace">ReaderTF.LiftIO = Lift(M.LiftIO(ma))</tspan> — 안쪽 M 이 IO 를 끌어올리고, 바깥 Lift 가 한 층 위로.</text>
</svg>
