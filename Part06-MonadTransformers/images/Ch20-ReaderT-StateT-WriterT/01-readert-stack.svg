<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 420" font-family="'Helvetica Neue','Noto Sans KR',sans-serif">
  <defs>
    <marker id="a20a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f77b4"/>
    </marker>
  </defs>
  <rect width="980" height="420" fill="#ffffff"/>

  <text x="490" y="40" font-size="20" fill="#1f1f1f" text-anchor="middle" font-weight="bold"><tspan font-family="'Consolas',monospace">ReaderT&lt;Env, M, A&gt; = Env → M&lt;A&gt;</tspan></text>

  <!-- 환경 주입 입구 -->
  <rect x="70" y="150" width="150" height="60" fill="#fff2cc" stroke="#bf9000" stroke-width="2" rx="6"/>
  <text x="145" y="178" font-size="14" fill="#5a4400" text-anchor="middle" font-family="'Consolas',monospace" font-weight="bold">Env</text>
  <text x="145" y="198" font-size="12" fill="#5a4400" text-anchor="middle">환경 주입</text>
  <line x1="222" y1="180" x2="300" y2="180" stroke="#1f77b4" stroke-width="2.4" marker-end="url(#a20a)"/>

  <!-- 스택: 바깥 환경 의존 층 + 안쪽 M -->
  <text x="470" y="92" font-size="14" fill="#0c3a5e" text-anchor="middle" font-weight="bold">환경을 주면 내부 모나드 계산이 나온다</text>
  <rect x="320" y="108" width="300" height="62" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2.2" rx="6"/>
  <text x="470" y="136" font-size="15" fill="#0c3a5e" text-anchor="middle" font-weight="bold">환경 의존 (Reader 층)</text>
  <text x="470" y="157" font-size="12" fill="#0c3a5e" text-anchor="middle">바깥 한 층 — 변환기가 얹는다</text>

  <rect x="320" y="176" width="300" height="62" fill="#f5f5f5" stroke="#888888" stroke-width="2.2" stroke-dasharray="7 5" rx="6"/>
  <text x="470" y="204" font-size="15" fill="#555555" text-anchor="middle" font-family="'Consolas',monospace" font-weight="bold">내부 모나드 M</text>
  <text x="470" y="225" font-size="12" fill="#777777" text-anchor="middle">빈칸</text>

  <!-- M = OptionF 끼우면 ReaderOption -->
  <line x1="622" y1="207" x2="700" y2="207" stroke="#548235" stroke-width="2.4" marker-end="url(#a20a)"/>
  <rect x="702" y="150" width="208" height="118" fill="#e2efda" stroke="#548235" stroke-width="2" rx="8"/>
  <text x="806" y="180" font-size="14" fill="#375623" text-anchor="middle" font-weight="bold">M = <tspan font-family="'Consolas',monospace">OptionF</tspan> 끼우면</text>
  <text x="806" y="210" font-size="14" fill="#375623" text-anchor="middle">18장에서 <tspan font-weight="bold">손으로</tspan> 짠</text>
  <text x="806" y="234" font-size="15" fill="#375623" text-anchor="middle" font-family="'Consolas',monospace" font-weight="bold">ReaderOption</text>
  <text x="806" y="256" font-size="13" fill="#548235" text-anchor="middle">이 공짜로 나온다</text>

  <!-- 하단 -->
  <text x="490" y="320" font-size="14" fill="#1f1f1f" text-anchor="middle">바깥 환경 의존은 Reader 층이, 실패·비결정 같은 둘째 효과는 안쪽 <tspan font-family="'Consolas',monospace">M</tspan> 이 맡습니다.</text>
  <text x="490" y="348" font-size="13" fill="#888888" text-anchor="middle"><tspan font-family="'Consolas',monospace">M.Bind</tspan> 가 안쪽 효과를 흘리므로, 우리는 환경 흘리기 한 층만 얹으면 됩니다.</text>
</svg>
