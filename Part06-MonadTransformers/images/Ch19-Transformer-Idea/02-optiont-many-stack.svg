<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 440" font-family="'Helvetica Neue','Noto Sans KR',sans-serif">
  <defs>
    <marker id="a19b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#777777"/>
    </marker>
  </defs>
  <rect width="980" height="440" fill="#ffffff"/>

  <text x="490" y="38" font-size="20" fill="#1f1f1f" text-anchor="middle" font-weight="bold"><tspan font-family="'Consolas',monospace">OptionT&lt;ManyF&gt;</tspan> — 여러 갈래 각각의 성공·실패</text>
  <text x="490" y="62" font-size="13" fill="#888888" text-anchor="middle">내부는 <tspan font-family="'Consolas',monospace">Many&lt;Option&lt;int&gt;&gt;</tspan> 한 겹. Many 가 갈래를, 갈래마다 Option 이 성공·실패를 맡습니다.</text>

  <!-- Many 바깥 띠 (초록) -->
  <rect x="70" y="92" width="840" height="250" fill="#eef6e8" stroke="#548235" stroke-width="2" rx="10"/>
  <text x="92" y="116" font-size="15" fill="#375623" font-family="'Consolas',monospace" font-weight="bold">Many</text>
  <text x="170" y="116" font-size="12" fill="#548235">비결정성 — 세 갈래 [-2, 0, 5]</text>

  <!-- 세 갈래: 각 갈래에 100/x -->
  <!-- 갈래 1: -2 -->
  <rect x="110" y="138" width="240" height="180" fill="#ffffff" stroke="#bcbcbc" stroke-width="1.3" rx="8"/>
  <text x="230" y="166" font-size="15" fill="#5a4400" text-anchor="middle" font-family="'Consolas',monospace">x = -2</text>
  <rect x="135" y="182" width="190" height="46" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2" rx="6"/>
  <text x="230" y="210" font-size="14" fill="#0c3a5e" text-anchor="middle">100 / -2 = -50</text>
  <rect x="135" y="248" width="190" height="46" fill="#fff2cc" stroke="#bf9000" stroke-width="2" rx="6"/>
  <text x="230" y="277" font-size="15" fill="#5a4400" text-anchor="middle" font-family="'Consolas',monospace" font-weight="bold">Some(-50)</text>

  <!-- 갈래 2: 0 (None) -->
  <rect x="370" y="138" width="240" height="180" fill="#fff7f7" stroke="#d99694" stroke-width="1.3" rx="8"/>
  <text x="490" y="166" font-size="15" fill="#5a4400" text-anchor="middle" font-family="'Consolas',monospace">x = 0</text>
  <rect x="395" y="182" width="190" height="46" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2" rx="6"/>
  <text x="490" y="210" font-size="14" fill="#0c3a5e" text-anchor="middle">100 / 0 → 실패</text>
  <rect x="395" y="248" width="190" height="46" fill="#f6dddc" stroke="#c0504d" stroke-width="2" rx="6"/>
  <text x="490" y="277" font-size="15" fill="#943634" text-anchor="middle" font-family="'Consolas',monospace" font-weight="bold">None</text>

  <!-- 갈래 3: 5 -->
  <rect x="630" y="138" width="240" height="180" fill="#ffffff" stroke="#bcbcbc" stroke-width="1.3" rx="8"/>
  <text x="750" y="166" font-size="15" fill="#5a4400" text-anchor="middle" font-family="'Consolas',monospace">x = 5</text>
  <rect x="655" y="182" width="190" height="46" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2" rx="6"/>
  <text x="750" y="210" font-size="14" fill="#0c3a5e" text-anchor="middle">100 / 5 = 20</text>
  <rect x="655" y="248" width="190" height="46" fill="#fff2cc" stroke="#bf9000" stroke-width="2" rx="6"/>
  <text x="750" y="277" font-size="15" fill="#5a4400" text-anchor="middle" font-family="'Consolas',monospace" font-weight="bold">Some(20)</text>

  <!-- 결과 -->
  <text x="490" y="372" font-size="15" fill="#1f1f1f" text-anchor="middle" font-family="'Consolas',monospace" font-weight="bold">[Some(-50), None, Some(20)]</text>
  <text x="490" y="402" font-size="13" fill="#943634" text-anchor="middle"><tspan font-weight="bold">0 갈래만</tspan> None 으로 단락하고, 나머지 갈래는 Some 으로 살아남습니다.</text>
  <text x="490" y="424" font-size="12" fill="#888888" text-anchor="middle">비결정성(Many)과 실패(Option) 두 효과가 한 스택에서 동시에 작동합니다.</text>
</svg>
