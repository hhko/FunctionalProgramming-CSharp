<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 470" font-family="'Helvetica Neue', 'Noto Sans KR', sans-serif">
  <defs>
    <marker id="arrow-fn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f1f1f"/>
    </marker>
    <marker id="arrow-lift" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f77b4"/>
    </marker>
  </defs>

  <rect width="920" height="470" fill="#ffffff"/>

  <text x="460" y="40" font-size="16" fill="#1f1f1f" text-anchor="middle" font-weight="bold">효과는 값으로 인코딩되어, 실행은 Run 한 자리로 미뤄집니다</text>

  <!-- description (value, not action) -->
  <rect x="60" y="78" width="320" height="120" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2.2" rx="6"/>
  <text x="220" y="108" font-size="15" fill="#0c3a5e" text-anchor="middle" font-weight="bold">① 효과 = 명세 (값)</text>
  <text x="220" y="136" font-size="14" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace">Eff&lt;RT&gt;</text>
  <text x="220" y="162" font-size="12.5" fill="#0c3a5e" text-anchor="middle">"무엇을 할지" 만 기술</text>
  <text x="220" y="182" font-size="12.5" fill="#0c3a5e" text-anchor="middle">아직 콘솔에 쓰지 않음</text>

  <!-- run with runtime -->
  <line x1="382" y1="138" x2="538" y2="138" stroke="#1f77b4" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-lift)"/>
  <text x="460" y="126" font-size="14" fill="#1f77b4" text-anchor="middle" font-weight="bold" font-family="'Consolas', monospace">Run(eff, rt)</text>

  <!-- execution -->
  <rect x="540" y="78" width="320" height="120" fill="#fff2cc" stroke="#bf9000" stroke-width="2.2" rx="6"/>
  <text x="700" y="108" font-size="15" fill="#5a4400" text-anchor="middle" font-weight="bold">② 실행 = Run 한 자리</text>
  <text x="700" y="136" font-size="13" fill="#5a4400" text-anchor="middle">런타임 RT 를 넣어야</text>
  <text x="700" y="158" font-size="13" fill="#5a4400" text-anchor="middle">비로소 부수 효과가 일어남</text>
  <text x="700" y="182" font-size="12.5" fill="#8a6a00" text-anchor="middle" font-style="italic">RT 를 바꾸면 같은 효과의 결과가 바뀜</text>

  <!-- separator -->
  <line x1="60" y1="232" x2="860" y2="232" stroke="#dddddd" stroke-width="1.4"/>

  <!-- contrast: imperative -->
  <text x="60" y="266" font-size="14" fill="#1f1f1f" font-weight="bold">대비 — 명령형 IO</text>
  <rect x="60" y="282" width="800" height="56" fill="#f7f7f7" stroke="#bbbbbb" stroke-width="1.6" rx="6"/>
  <text x="80" y="305" font-size="14" fill="#444444" font-family="'Consolas', monospace">Console.WriteLine(msg);</text>
  <text x="80" y="326" font-size="12.5" fill="#777777">호출하는 순간 곧바로 부수 효과 발생 — 미룰 수도, 가짜로 바꿔 끼울 수도 없음</text>

  <!-- payoff -->
  <text x="60" y="376" font-size="14" fill="#1f1f1f" font-weight="bold">효과를 값으로 두면</text>
  <rect x="60" y="392" width="800" height="56" fill="#eef7ee" stroke="#7aa86f" stroke-width="1.6" rx="6"/>
  <text x="80" y="415" font-size="13.5" fill="#2f5a25">"무엇을 할지" (효과 값) 와 "어떻게 실행할지" (런타임) 가 분리됩니다.</text>
  <text x="80" y="436" font-size="13.5" fill="#2f5a25">테스트는 런타임만 가짜로 바꿔 끼우면 됩니다 — 효과 코드는 한 글자도 고치지 않습니다.</text>
</svg>
