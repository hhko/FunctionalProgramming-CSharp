<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 540" font-family="'Helvetica Neue', 'Noto Sans KR', sans-serif">
  <defs>
    <marker id="arrow-lift" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f77b4"/>
    </marker>
  </defs>

  <rect width="920" height="540" fill="#ffffff"/>

  <!-- Elevated World band (top) -->
  <rect x="40" y="56" width="840" height="170" fill="#f4f9ff" rx="12"/>
  <text x="62" y="82" font-size="13" fill="#1f77b4" font-style="italic" font-weight="bold" letter-spacing="0.5">Elevated World</text>

  <!-- single Eff<RT> value -->
  <rect x="330" y="104" width="260" height="92" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2.2" rx="6"/>
  <text x="460" y="140" font-size="20" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">Greeter.Ask&lt;RT&gt;()</text>
  <text x="460" y="170" font-size="14" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace">Eff&lt;RT&gt; — 효과는 값 (한 개)</text>

  <!-- two lower arrows down to Normal -->
  <line x1="395" y1="200" x2="250" y2="296" stroke="#1f77b4" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-lift)"/>
  <line x1="525" y1="200" x2="670" y2="296" stroke="#1f77b4" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-lift)"/>
  <text x="300" y="250" font-size="15" fill="#1f77b4" font-weight="bold" font-family="'Consolas', monospace">Run(eff, RT)</text>
  <text x="618" y="250" font-size="15" fill="#1f77b4" font-weight="bold" font-family="'Consolas', monospace">Run(eff, RT)</text>

  <!-- Normal World band (bottom) -->
  <rect x="40" y="312" width="840" height="200" fill="#fffdf3" rx="12"/>
  <text x="62" y="338" font-size="13" fill="#bf9000" font-style="italic" font-weight="bold" letter-spacing="0.5">Normal World — 주입하는 런타임 RT</text>

  <!-- Live runtime -->
  <rect x="110" y="358" width="280" height="124" fill="#fff2cc" stroke="#bf9000" stroke-width="2.2" rx="6"/>
  <text x="250" y="388" font-size="16" fill="#5a4400" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">AppRT(new LiveConsole())</text>
  <text x="250" y="416" font-size="13" fill="#5a4400" text-anchor="middle">실제 콘솔에 쓰고 읽음</text>
  <text x="250" y="440" font-size="13" fill="#5a4400" text-anchor="middle">운영 (부수 효과 발생)</text>
  <text x="250" y="466" font-size="12" fill="#8a6a00" text-anchor="middle" font-style="italic">비결정 · 느림 · 격리 안 됨</text>

  <!-- Test runtime -->
  <rect x="530" y="358" width="280" height="124" fill="#fff2cc" stroke="#bf9000" stroke-width="2.2" rx="6"/>
  <text x="670" y="388" font-size="16" fill="#5a4400" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">AppRT(new MemoryConsole(…))</text>
  <text x="670" y="416" font-size="13" fill="#5a4400" text-anchor="middle">입력은 큐, 출력은 리스트로 잡음</text>
  <text x="670" y="440" font-size="13" fill="#5a4400" text-anchor="middle">테스트 더블 (부수 효과 없음)</text>
  <text x="670" y="466" font-size="12" fill="#8a6a00" text-anchor="middle" font-style="italic">결정적 · 빠름 · 격리됨</text>
</svg>
