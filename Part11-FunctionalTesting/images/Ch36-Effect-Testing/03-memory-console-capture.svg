<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 480" font-family="'Helvetica Neue', 'Noto Sans KR', sans-serif">
  <defs>
    <marker id="arrow-fn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f1f1f"/>
    </marker>
  </defs>

  <rect width="920" height="480" fill="#ffffff"/>

  <text x="460" y="38" font-size="16" fill="#1f1f1f" text-anchor="middle" font-weight="bold">MemoryConsole — 입력은 큐에서 꺼내고, 출력은 리스트에 담습니다</text>

  <!-- input queue -->
  <rect x="50" y="86" width="200" height="160" fill="#fff2cc" stroke="#bf9000" stroke-width="2.2" rx="6"/>
  <text x="150" y="112" font-size="14" fill="#5a4400" text-anchor="middle" font-weight="bold">입력 큐 (inputs)</text>
  <text x="150" y="134" font-size="12.5" fill="#5a4400" text-anchor="middle" font-family="'Consolas', monospace">Queue&lt;string&gt;</text>
  <rect x="80" y="150" width="140" height="34" fill="#fffaf0" stroke="#bf9000" stroke-width="1.6" rx="4"/>
  <text x="150" y="172" font-size="14" fill="#5a4400" text-anchor="middle" font-family="'Consolas', monospace">"철수"</text>
  <text x="150" y="210" font-size="12" fill="#8a6a00" text-anchor="middle" font-style="italic">ReadLine() → Dequeue</text>
  <text x="150" y="230" font-size="11.5" fill="#8a6a00" text-anchor="middle" font-style="italic">(비면 "")</text>

  <!-- center: Greeter run -->
  <rect x="330" y="86" width="260" height="160" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2.2" rx="6"/>
  <text x="460" y="116" font-size="15" fill="#0c3a5e" text-anchor="middle" font-weight="bold">Greeter.Ask 실행</text>
  <text x="460" y="148" font-size="12.5" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace">WriteLine("이름이…")</text>
  <text x="460" y="172" font-size="12.5" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace">ReadLine()</text>
  <text x="460" y="196" font-size="12.5" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace">WriteLine("안녕하세요,…")</text>
  <text x="460" y="226" font-size="12" fill="#1f77b4" text-anchor="middle" font-style="italic">반환값 = "철수"</text>

  <line x1="252" y1="166" x2="328" y2="166" stroke="#1f1f1f" stroke-width="2.4" marker-end="url(#arrow-fn)"/>
  <line x1="592" y1="166" x2="668" y2="166" stroke="#1f1f1f" stroke-width="2.4" marker-end="url(#arrow-fn)"/>

  <!-- output list -->
  <rect x="670" y="86" width="200" height="160" fill="#fff2cc" stroke="#bf9000" stroke-width="2.2" rx="6"/>
  <text x="770" y="112" font-size="14" fill="#5a4400" text-anchor="middle" font-weight="bold">출력 리스트 (Output)</text>
  <text x="770" y="134" font-size="12.5" fill="#5a4400" text-anchor="middle" font-family="'Consolas', monospace">List&lt;string&gt;</text>
  <rect x="690" y="148" width="160" height="30" fill="#fffaf0" stroke="#bf9000" stroke-width="1.4" rx="4"/>
  <text x="770" y="168" font-size="12" fill="#5a4400" text-anchor="middle" font-family="'Consolas', monospace">"이름이 무엇인가요?"</text>
  <rect x="690" y="182" width="160" height="30" fill="#fffaf0" stroke="#bf9000" stroke-width="1.4" rx="4"/>
  <text x="770" y="202" font-size="12" fill="#5a4400" text-anchor="middle" font-family="'Consolas', monospace">"안녕하세요, 철수!"</text>
  <text x="770" y="232" font-size="12" fill="#8a6a00" text-anchor="middle" font-style="italic">WriteLine() → Add</text>

  <!-- assertion box -->
  <rect x="160" y="300" width="600" height="120" fill="#eef7ee" stroke="#7aa86f" stroke-width="1.8" rx="8"/>
  <text x="460" y="330" font-size="14" fill="#2f5a25" text-anchor="middle" font-weight="bold">실행이 끝나면 Output 리스트를 단언으로 검사합니다</text>
  <text x="460" y="362" font-size="13.5" fill="#2f5a25" text-anchor="middle" font-family="'Consolas', monospace">con.Output.SequenceEqual(["이름이 무엇인가요?", "안녕하세요, 철수!"])</text>
  <text x="460" y="394" font-size="12.5" fill="#2f5a25" text-anchor="middle">실제 콘솔 없이, 같은 입력은 항상 같은 출력 — 결정적입니다.</text>
</svg>
