<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 440" font-family="'Helvetica Neue', 'Noto Sans KR', sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#c0392b"/>
    </marker>
    <marker id="arg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#888"/>
    </marker>
  </defs>
  <rect width="980" height="440" fill="#ffffff"/>

  <text x="490" y="34" font-size="17" fill="#1f1f1f" text-anchor="middle" font-weight="bold">축소 (shrinking) — 첫 반례를 가장 작은 반례로 줄임</text>
  <text x="490" y="56" font-size="12" fill="#666" text-anchor="middle" font-style="italic">성질 "모든 n &lt; 100" 은 거짓. 더 작은데도 여전히 실패하는 값만 채택하며 0 쪽으로 내려감</text>

  <!-- 단계 1 — 무작위 첫 반례 -->
  <text x="80" y="120" font-size="12" fill="#bf9000" font-weight="bold">① 무작위 첫 반례</text>
  <rect x="80" y="135" width="130" height="60" fill="#f8d7d3" stroke="#c0392b" stroke-width="2.4" rx="6"/>
  <text x="145" y="165" font-size="20" fill="#c0392b" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">668</text>
  <text x="145" y="184" font-size="10.5" fill="#922" text-anchor="middle">실패 (≥ 100)</text>

  <!-- 축소 화살표 1 -->
  <line x1="212" y1="165" x2="290" y2="165" stroke="#888" stroke-width="2" marker-end="url(#arg)"/>
  <text x="251" y="155" font-size="10.5" fill="#666" text-anchor="middle">n−1</text>

  <!-- 중간 후보들 (점선 줄임) -->
  <text x="330" y="120" font-size="12" fill="#666" font-weight="bold">② 더 작은 후보로 한 칸씩</text>
  <rect x="300" y="135" width="100" height="60" fill="#fbeae8" stroke="#d98880" stroke-width="2" rx="6"/>
  <text x="350" y="165" font-size="17" fill="#c0392b" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">667</text>
  <text x="350" y="184" font-size="10" fill="#922" text-anchor="middle">아직 실패</text>

  <text x="430" y="170" font-size="20" fill="#888" text-anchor="middle" font-weight="bold">···</text>

  <rect x="470" y="135" width="100" height="60" fill="#fbeae8" stroke="#d98880" stroke-width="2" rx="6"/>
  <text x="520" y="165" font-size="17" fill="#c0392b" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">101</text>
  <text x="520" y="184" font-size="10" fill="#922" text-anchor="middle">아직 실패</text>

  <!-- 축소 화살표 2 -->
  <line x1="572" y1="165" x2="650" y2="165" stroke="#888" stroke-width="2" marker-end="url(#arg)"/>
  <text x="611" y="155" font-size="10.5" fill="#666" text-anchor="middle">n−1</text>

  <!-- 최소 반례 -->
  <text x="700" y="120" font-size="12" fill="#0a7" font-weight="bold">③ 최소 반례 (경계)</text>
  <rect x="660" y="135" width="130" height="60" fill="#d6f0e4" stroke="#0a7" stroke-width="2.6" rx="6"/>
  <text x="725" y="165" font-size="22" fill="#0a7" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">100</text>
  <text x="725" y="184" font-size="10.5" fill="#076" text-anchor="middle">실패 (마지막)</text>

  <!-- 멈춤 화살표 -->
  <line x1="792" y1="165" x2="860" y2="165" stroke="#0a7" stroke-width="2" marker-end="url(#ar)"/>
  <rect x="862" y="138" width="96" height="54" fill="#d6f0e4" stroke="#0a7" stroke-width="2" rx="6"/>
  <text x="910" y="160" font-size="18" fill="#0a7" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">99</text>
  <text x="910" y="180" font-size="10" fill="#076" text-anchor="middle">통과 → 멈춤</text>

  <!-- 수직선 — 경계 -->
  <line x1="725" y1="200" x2="725" y2="300" stroke="#0a7" stroke-width="1.4" stroke-dasharray="5 4"/>
  <text x="725" y="320" font-size="12" fill="#0a7" text-anchor="middle" font-weight="bold">100 이 성질을 깨는 가장 작은 값</text>

  <!-- 하단 설명 박스 -->
  <rect x="90" y="350" width="800" height="64" fill="#f7f7f7" stroke="#ddd" stroke-width="1.2" rx="8"/>
  <text x="110" y="375" font-size="12" fill="#1f1f1f" font-weight="bold">규칙</text>
  <text x="110" y="396" font-size="11.5" fill="#444">더 작은 후보가 여전히 실패하면 채택하고, 어떤 후보도 더는 실패하지 않으면 멈춥니다. 668 같은 큰 우연 값이 아니라 경계 100 을 손에 쥡니다.</text>
</svg>
