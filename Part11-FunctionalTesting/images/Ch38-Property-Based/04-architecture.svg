<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 480" font-family="'Helvetica Neue', 'Noto Sans KR', sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f1f1f"/>
    </marker>
  </defs>
  <rect width="980" height="480" fill="#ffffff"/>

  <text x="490" y="34" font-size="17" fill="#1f1f1f" text-anchor="middle" font-weight="bold">함수형 테스트 아키텍처 — 두 축이 맞물려 임의 입력으로 법칙을 자동 검증</text>

  <!-- 축 1 — property 엔진 -->
  <rect x="50" y="80" width="360" height="180" fill="#f4f9ff" stroke="#1f77b4" stroke-width="1.6" rx="12"/>
  <text x="230" y="108" font-size="14" fill="#1f77b4" text-anchor="middle" font-weight="bold">축 1 — property 엔진 (Part A)</text>
  <rect x="80" y="130" width="140" height="56" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2.2" rx="6"/>
  <text x="150" y="158" font-size="15" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">Gen</text>
  <text x="150" y="175" font-size="10" fill="#0c3a5e" text-anchor="middle">무작위 입력</text>
  <rect x="240" y="130" width="140" height="56" fill="#e8f4fd" stroke="#1f77b4" stroke-width="2.2" rx="6"/>
  <text x="310" y="158" font-size="14" fill="#0c3a5e" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">ForAll</text>
  <text x="310" y="175" font-size="10" fill="#0c3a5e" text-anchor="middle">+ 축소</text>
  <text x="230" y="218" font-size="11.5" fill="#0c3a5e" text-anchor="middle">"임의 입력에서 이 성질이 참인가?"</text>
  <text x="230" y="240" font-size="11" fill="#0c3a5e" text-anchor="middle" font-style="italic">성질이 무엇인지는 모름 — 받아서 때려 봄</text>

  <!-- 축 2 — 법칙 모듈 -->
  <rect x="570" y="80" width="360" height="180" fill="#fffdf3" stroke="#bf9000" stroke-width="1.6" rx="12"/>
  <text x="750" y="108" font-size="14" fill="#bf9000" text-anchor="middle" font-weight="bold">축 2 — 법칙 모듈 (Part B)</text>
  <rect x="600" y="130" width="300" height="56" fill="#fff2cc" stroke="#bf9000" stroke-width="2.2" rx="6"/>
  <text x="750" y="155" font-size="14" fill="#5a4400" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">Laws.FunctorIdentity&lt;F&gt;</text>
  <text x="750" y="174" font-size="10.5" fill="#5a4400" text-anchor="middle">어떤 F 든 받아 법칙 하나를 bool 로</text>
  <text x="750" y="218" font-size="11.5" fill="#5a4400" text-anchor="middle">"이 한 입력에서 법칙이 성립하는가?"</text>
  <text x="750" y="240" font-size="11" fill="#5a4400" text-anchor="middle" font-style="italic">입력이 어디서 오는지는 모름 — 받아서 검사</text>

  <!-- 결합 화살표 -->
  <line x1="230" y1="262" x2="430" y2="330" stroke="#1f1f1f" stroke-width="2.4" marker-end="url(#ar)"/>
  <line x1="750" y1="262" x2="550" y2="330" stroke="#1f1f1f" stroke-width="2.4" marker-end="url(#ar)"/>
  <text x="300" y="300" font-size="12" fill="#1f1f1f" font-weight="bold">생성기 공급</text>
  <text x="690" y="300" font-size="12" fill="#1f1f1f" font-weight="bold" text-anchor="end">성질로 주입</text>

  <!-- 결합 박스 -->
  <rect x="270" y="345" width="440" height="64" fill="#eef7f1" stroke="#0a7" stroke-width="2.4" rx="10"/>
  <text x="490" y="372" font-size="14" fill="#076" text-anchor="middle" font-family="'Consolas', monospace" font-weight="bold">ForAll(genMyList, xs =&gt; Laws.FunctorIdentity(xs, probe))</text>
  <text x="490" y="394" font-size="12" fill="#076" text-anchor="middle" font-weight="bold">임의 MyList 마다 법칙을 자동 검증 (200 케이스 통과)</text>

  <text x="490" y="448" font-size="12.5" fill="#1f1f1f" text-anchor="middle" font-style="italic">엔진은 성질을 모르고, 법칙은 입력을 모른다 — 맞물리면 기초 ~ 10부의 어떤 법칙이든 한 모듈로</text>
</svg>
