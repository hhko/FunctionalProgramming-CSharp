<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 470" font-family="'Helvetica Neue', 'Noto Sans KR', sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#888"/>
    </marker>
  </defs>
  <rect width="980" height="470" fill="#ffffff"/>

  <text x="490" y="34" font-size="17" fill="#1f1f1f" text-anchor="middle" font-weight="bold">특정 값 검증 vs property 검증 — 같은 입력 공간, 다른 덮음</text>

  <!-- ===== 왼쪽: 특정 값 ===== -->
  <rect x="40" y="66" width="420" height="320" fill="#fffdf3" rx="12"/>
  <text x="62" y="92" font-size="13" fill="#bf9000" font-weight="bold">특정 값 — 손으로 고른 몇 개</text>

  <!-- 입력 공간 영역 -->
  <rect x="70" y="112" width="360" height="200" fill="#ffffff" stroke="#d9c47a" stroke-width="1.5" rx="8"/>
  <text x="250" y="132" font-size="11" fill="#8a6d00" text-anchor="middle" font-style="italic">입력 공간 (모든 가능한 입력)</text>

  <!-- 고른 점 3 개 -->
  <circle cx="150" cy="200" r="9" fill="#bf9000"/>
  <circle cx="260" cy="250" r="9" fill="#bf9000"/>
  <circle cx="340" cy="180" r="9" fill="#bf9000"/>
  <text x="150" y="225" font-size="10" fill="#5a4400" text-anchor="middle" font-family="'Consolas', monospace">2</text>
  <text x="260" y="275" font-size="10" fill="#5a4400" text-anchor="middle" font-family="'Consolas', monospace">3</text>
  <text x="340" y="205" font-size="10" fill="#5a4400" text-anchor="middle" font-family="'Consolas', monospace">5</text>

  <!-- 놓친 반례 (X) -->
  <text x="205" y="160" font-size="15" fill="#c0392b" text-anchor="middle" font-weight="bold">x</text>
  <text x="300" y="300" font-size="15" fill="#c0392b" text-anchor="middle" font-weight="bold">x</text>
  <text x="385" y="265" font-size="15" fill="#c0392b" text-anchor="middle" font-weight="bold">x</text>

  <text x="250" y="345" font-size="11.5" fill="#8a6d00" text-anchor="middle">검사한 입력만 통과 — 빈 곳의 반례 (x) 는 놓침</text>
  <text x="250" y="366" font-size="11.5" fill="#8a6d00" text-anchor="middle" font-style="italic">우연히 통과하는 가짜를 못 거름</text>

  <!-- ===== 오른쪽: property ===== -->
  <rect x="520" y="66" width="420" height="320" fill="#f4f9ff" rx="12"/>
  <text x="542" y="92" font-size="13" fill="#1f77b4" font-weight="bold">property — 무작위로 많이</text>

  <rect x="550" y="112" width="360" height="200" fill="#ffffff" stroke="#9cc6e8" stroke-width="1.5" rx="8"/>
  <text x="730" y="132" font-size="11" fill="#0c3a5e" text-anchor="middle" font-style="italic">입력 공간 (모든 가능한 입력)</text>

  <!-- 무작위 점 다수 -->
  <g fill="#1f77b4">
    <circle cx="600" cy="170" r="5"/><circle cx="640" cy="210" r="5"/><circle cx="680" cy="160" r="5"/>
    <circle cx="720" cy="200" r="5"/><circle cx="760" cy="175" r="5"/><circle cx="800" cy="230" r="5"/>
    <circle cx="610" cy="250" r="5"/><circle cx="660" cy="280" r="5"/><circle cx="700" cy="250" r="5"/>
    <circle cx="745" cy="285" r="5"/><circle cx="790" cy="265" r="5"/><circle cx="840" cy="200" r="5"/>
    <circle cx="585" cy="220" r="5"/><circle cx="830" cy="260" r="5"/><circle cx="765" cy="240" r="5"/>
    <circle cx="700" cy="185" r="5"/><circle cx="635" cy="265" r="5"/><circle cx="870" cy="230" r="5"/>
  </g>
  <!-- 잡힌 반례 -->
  <circle cx="715" cy="225" r="9" fill="#c0392b"/>
  <text x="715" y="229" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">x</text>

  <text x="730" y="345" font-size="11.5" fill="#0c3a5e" text-anchor="middle">200 건이 공간을 고루 덮음 — 반례 (x) 를 만나면 즉시 실패</text>
  <text x="730" y="366" font-size="11.5" fill="#0c3a5e" text-anchor="middle" font-style="italic">"모든 입력의 약속" 의 본뜻에 가까움</text>

  <!-- 중앙 화살표 -->
  <line x1="465" y1="226" x2="515" y2="226" stroke="#888" stroke-width="2" marker-end="url(#ar)"/>
  <text x="490" y="216" font-size="11" fill="#666" text-anchor="middle">키움</text>

  <text x="490" y="416" font-size="12.5" fill="#1f1f1f" text-anchor="middle" font-style="italic">3장 §3.7.1 의 최소 ForAll 이 입력을 무작위로 많이 만들어 성질을 검사하는 발상</text>
</svg>
